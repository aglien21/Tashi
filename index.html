<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa Family</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f1f5f9; font-family: sans-serif; }
        .box { background: white; border-radius: 30px; padding: 25px; border: 1px solid #e2e8f0; }
        .pad { 
            background: white; border: 2px solid #e2e8f0; border-radius: 20px; 
            padding: 20px; text-align: center; font-weight: 900; color: #1e293b; 
            cursor: pointer; text-transform: uppercase; font-size: 11px;
        }
        .pad:active { background: #3b82f6; color: white; }
        select, input { 
            width: 100%; padding: 15px; border-radius: 18px; border: 2px solid #cbd5e1; 
            margin-bottom: 12px; font-weight: bold; background: white; color: black;
        }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

<div id="login-ui" class="max-w-xs mx-auto mt-12 text-center">
    <div class="inline-block p-6 bg-blue-600 rounded-[35px] shadow-lg mb-4">
        <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
        </svg>
    </div>
    <h1 class="text-2xl font-black text-slate-800 mb-8 uppercase tracking-tighter">Financa Family</h1>
    
    <div class="box shadow-xl">
        <select id="user-select"></select>
        <input id="pass" type="password" placeholder="PIN" inputmode="numeric" class="text-center">
        <button onclick="login()" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg uppercase">Hyni</button>
    </div>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="p-6 bg-slate-900 rounded-[35px] text-center mb-6 shadow-2xl">
        <p class="text-slate-400 text-[10px] font-black uppercase mb-1">Mbetja Aktuale</p>
        <h2 id="r-mbetja" class="text-4xl font-black text-green-400">0 L</h2>
    </div>

    <div class="flex justify-between items-center mb-4 px-2">
        <h3 id="kat-title" class="font-black uppercase text-[10px] text-slate-500">Kategoritë</h3>
        <button id="btn-back" onclick="shfaqKats()" class="hidden text-[10px] font-black text-blue-600">← MBRAPA</button>
    </div>
    
    <div id="kategori-pads" class="grid grid-cols-3 gap-3 mb-8"></div>

    <div class="box border-2 border-blue-500/20">
        <input id="shuma" type="number" class="text-4xl text-center font-black border-none bg-transparent" placeholder="0 L" readonly>
        <p id="shporta-info" class="text-center text-[10px] font-bold text-slate-400 mb-4 uppercase italic">Zgjidh diçka</p>
        <button onclick="ruaj()" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black shadow-lg">PAGUAJ ✅</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbyq_0VquRxRNciMafdyYwTst0n4Pv7y8ecE4FebqB21bUxSVkQ8DuggA9hE__O_rLJZ/exec";
    let allData = { users: [], kats: [], nens: [] };
    let uAktual = "", katAktuale = "", totali = 0;

    window.onload = async () => {
        try {
            const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
            const d = await r.json();
            
            // Konvertimi i sigurt i perdoruesve
            let uRaw = d.users || [];
            allData.users = uRaw.map(u => {
                let e = Array.isArray(u) ? u[0] : (u.Emri || u.emri || "");
                let p = Array.isArray(u) ? u[1] : (u.Pin || u.pin || "");
                return { emri: String(e), pin: String(p) };
            }).filter(u => u.emri && u.emri !== "Emri");

            allData.kats = d.kats || [];
            allData.nens = d.nens || [];

            let h = "";
            allData.users.forEach(u => {
                h += `<option value="${u.emri}">${u.emri}</option>`;
            });
            document.getElementById("user-select").innerHTML = h;
        } catch (e) { console.error("Error:", e); }
    };

    function login() {
        const sel = document.getElementById("user-select").value;
        const pin = document.getElementById("pass").value.trim();
        const user = allData.users.find(u => u.emri === sel && u.pin === pin);

        if (user) {
            uAktual = sel;
            document.getElementById("login-ui").classList.add("hidden");
            document.getElementById("app-ui").classList.remove("hidden");
            shfaqKats();
            merrRaportin();
        } else alert("PIN i gabuar!");
    }

    function shfaqKats() {
        document.getElementById("btn-back").classList.add("hidden");
        document.getElementById("kat-title").innerText = "Kategoritë";
        let h = "";
        allData.kats.forEach(k => {
            let e = k.emri || k.Emri || (Array.isArray(k) ? k[0] : "");
            let n = k.ka_nenkategori || k.ka_nen || (Array.isArray(k) ? k[1] : "");
            if(e && e !== "emri") {
                let func = (n == "Po" || n == "po") ? `shfaqNens('${e}')` : `shto('${e}', '${k.limiti || k[2]}')`;
                h += `<div class="pad" onclick="${func}">${e}</div>`;
            }
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shfaqNens(p) {
        document.getElementById("btn-back").classList.remove("hidden");
        document.getElementById("kat-title").innerText = p;
        let h = "";
        allData.nens.forEach(n => {
            let prindi = n.Prindi || n.prindi || (Array.isArray(n) ? n[0] : "");
            if (prindi === p) {
                let e = n.emri || n.Emri || (Array.isArray(n) ? n[1] : "");
                let c = n.cmimi || n.Cmimi || (Array.isArray(n) ? n[2] : 0);
                h += `<div class="pad border-blue-100 bg-blue-50/50" onclick="shto('${e}', '${c}')">${e}</div>`;
            }
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shto(e, c) {
        let v = parseFloat(c) || 0;
        if (v === 0) v = parseFloat(prompt("Vendos çmimin:", "")) || 0;
        totali = v; katAktuale = e;
        document.getElementById("shuma").value = totali;
        document.getElementById("shporta-info").innerText = e;
    }

    async function merrRaportin() {
        const s = new Date();
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: s.getMonth()+1, viti: s.getFullYear() }) });
        const d = await r.json();
        document.getElementById("r-mbetja").innerText = (d.mbetja || 0).toLocaleString() + " L";
    }

    async function ruaj() {
        if (!totali) return;
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto", user: uAktual, kat: katAktuale, shuma: totali }) });
        alert("U ruajt!");
        location.reload();
    }
</script>
</body>
</html>
