<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance App v14 - Historiku</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .box { background: white; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .list-item { border-bottom: 1px solid #f1f5f9; padding: 12px 5px; display: flex; justify-content: space-between; align-items: center; }
        .list-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="p-4 text-slate-800">

<div id="login-ui" class="max-w-xs mx-auto mt-20 box text-center">
    <h1 class="text-2xl font-black italic uppercase mb-6 text-slate-900">Finance <span class="text-blue-600">App</span></h1>
    <select id="user-select" class="w-full p-4 mb-3 rounded-2xl border-2 font-bold bg-slate-50 outline-none">
        <option value="Ian">IAN</option>
        <option value="Arjanit">ARJANIT</option>
        <option value="Joni">JONI</option>
    </select>
    <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-6 rounded-2xl border-2 text-center font-bold outline-none" inputmode="numeric">
    <button onclick="login()" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-black">HYR</button>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden pt-2">
    <div class="box text-center mb-4">
        <input id="shuma" type="number" placeholder="Lekë" class="w-full text-center text-5xl font-black text-blue-600 outline-none mb-6" inputmode="numeric">
        <button onclick="regjistro()" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg uppercase tracking-widest active:scale-95 transition-all">REGJISTRO</button>
    </div>

    <div class="box">
        <div class="flex justify-between items-center mb-4">
            <h3 class="text-xs font-black uppercase text-slate-400 tracking-widest">Historiku (Emri & Shënime)</h3>
            <button onclick="shfaqHistorikun()" class="p-2 bg-slate-100 rounded-full text-xs">🔄</button>
        </div>
        <div id="historiku-list" class="space-y-1">
            <p class="text-slate-400 italic text-xs text-center">Duke ngarkuar...</p>
        </div>
    </div>
</div>

<script>
    const SHEET_ID = "1DXgZ5N05s5H1Lz4mESwMujiTBX-twlGzwoSBO_6Ehns";
    let uAktual = "";

    function login() {
        const u = document.getElementById("user-select").value;
        const p = document.getElementById("pass").value;
        const pins = {"Ian": "1234", "Arjanit": "0000", "Joni": "1111"};
        if(pins[u] === p) {
            uAktual = u;
            document.getElementById("login-ui").style.display = "none";
            document.getElementById("app-ui").classList.remove("hidden");
            shfaqHistorikun();
        } else alert("PIN i gabuar!");
    }

    async function shfaqHistorikun() {
        const listContainer = document.getElementById("historiku-list");
        try {
            // Marrim te dhenat si CSV
            const sheetURL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
            const response = await fetch(sheetURL);
            const csvData = await response.text();
            
            // Ndajme rreshtat dhe heqim thonjëzat
            const rows = csvData.split('\n').slice(1).reverse(); // slice(1) heq rreshtin e pare (Headers)
            
            let html = "";
            rows.slice(0, 10).forEach(row => {
                const cols = row.split(',').map(c => c.replace(/"/g, ''));
                if(cols.length >= 2) {
                    html += `
                    <div class="list-item">
                        <span class="font-bold text-slate-700">${cols[1]}</span>
                        <span class="text-sm text-slate-500 bg-slate-100 px-3 py-1 rounded-lg">${cols[2] || "Pa shënim"}</span>
                    </div>`;
                }
            });
            listContainer.innerHTML = html || "<p class='text-center text-xs text-slate-400'>Nuk ka të dhëna.</p>";
        } catch (e) {
            listContainer.innerHTML = "<p class='text-center text-red-400 text-xs'>Gabim në lexim. Sigurohu që Sheets është 'Public'!</p>";
        }
    }

    function regjistro() {
        const sh = document.getElementById("shuma").value;
        const url = `https://docs.google.com/forms/d/e/1FAIpQLSe15aI4gNRPCvUnTEBruWt0SK3K_eCUX7MIM47MBRpVTT-3yQ/viewform?usp=pp_url&entry.603674021=${encodeURIComponent(uAktual)}&entry.1273774300=${encodeURIComponent(sh)}`;
        window.location.href = url;
    }
</script>
</body>
</html>
