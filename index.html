<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/star--v1.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>KidQuest Pro - Gamified</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Nunito', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .game-card { border-bottom-width: 6px; border-right-width: 4px; transition: all 0.1s; }
        .game-card:active { border-bottom-width: 2px; border-right-width: 2px; transform: translateY(4px) translateX(2px); }
        .progress-fill { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
        .checkbox-custom:checked + label { background-color: #4f46e5 !important; color: white !important; border-color: #4f46e5 !important; transform: scale(0.95); }
    </style>

    <script>
        window.onerror = function(msg, url, lineNo) {
            console.error('Gabim Sistemi:', msg, lineNo);
            return false;
        };
    </script>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="login-screen" class="flex flex-col items-center justify-center h-screen px-4 bg-indigo-600">
        <div class="text-center mb-8 text-white">
            <h1 class="text-6xl font-black mb-2 drop-shadow-xl italic">KidQuest</h1>
            <p class="font-bold opacity-80 uppercase tracking-tighter">Mission Control</p>
        </div>
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-md border-b-8 border-indigo-200">
            <p id="loading-text" class="text-indigo-500 font-bold mb-4 animate-pulse italic text-center">Po lidhet me serverin...</p>
            <div id="login-form" class="hidden space-y-4">
                <input id="user-input" type="text" placeholder="Emri yt..." class="w-full p-4 bg-slate-100 rounded-2xl font-bold focus:outline-none focus:ring-4 focus:ring-indigo-200">
                <input id="pass-input" type="password" placeholder="PIN" class="w-full p-4 bg-slate-100 rounded-2xl font-bold focus:outline-none focus:ring-4 focus:ring-indigo-200">
                <button onclick="login()" class="w-full bg-indigo-500 text-white p-5 rounded-2xl font-black text-xl shadow-[0_5px_0_#4338ca] active:translate-y-1 active:shadow-none transition-all">HYR NË LOJË</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden max-w-lg mx-auto bg-white min-h-screen shadow-2xl relative pb-20">
        <header class="bg-indigo-600 text-white p-6 flex justify-between items-center rounded-b-[2.5rem] shadow-lg">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-xl">👑</div>
                <h2 id="welcome-text" class="text-xl font-black">Heroi</h2>
            </div>
            <div class="flex gap-2">
                <button id="btn-settings" onclick="toggleSettings()" class="hidden bg-white/20 p-3 rounded-xl">⚙️</button>
                <button onclick="logout()" class="bg-red-500/80 px-4 py-2 rounded-xl text-xs font-bold">Dil</button>
            </div>
        </header>

        <div id="admin-panel" class="hidden p-5">
            <h3 class="text-lg font-black text-orange-500 mb-4 flex items-center gap-2">⏳ NË PRITJE <span id="pending-count" class="bg-orange-500 text-white px-2 rounded-full">0</span></h3>
            <div id="admin-pending-tasks" class="space-y-3 mb-6"></div>

            <div class="bg-indigo-50 p-6 rounded-[2.5rem] border-4 border-indigo-100 mb-6 shadow-inner">
                <h3 class="font-black text-indigo-700 mb-4">🚀 JEP MISIONE (SHPEJT)</h3>
                <select id="quick-task-select" class="w-full p-4 mb-4 border-2 border-indigo-200 rounded-2xl font-bold text-sm" onchange="fillTaskForm()"></select>
                <div class="flex gap-2 mb-3">
                    <input id="task-emoji" type="text" readonly onclick="openCustomEmojiPicker('task-emoji')" placeholder="👇" class="w-1/4 p-4 border-2 border-indigo-200 rounded-2xl bg-white text-center text-2xl cursor-pointer">
                    <input id="task-name" type="text" placeholder="Emri i misionit" class="w-3/4 p-4 border-2 border-indigo-200 rounded-2xl font-bold">
                </div>
                <input id="task-points" type="number" placeholder="Pikët (Përdor - për dënim)" class="w-full p-4 mb-5 border-2 border-indigo-200 rounded-2xl font-bold">
                <div id="assign-checkboxes" class="flex flex-wrap gap-2 mb-6"></div>
                <button onclick="sendTaskToFirebase()" id="btn-send-task" class="w-full bg-indigo-500 text-white p-5 rounded-2xl font-black text-xl shadow-[0_5px_0_#4338ca] active:translate-y-1 transition-all">DËRGO & SHTO TJETËR</button>
            </div>
            
            <h3 class="text-lg font-black text-indigo-500 mb-4">🟢 MISIONET E HAPURA</h3>
            <div id="admin-active-tasks" class="space-y-3 mb-8 bg-slate-50 p-4 rounded-3xl border-2 border-slate-100"></div>

            <div class="grid grid-cols-1 gap-4 mb-8">
                <div class="bg-white p-4 rounded-3xl border-2 h-44"><canvas id="adminChart"></canvas></div>
                <div class="
