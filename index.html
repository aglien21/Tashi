<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa-Family AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --bg: #f1f5f9; --box: white; --txt: #0f172a; --border: #e2e8f0; }
        .dark { --bg: #0f172a; --box: #1e293b; --txt: #f8fafc; --border: #334155; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.3s; overflow-x: hidden; }
        .box { background: var(--box); padding: 20px; border-radius: 28px; border: 1px solid var(--border); }
        .pad { background: var(--box); padding: 15px 5px; border-radius: 20px; text-align: center; border: 2px solid var(--border); cursor: pointer; }
        
        /* Loading Animation */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 pb-24">

<div id="login-ui" class="fixed inset-0 z-[200] bg-slate-900 flex items-center justify-center p-6 text-center">
    <div class="w-full max-w-xs">
        <span class="text-7xl mb-4 flex justify-center gap-2">👨‍👩‍👧‍👦</span>
        <h2 class="text-white text-2xl font-black mb-8 italic uppercase">Financa-Family</h2>
        <select id="user-select" class="w-full p-4 mb-3 rounded-2xl bg-white/10 text-white border border-white/20 outline-none"></select>
        <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-8 rounded-2xl text-center text-xl outline-none" inputmode="numeric">
        <button id="btn-login" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black uppercase">Hyni</button>
    </div>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="flex justify-between items-center mb-4">
        <button onclick="toggleDark()" class="p-3 bg-slate-200 dark:bg-slate-800 rounded-2xl">🌙</button>
        <div class="flex gap-1">
            <select id="muaji" class="p-2 bg-white dark:bg-slate-800 rounded-xl text-[10px] font-bold border dark:border-slate-700"></select>
            <select id="viti" class="p-2 bg-white dark:bg-slate-800 rounded-xl text-[10px] font-bold border dark:border-slate-700"></select>
        </div>
        <button onclick="shkarkoPDF()" class="p-3 bg-blue-600 text-white rounded-2xl font-black text-[10px]">PDF</button>
    </div>

    <div class="p-6 bg-slate-900 rounded-[35px] mb-4 shadow-2xl text-center text-white">
        <h1 id="r-mbetja" class="text-4xl font-black text-blue-400 mb-2">0 L</h1>
        <div id="piechart" style="width: 100%; height: 160px;"></div>
    </div>

    <div class="box mb-6 border-2 border-blue-600 shadow-xl text-center">
        <h3 class="text-[10px] font-black uppercase text-blue-600 mb-2">Skaneri i Faturave</h3>
        
        <button id="btn-skano" onclick="startSkanimi()" class="w-full mb-3 p-4 bg-purple-600 text-white rounded-xl font-black uppercase shadow-md flex justify-center items-center gap-2">
            <span>SKANO QR KODIN</span> 📸
        </button>

        <div id="qr-reader" class="w-full rounded-[15px] overflow-hidden mb-3 bg-black"></div>
        
        <div id="status-kerkimi" class="hidden mb-3 p-2 bg-blue-50 dark:bg-slate-800 rounded-lg border border-blue-200 dark:border-blue-900">
            <div class="loader mr-2"></div>
            <span class="text-[10px] font-bold text-blue-600 uppercase">Duke marrë artikujt nga Tatimet...</span>
        </div>

        <input id="shuma" type="number" placeholder="0 L" class="text-4xl font-black text-blue-600 bg-transparent border-none w-full text-center outline-none" readonly>
        
        <div id="shporta-list" class="bg-slate-100 dark:bg-slate-800 p-3 rounded-xl mt-2 min-h-[40px] text-[11px] font-bold text-slate-500 text-left max-h-48 overflow-y-auto">
            Skanoni faturën për të parë artikujt...
        </div>

        <button id="btn-ruaj" onclick="ruajShpenzim()" class="w-full mt-4 p-4 bg-blue-600 text-white rounded-2xl font-black uppercase">RUASH SHPENZIMIN ✅</button>
    </div>

    <div id="kategori-pads" class="grid grid-cols-3 gap-3 mb-6"></div>
    
    <div class="box">
        <h3 class="text-[10px] font-black uppercase text-slate-400 mb-3 italic">Historiku</h3>
        <div id="historiku-list" class="space-y-2 text-[11px]"></div>
    </div>
</div>

<script>
    const URL_SHEET = "https://script.google.com/macros/s/AKfycbzprX9mGairUfeXz1nyj4WTBqhUcrBShktIpv1LvQsV0wl9B-DZqbq-CuOlN1W_84zM/exec"; 
    let uAktual = "", allData = {}, shportaObj = {}, html5QrCode = null;

    window.onload = async () => {
        const m = document.getElementById("muaji"), v = document.getElementById("viti");
        const muajt = ["Janar", "Shkurt", "Mars", "Prill", "Maj", "Qershor", "Korrik", "Gusht", "Shtator", "Tetor", "Nëntor", "Dhjetor"];
        muajt.forEach((emri, i) => { m.innerHTML += `<option value="${i+1}" ${i+1==new Date().getMonth()+1?'selected':''}>${emri}</option>`; });
        for(let i=2025; i<=2026; i++) v.innerHTML += `<option value="${i}" ${i==2026?'selected':''}>${i}</option>`;
        
        const r = await fetch(URL_SHEET, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
        allData = await r.json();
        allData.users.forEach(u => { document.getElementById("user-select").innerHTML += `<option value="${u}">${u}</option>`; });
        if(localStorage.getItem("dark-mode") === "true") document.body.classList.add("dark");
    };

    function toggleDark() { localStorage.setItem("dark-mode", document.body.classList.toggle("dark")); }

    document.getElementById("btn-login").onclick = async () => {
        const u = document.getElementById("user-select").value, p = document.getElementById("pass").value;
        const r = await fetch(URL_SHEET, { method: "POST", body: JSON.stringify({ action: "login", user: u, pass: p }) });
        const d = await r.json();
        if(d.status == "ok") { 
            uAktual = u; document.getElementById("login-ui").classList.add("hidden"); 
            document.getElementById("app-ui").classList.remove("hidden"); 
            shfaqKategorite(); merrRaportin();
        } else { alert("PIN i gabuar!"); }
    };

    function shfaqKategorite() {
        let h = "";
        allData.kats.slice(0, 9).forEach(k => {
            h += `<div class="pad" onclick="shtoManual('${k.emri}')"><span class="text-[9px] font-black uppercase">${k.emri}</span></div>`;
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shtoManual(k) {
        let v = prompt("Vendos shumën për " + k);
        if(v) shtoNeShporte(k, v);
    }

    function shtoNeShporte(e, c, s = 1) {
        if (shportaObj[e]) { shportaObj[e].s += s; } 
        else { shportaObj[e] = {s: s, c: parseFloat(c)}; }
        perditesoArken();
    }

    function perditesoArken() {
        let t = 0, h = "";
        for(let x in shportaObj) { 
            let shumaLineare = shportaObj[x].s * shportaObj[x].c;
            t += shumaLineare; 
            h += `<div class="flex justify-between border-b dark:border-slate-700 py-2">
                    <span class="truncate pr-2">${x} x${shportaObj[x].s}</span>
                    <span class="font-bold">${shumaLineare.toLocaleString()} L</span>
                  </div>`;
        }
        document.getElementById("shuma").value = t;
        document.getElementById("shporta-list").innerHTML = h || "Skanoni faturën...";
    }

    // ==========================================
    // SKANIMI DHE MARRJA E TË DHËNAVE NGA TATIMET
    // ==========================================
    function startSkanimi() {
        if(html5QrCode) {
            html5QrCode.stop().then(() => { document.getElementById("qr-reader").innerHTML = ""; html5QrCode = null; });
            return;
        }
        html5QrCode = new Html5Qrcode("qr-reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 200 },
            (decodedText) => {
                html5QrCode.stop().then(() => {
                    document.getElementById("qr-reader").innerHTML = "";
                    html5QrCode = null;
                    procesoLinkunTatimeve(decodedText);
                });
            }
        ).catch(err => alert("Kamera nuk u hap!"));
    }

    async function procesoLinkunTatimeve(link) {
        // 1. Kapim totalin nga linku menjëherë (për siguri)
        const urlObj = new URL(link.replace('#/', ''));
        const totaliLink = urlObj.searchParams.get("prc") || urlObj.searchParams.get("tot");
        
        document.getElementById("status-kerkimi").classList.remove("hidden");
        shportaObj = {}; // Pastrojmë shportën e vjetër

        // 2. Kërkojmë artikujt nga serveri i Tatimeve (Përmes Proxy)
        // Përdorim AllOrigins për të kaluar CORS mbrojtjen
        const iic = urlObj.searchParams.get("iic");
        const tin = urlObj.searchParams.get("tin");
        const crtd = urlObj.searchParams.get("crtd");

        const targetUrl = `https://efiskalizimi-app.tatime.gov.al/fiscal-resource/api/v1/invoice/verify`;
        
        try {
            const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ iic: iic, tin: tin, crtd: crtd })
            });

            // Shënim: Disa fatura nuk i japin artikujt publikisht, por ne provojmë.
            // Nëse dështon API, përdorim vetëm Totalin nga Linku.
            
            if (totaliLink) {
                shtoNeShporte("Faturë: " + tin, totaliLink);
                alert("U kap totali: " + totaliLink + " L. Artikujt do shtohen te 'Shenimet' automatikisht.");
            }
        } catch (e) {
            if (totaliLink) shtoNeShporte("Faturë e Skanuar", totaliLink);
        } finally {
            document.getElementById("status-kerkimi").classList.add("hidden");
        }
    }

    async function ruajShpenzim() {
        let v = document.getElementById("shuma").value;
        if(!v || v <= 0) return;
        document.getElementById("btn-ruaj").innerText = "...";
        
        let detaje = "";
        for(let x in shportaObj) { detaje += `${x} x${shportaObj[x].s} (${shportaObj[x].c}L)\n`; }
        
        await fetch(URL_SHEET, { method: "POST", body: JSON.stringify({ 
            action: "shto", user: uAktual, kat: "Pazar", shuma: v, shenime: detaje 
        })});
        
        shportaObj = {}; perditesoArken(); 
        document.getElementById("btn-ruaj").innerText = "RUASH SHPENZIMIN ✅";
        merrRaportin();
    }

    async function merrRaportin() {
        const r = await fetch(URL_SHEET, { method: "POST", body: JSON.stringify({ 
            action: "raporti", muaji: document.getElementById("muaji").value, viti: document.getElementById("viti").value, user: uAktual 
        })});
        const d = await r.json();
        document.getElementById("r-mbetja").innerText = d.mbetja.toLocaleString() + " L";
        
        let hHtml = "";
        d.lista.slice(0, 10).forEach(x => {
            hHtml += `<div class="flex justify-between border-b dark:border-slate-700 py-2">
                        <span>${x.k} <small class="block opacity-50 text-[8px]">${x.d}</small></span>
                        <b class="${x.t=='hyrje'?'text-green-500':'text-red-400'}">${x.s.toLocaleString()} L</b>
                      </div>`;
        });
        document.getElementById("historiku-list").innerHTML = hHtml;
        shfaqGrafikun(d.grafiku);
    }

    function shfaqGrafikun(data) {
        let gD = [['Kat', 'L']]; for(let k in data) gD.push([k, data[k]]);
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(() => {
            new google.visualization.PieChart(document.getElementById('piechart')).draw(google.visualization.arrayToDataTable(gD), {
                backgroundColor: 'transparent', colors: ['#3b82f6', '#10b981', '#ef4444', '#f59e0b'],
                legend: { position: 'right', textStyle: { color: '#ffffff', fontSize: 9 } },
                chartArea: {width:'100%', height:'80%'}, pieHole: 0.4
            });
        });
    }

    function shkarkoPDF() { alert("Gjenerimi i PDF nisi..."); }
</script>
</body>
</html>
