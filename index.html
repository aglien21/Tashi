<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bateri Origjinale Intact - Sistemi i Rishitësve</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .hidden { display: none; }
        
        /* Header */
        header { background: #1e2a38; color: white; padding: 15px 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; border-radius: 0 0 15px 15px; }
        .logo { height: 60px; }
        .center-header { text-align: center; }
        .client-name-display { text-align: right; font-size: 1.2em; font-weight: bold; color: #f39c12; }

        /* Login Box */
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 100px auto; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-login { width: 100%; background: #2980b9; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Grid i Baterive */
        .battery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 15px; text-align: center; position: relative; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 160px; object-fit: contain; }
        .badge { position: absolute; top: 10px; left: 10px; background: #f39c12; color: white; padding: 5px 8px; font-size: 11px; border-radius: 5px; font-weight: bold; }
        .name { font-weight: bold; margin: 10px 0; font-size: 14px; height: 40px; overflow: hidden; }
        .price { color: #27ae60; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .qty-input { width: 60px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        
        /* Footer/Cart Info */
        .cart-summary { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 30px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .total-large { font-size: 20px; font-weight: bold; color: #2c3e50; }
        .btn-send { background: #25D366; color: white; padding: 12px 25px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* Admin Panel */
        .admin-table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        .admin-table th, .admin-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    </style>
</head>
<body>

    <div id="login-section" class="login-box">
        <img src="https://www.intact-batterien.de/templates/intact/img/logo.png" style="width:150px; margin-bottom:20px;">
        <h2>Hyrja për Rishitës</h2>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn-login" onclick="login()">HYR NË SISTEM</button>
        <p id="error" style="color:red; font-size:13px;"></p>
    </div>

    <div id="main-section" class="hidden">
        <header>
            <div><img src="https://www.intact-batterien.de/templates/intact/img/logo.png" class="logo"></div>
            <div class="center-header">
                <h1 style="margin:0; font-size:18px;">Bateri Origjinale Intact</h1>
                <div style="font-size:12px;">Bilanci: <b id="display-bilanci">0</b> LEK</div>
            </div>
            <div class="client-name-display" id="display-user"></div>
        </header>

        <div class="container">
            <div class="battery-grid" id="batteryContainer"></div>
        </div>

        <div class="cart-summary">
            <div class="total-large">Totali: <span id="grandTotal">0</span> LEK</div>
            <button class="btn-send" onclick="dergoPorosine()">DËRGO POROSINË ✅</button>
        </div>
        <div style="height: 100px;"></div> </div>

    <div id="admin-section" class="container hidden">
        <h2 style="text-align:center">Paneli Admin</h2>
        <table class="admin-table">
            <thead><tr><th>Përdoruesi</th><th>Roli</th></tr></thead>
            <tbody id="admin-list"></tbody>
        </table>
        <button onclick="location.reload()" class="btn-login" style="background:#555; margin-top:20px;">Dil</button>
    </div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyO-gBlmms9yIdDJ1g88GxFP-OR_3vwJHXwcizdDEaCRFRY5LTrZfR6Eu2JuIPHDnGSMA/exec";
    const TEL_NR = "355692336829";

    const users = {
        "admin": "shefi2026",
        "ian": "1234",
        "jon": "1619",
        "aglien": "1684",
        "arjan": "2024" // Shtova Arjanin si klient
    };

    const batteries = [
        {name:"Intact Premium 50Ah (540A) [PP50MF]", price:6300},
        {name:"Intact Start 62Ah (540A) [56219]", price:6500},
        {name:"Intact Start 74Ah (680A) [57412]", price:7500, badge:"🔥Best Seller"},
        {name:"Intact Premium 78Ah (760A) [PP78MF]", price:9000},
        {name:"Intact Start 100Ah (850A) [60044]", price:10200, badge:"🔥Best Seller"},
        {name:"Intact Premium 100Ah (900A) [PP100MF]", price:11900},
        {name:"Intact Start 100Ah (850A) [60032]", price:10200},
        {name:"Intact Start-Stop 70Ah (760A) [EFB70SS]", price:10500},
        {name:"Intact Start-Stop 70Ah (760A) [AGM70SS]", price:13000},
        {name:"Intact Start 115Ah (1000A) [60210]", price:14875},
        {name:"Intact Start-Stop 80Ah (800A) [AGM80SS]", price:15400},
        {name:"Intact Start-Stop 95Ah (850A) [AGM95SS]", price:16900, badge:"🔥Best Seller"},
        {name:"Intact Start-Stop 105Ah (950A) [AGM105SS]", price:20400},
        {name:"Intact Start 180Ah (1000A) [68032SHD]", price:21000, badge:"🔥Best Seller"},
        {name:"Intact Start 225Ah (1150A) [72512SHD]", price:26000, badge:"🔥Best Seller"}
    ];

    const images = {
        "PP50MF":"https://www.intact-batterien.de/packshots/intact_premium_power_b_pp50mf_00_450.jpg",
        "56219":"https://www.intact-batterien.de/packshots/intact_start_power_b_56219gug_00_450.jpg",
        "57412":"https://www.intact-batterien.de/packshots/intact_start_power_b_57412gug_00_450.jpg",
        "PP78MF":"https://www.intact-batterien.de/packshots/intact_premium_power_b_pp78mf_00_450.jpg",
        "60044":"https://www.intact-batterien.de/packshots/intact_start_power_b_60044gug_00_450.jpg",
        "PP100MF":"https://www.intact-batterien.de/packshots/intact_premium_power_b_pp100mf_00_450.jpg",
        "60032":"https://www.intact-batterien.de/packshots/intact_start_power_asia_b_60032gug_00_450.jpg",
        "EFB70SS":"https://www.intact-batterien.de/packshots/intact_startstop_power_efb_b_efb70ss_00_450.jpg",
        "AGM70SS":"https://www.intact-batterien.de/packshots/intact_startstop_power_agm_b_agm70ss_00_450.jpg",
        "60210":"https://www.intact-batterien.de/packshots/intact_start_power_truck_b_60210gug_00_450.jpg",
        "AGM80SS":"https://www.intact-batterien.de/packshots/intact_startstop_power_agm_b_agm80ss_00_450.jpg",
        "AGM95SS":"https://www.intact-batterien.de/packshots/intact_startstop_power_agm_b_agm95ss_00_450.jpg",
        "AGM105SS":"https://www.intact-batterien.de/packshots/intact_startstop_power_agm_b_agm105ss_00_450.jpg",
        "68032SHD":"https://www.intact-batterien.de/packshots/intact_start_power_truck_b_68032shdgug_00_450.jpg",
        "72512SHD":"https://www.intact-batterien.de/packshots/intact_start_power_truck_b_72512shdgug_00_450.jpg"
    };

    let currentUser = "";

    function login() {
        let u = document.getElementById('user').value.toLowerCase();
        let p = document.getElementById('pass').value;

        if (u === "admin" && users[u] === p) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('admin-section').classList.remove('hidden');
            renderAdmin();
        } else if (users[u] && users[u] === p) {
            currentUser = u;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('display-user').innerText = u.toUpperCase();
            renderCatalog();
            refreshBilanci();
        } else {
            document.getElementById('error').innerText = "Username ose Password gabim!";
        }
    }

    function renderCatalog() {
        const container = document.getElementById("batteryContainer");
        container.innerHTML = "";
        batteries.forEach((b, i) => {
            const code = b.name.match(/\[(.*?)\]/)[1];
            const img = images[code] || "https://via.placeholder.com/150";
            container.innerHTML += `
                <div class="card">
                    ${b.badge ? `<div class="badge">${b.badge}</div>` : ""}
                    <img src="${img}">
                    <div class="name">${b.name}</div>
                    <div class="price">${b.price.toLocaleString()} LEK</div>
                    <div class="qty-box">
                        Sasia: <input type="number" value="0" min="0" class="qty-input" oninput="updateGrandTotal()">
                    </div>
                </div>`;
        });
    }

    function updateGrandTotal() {
        let total = 0;
        document.querySelectorAll('.card').forEach((card, i) => {
            let sasia = parseInt(card.querySelector('.qty-input').value) || 0;
            total += sasia * batteries[i].price;
        });
        document.getElementById('grandTotal').innerText = total.toLocaleString();
    }

    function refreshBilanci() {
        let b = localStorage.getItem('bilanci_' + currentUser) || 0;
        document.getElementById('display-bilanci').innerText = parseFloat(b).toLocaleString();
    }

    function dergoPorosine() {
        let totaliSot = 0;
        let infoText = "";
        document.querySelectorAll('.card').forEach((card, i) => {
            let sasia = parseInt(card.querySelector('.qty-input').value) || 0;
            if (sasia > 0) {
                let vlefta = sasia * batteries[i].price;
                totaliSot += vlefta;
                infoText += `▪️ ${batteries[i].name}: ${sasia} copë\n`;
            }
        });

        if (totaliSot <= 0) { alert("Ju lutem zgjidhni sasinë!"); return; }

        // Ruaj ne Google Sheets
        fetch(GOOGLE_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ user: currentUser, detajet: infoText.replace(/\n/g, ", "), vlera: totaliSot })
        });

        // Bilanci Lokal
        let bilanciVjeter = parseFloat(localStorage.getItem('bilanci_' + currentUser) || 0);
        let bilanciRi = bilanciVjeter + totaliSot;
        localStorage.setItem('bilanci_' + currentUser, bilanciRi);

        // WhatsApp
        let msg = `*POROSI E RE - INTACT*\n👤 Nga: ${currentUser.toUpperCase()}\n\n${infoText}\n💰 Totali: ${totaliSot.toLocaleString()} LEK\n📈 Bilanci vjetor: ${bilanciRi.toLocaleString()} LEK`;
        window.open(`https://wa.me/${TEL_NR}?text=${encodeURIComponent(msg)}`, '_blank');

        // Reset
        document.querySelectorAll('.qty-input').forEach(input => input.value = 0);
        updateGrandTotal();
        refreshBilanci();
    }

    function renderAdmin() {
        const list = document.getElementById('admin-list');
        for (let u in users) {
            if (u !== "admin") {
                list.innerHTML += `<tr><td>${u}</td><td>Rishitës</td></tr>`;
            }
        }
    }
</script>
</body>
</html>
