<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Ultimate - Ian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .box { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .pad { background: white; border: 2px solid #e2e8f0; padding: 12px; border-radius: 15px; text-align: center; cursor: pointer; font-weight: 800; font-size: 11px; transition: 0.2s; }
        .pad.active { border-color: #2563eb; background: #2563eb; color: white; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4">

<div id="login-ui" class="max-w-xs mx-auto mt-20 box text-center">
    <h1 class="text-2xl font-black mb-6 italic">Finance <span class="text-blue-600">APP</span></h1>
    <div id="status-load" class="text-[10px] text-slate-400 mb-4 uppercase font-bold tracking-widest">Duke u lidhur me serverin...</div>
    <select id="user-select" class="w-full p-4 mb-3 rounded-2xl border-2 font-bold bg-slate-50 outline-none border-slate-100"></select>
    <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-6 rounded-2xl border-2 text-center font-bold outline-none border-slate-100" inputmode="numeric">
    <button onclick="login()" id="btn-login" disabled class="w-full p-4 bg-slate-300 text-white rounded-2xl font-black">PRIT...</button>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden pt-2">
    <div class="box text-center">
        <input id="shuma" type="number" placeholder="0 L" class="w-full text-center text-5xl font-black text-blue-600 outline-none mb-6" inputmode="numeric">
        <div id="kategorite-grid" class="grid grid-cols-2 gap-2 mb-6">
            </div>
        <button id="btn-save" onclick="regjistroGjithcka()" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black shadow-lg uppercase active:scale-95 transition-all">REGJISTRO ✅</button>
    </div>

    <div class="box">
        <h3 class="text-[10px] font-black uppercase text-slate-400 mb-4 text-center">Statistikat e Muajit</h3>
        <canvas id="myChart" style="max-height: 180px;"></canvas>
    </div>
</div>

<script>
    const SHEET_ID = "10G3upOlUypMC_ITUu1jtWa8LQRWTtw1oVgCVP88AqIs";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxWPW1VeQyvhT6O_6JjUotS85NdFdgm0sIA42rmkpDfz7X6rdORMmkGaRrnyJibOaRB/exec"; // Linku i Deployment nga Apps Script
    
    let dbPerdoruesit = {};
    let uAktual = "", katZgjedhur = "", chartInstance = null;

    // 1. NGARKIMI I TE DHENAVE DINAMIKE
    async function loadConfig() {
        try {
            // Lexojmë të dhënat (Përdoruesit & Kategoritë)
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            
            let userHTML = "";
            rows.forEach(r => {
                const cols = r.split('","').map(c => c.replace(/"/g, ''));
                if(cols[0] && cols[1]) {
                    dbPerdoruesit[cols[0]] = cols[1].trim(); // Emri: PIN
                    userHTML += `<option value="${cols[0]}">${cols[0]}</option>`;
                }
            });
            
            document.getElementById('user-select').innerHTML = userHTML;
            document.getElementById('btn-login').disabled = false;
            document.getElementById('btn-login').className = "w-full p-4 bg-slate-900 text-white rounded-2xl font-black";
            document.getElementById('btn-login').innerText = "HYR";
            document.getElementById('status-load').innerText = "Serveri Online";

            // Kategoritë (për thjeshtësi po i lëmë këtu, por mund t'i marrësh dhe ato me fetch)
            const kats = ["Ushqim", "Transport", "Qejf", "Market", "Fatura", "Të tjera"];
            let katHTML = "";
            kats.forEach(k => {
                katHTML += `<div class="pad" onclick="setKat(this, '${k}')">${k}</div>`;
            });
            document.getElementById('kategorite-grid').innerHTML = katHTML;

        } catch (e) {
            document.getElementById('status-load').innerText = "Gabim në lidhje!";
        }
    }

    function login() {
        const u = document.getElementById("user-select").value;
        const p = document.getElementById("pass").value;
        if(dbPerdoruesit[u] === p) {
            uAktual = u;
            document.getElementById("login-ui").style.display = "none";
            document.getElementById("app-ui").classList.remove("hidden");
            buildChart();
        } else alert("PIN i gabuar!");
    }

    function setKat(el, kat) {
        document.querySelectorAll('.pad').forEach(p => p.classList.remove('active'));
        el.classList.add('active'); 
        katZgjedhur = kat;
    }

    async function regjistroGjithcka() {
        const sh = document.getElementById("shuma").value;
        if(!sh || !katZgjedhur) return alert("Plotëso të dhënat!");
        
        const btn = document.getElementById('btn-save');
        btn.innerHTML = '<div class="loading-spinner"></div> DUKE U RUAJTUR...';
        btn.disabled = true;

        const data = { emri: uAktual, kategoria: katZgjedhur, shuma: sh };

        try {
            // Dërgimi te Apps Script (ai merret me Sheets dhe Telegram vetë)
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
            
            alert("U regjistrua! Kontrollo Telegramin. ✅");
            document.getElementById("shuma").value = "";
            btn.innerHTML = "REGJISTRO ✅";
            btn.disabled = false;
            buildChart(); // Rifresko grafikun
        } catch (e) {
            alert("Gabim! Provo sërish.");
            btn.innerHTML = "REGJISTRO ✅";
            btn.disabled = false;
        }
    }

    async function buildChart() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Log`);
            const data = await res.text();
            const rows = data.split('\n').slice(1).map(r => r.split('","').map(c => c.replace(/"/g, '')));
            
            let katsData = {};
            rows.forEach(cols => {
                if(cols[2] && cols[3]) {
                    const v = parseFloat(cols[3]);
                    katsData[cols[2]] = (katsData[cols[2]] || 0) + v;
                }
            });

            const ctx = document.getElementById('myChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(katsData),
                    datasets: [{
                        data: Object.values(katsData),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#64748b'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } } }
            });
        } catch (e) { console.log("Grafiku nuk u ngarkua"); }
    }

    loadConfig();
</script>
</body>
</html>
