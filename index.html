<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa Family V5.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --bg: #f1f5f9; --box: #ffffff; --txt: #000000; --border: #cbd5e1; }
        .dark { --bg: #0f172a; --box: #1e293b; --txt: #ffffff; --border: #334155; }
        body { background: var(--bg); color: var(--txt); font-family: sans-serif; transition: 0.3s; }
        
        /* Pads - Ngjyra te qarta per Day Mode */
        .pad { 
            background: var(--box); 
            border: 2px solid var(--border); 
            border-radius: 20px; 
            padding: 20px; 
            text-align: center; 
            font-weight: 900; 
            color: #1e293b; /* Tekst i zi/gri i forte */
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 11px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        .dark .pad { color: #f8fafc; }
        .pad:active { background: #3b82f6; color: white; transform: scale(0.95); }
        
        .box { background: var(--box); border-radius: 30px; border: 1px solid var(--border); padding: 20px; }
        select, input { background: var(--box); color: var(--txt); border: 2px solid var(--border); border-radius: 15px; width: 100%; padding: 12px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

<div id="login-ui" class="max-w-xs mx-auto mt-10 text-center">
    <h1 class="text-3xl font-black text-blue-600 mb-8 tracking-tighter">FINANCA<br>FAMILY</h1>
    <div class="box shadow-xl">
        <select id="user-select" class="mb-4"></select>
        <input id="pass" type="password" placeholder="PIN" class="text-center mb-6" inputmode="numeric">
        <button onclick="login()" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-black shadow-lg">HYNI</button>
    </div>
    <p id="loading-msg" class="mt-4 text-xs font-bold text-slate-400">Duke u lidhur...</p>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="p-8 bg-slate-900 rounded-[40px] text-center mb-6 shadow-2xl">
        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest mb-2">Mbetja e muajit</p>
        <h2 id="r-mbetja" class="text-4xl font-black text-green-400">0 L</h2>
    </div>

    <div class="flex justify-between items-center mb-4 px-2">
        <h3 id="kat-title" class="font-black uppercase text-[10px] text-slate-500">Kategoritë</h3>
        <button id="btn-back" onclick="shfaqKats()" class="hidden text-[10px] font-black text-blue-600 bg-blue-100 px-4 py-1 rounded-full">← MBRAPA</button>
    </div>
    
    <div id="kategori-pads" class="grid grid-cols-3 gap-3 mb-8"></div>

    <div class="box border-2 border-blue-500/20 shadow-lg">
        <input id="shuma" type="number" class="text-4xl text-center font-black border-none mb-2" placeholder="0 L" readonly>
        <div id="shporta-info" class="text-center text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-tighter italic">Zgjidh diçka...</div>
        <button onclick="ruaj()" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black shadow-lg active:bg-blue-700">PAGUAJ ✅</button>
    </div>
</div>

<script>
    // URL-ja juaj aktuale
    const URL = "https://script.google.com/macros/s/AKfycbyq_0VquRxRNciMafdyYwTst0n4Pv7y8ecE4FebqB21bUxSVkQ8DuggA9hE__O_rLJZ/exec";
    let allData = { users: [], kats: [], nens: [] };
    let uAktual = "", katAktuale = "", totali = 0;

    window.onload = async () => {
        try {
            const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
            const d = await r.json();
            
            // Logjika "Smart" per te lexuar kolonat pavaresisht nese jane emra apo lista
            allData.users = d.users || [];
            allData.kats = d.kats || [];
            allData.nens = d.nens || [];

            if (allData.users.length > 0) {
                let h = "";
                allData.users.forEach(u => {
                    let emri = u.Emri || u.emri || u[0]; // Provon te gjitha formatet
                    if(emri && emri !== "Emri") h += `<option value="${emri}">${emri}</option>`;
                });
                document.getElementById("user-select").innerHTML = h;
                document.getElementById("loading-msg").innerText = "Lidhja u krye.";
            }
        } catch (e) {
            document.getElementById("loading-msg").innerText = "Gabim në ngarkim!";
        }
    };

    function login() {
        const sel = document.getElementById("user-select").value;
        const pin = document.getElementById("pass").value;
        const user = allData.users.find(u => {
            let uEmri = u.Emri || u.emri || u[0];
            let uPin = u.Pin || u.pin || u[1];
            return uEmri === sel && String(uPin) === pin;
        });

        if (user) {
            uAktual = sel;
            document.getElementById("login-ui").classList.add("hidden");
            document.getElementById("app-ui").classList.remove("hidden");
            shfaqKats();
            merrRaportin();
        } else alert("PIN i gabuar!");
    }

    function shfaqKats() {
        document.getElementById("btn-back").classList.add("hidden");
        document.getElementById("kat-title").innerText = "Kategoritë";
        let h = "";
        allData.kats.forEach(k => {
            let emri = k.emri || k.Emri || k[0];
            let kaNen = k.ka_nenkategori || k.ka_nen || k[1];
            if(emri && emri !== "emri") {
                let func = (kaNen == "Po" || kaNen == "po") ? `shfaqNens('${emri}')` : `shto('${emri}', '${k.limiti || k[2]}')`;
                h += `<div class="pad" onclick="${func}">${emri}</div>`;
            }
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shfaqNens(prindi) {
        document.getElementById("btn-back").classList.remove("hidden");
        document.getElementById("kat-title").innerText = prindi;
        let h = "";
        allData.nens.filter(n => (n.Prindi || n.prindi || n[0]) === prindi).forEach(n => {
            let emri = n.emri || n.Emri || n[1];
            let cmimi = n.cmimi || n.Cmimi || n[2];
            h += `<div class="pad border-blue-200 bg-blue-50/30" onclick="shto('${emri}', '${cmimi}')">${emri}</div>`;
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shto(e, c) {
        let v = parseFloat(c) || 0;
        if (v === 0) v = parseFloat(prompt("Vendos çmimin për " + e)) || 0;
        totali = v; katAktuale = e;
        document.getElementById("shuma").value = totali;
        document.getElementById("shporta-info").innerText = e + " - " + totali + " L";
    }

    async function merrRaportin() {
        const sot = new Date();
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: sot.getMonth()+1, viti: sot.getFullYear() }) });
        const d = await r.json();
        document.getElementById("r-mbetja").innerText = d.mbetja.toLocaleString() + " L";
    }

    async function ruaj() {
        if (!totali) return alert("Zgjidh diçka!");
        const btn = document.querySelector("button[onclick='ruaj()']");
        btn.innerText = "Duke u ruajtur...";
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto", user: uAktual, kat: katAktuale, shuma: totali }) });
        alert("U ruajt!");
        location.reload();
    }
</script>
</body>
</html>
