<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa Family Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root { --bg: #f8fafc; --box: white; --txt: #0f172a; --border: #e2e8f0; }
        .dark { --bg: #020617; --box: #0f172a; --txt: #f8fafc; --border: #1e293b; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.3s; overflow-x: hidden; }
        .box { background: var(--box); padding: 20px; border-radius: 28px; border: 1px solid var(--border); }
        .pad { background: var(--box); padding: 15px; border-radius: 20px; text-align: center; border: 1px solid var(--border); cursor: pointer; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .pazar-done { opacity: 0.4; text-decoration: line-through; background: #94a3b8 !important; border: none !important; }
        .glow-logo { text-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 pb-24">

<div id="login-ui" class="fixed inset-0 z-[200] bg-slate-950 flex items-center justify-center p-6 text-center">
    <div class="w-full max-w-xs p-8 rounded-[40px] bg-slate-900 border border-blue-500/20 shadow-2xl">
        <span class="text-7xl block mb-4 drop-shadow-[0_0_15px_rgba(59,130,246,0.8)]">💎</span>
        <h2 class="text-white text-3xl font-black mb-1 glow-logo italic uppercase tracking-tighter">Financa <span class="text-blue-500">Pro</span></h2>
        <p class="text-slate-500 text-[9px] tracking-[4px] uppercase font-bold mb-8">Secure Vault v3.5</p>
        <select id="user-select" class="w-full p-4 mb-3 rounded-2xl bg-slate-800 text-white border border-slate-700 outline-none text-center font-bold"></select>
        <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-8 rounded-2xl text-center text-xl font-black bg-white outline-none" inputmode="numeric">
        <button id="btn-login" class="w-full p-5 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-black uppercase transition-all shadow-lg shadow-blue-900/40">Hyni në Sistem</button>
    </div>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="flex justify-between items-center mb-4 gap-2">
        <button onclick="toggleDark()" class="p-3 bg-slate-200 dark:bg-slate-800 rounded-2xl">🌙</button>
        <div class="flex gap-1 flex-1">
            <select id="muaji" class="p-2 bg-white dark:bg-slate-800 rounded-xl text-[10px] font-bold outline-none flex-1 border border-slate-200 dark:border-slate-700"></select>
            <select id="viti" class="p-2 bg-white dark:bg-slate-800 rounded-xl text-[10px] font-bold outline-none flex-1 border border-slate-200 dark:border-slate-700"></select>
        </div>
        <button class="p-3 bg-blue-600 text-white rounded-2xl font-black text-[10px]">PDF 📄</button>
    </div>

    <div class="p-6 bg-slate-900 rounded-[35px] mb-4 text-center text-white shadow-xl border border-blue-500/10">
        <h1 id="r-mbetja" class="text-4xl font-black text-blue-400 mb-2">0 L</h1>
        <div id="piechart" style="width: 100%; height: 160px;"></div>
        <div class="mt-4 px-2 text-[10px] font-black uppercase">
            <div class="flex justify-between mb-1"><span>Dalje / Limiti</span> <span id="txt-limit">0 / 0 L</span></div>
            <div class="w-full bg-white/10 rounded-full h-2 overflow-hidden"><div id="bar-limit" class="bg-blue-500 h-full w-0 transition-all duration-1000"></div></div>
        </div>
    </div>

    <button onclick="hapModalFonde()" class="w-full mb-4 p-4 bg-green-600 text-white rounded-2xl font-black uppercase shadow-md flex justify-center items-center gap-2">SHTO FONDE 💵</button>

    <div class="box mb-4 bg-gradient-to-br from-indigo-700 to-blue-900 text-white border-none shadow-xl">
        <div class="flex justify-between items-center mb-2 italic">
            <input id="obj-emri" class="bg-transparent border-none text-xs font-bold text-white outline-none w-1/2" onchange="syncKursim()" placeholder="Emri i kursimit">
            <span id="obj-perq" class="text-[10px] font-black bg-white/20 px-2 py-1 rounded-md">0%</span>
        </div>
        <div class="w-full bg-black/20 rounded-full h-1.5 mb-3">
            <div id="obj-bar" class="bg-white h-full rounded-full transition-all duration-700" style="width: 0%"></div>
        </div>
        <div class="flex justify-between items-center px-1">
            <span id="obj-vlerat" class="text-[11px] font-black">0 / 0 L</span>
            <div class="flex gap-2">
                <button onclick="shtoKursim()" class="bg-green-500 text-[9px] font-black px-3 py-2 rounded-xl">+ SHTO</button>
                <button onclick="ndryshoSynimin()" class="bg-white/20 text-[9px] font-black px-3 py-2 rounded-xl">🎯</button>
                <button onclick="zeroKursimet()" class="bg-red-500 text-[9px] font-black px-3 py-2 rounded-xl">0️⃣</button>
            </div>
        </div>
    </div>

    <div class="box mb-4 border-2 border-blue-400 bg-blue-50/5">
        <h3 class="text-[10px] font-black uppercase text-blue-600 mb-3 flex justify-between items-center">
            <span>🛒 Lista e Pazarit</span>
            <button onclick="pastroBlerat()" class="text-red-500 bg-red-50 px-2 py-1 rounded-lg text-[8px] font-bold">FSHI TË BLERAT</button>
        </h3>
        <div class="flex gap-2 mb-3">
            <button onclick="shfaqModalKatsPazar()" class="bg-white dark:bg-slate-800 border border-blue-200 p-3 rounded-xl text-xs font-bold">📂 Kategoritë</button>
            <input id="pazar-input" type="text" placeholder="Artikull tjetër..." class="flex-1 p-3 rounded-xl text-xs outline-none bg-white dark:bg-slate-800 border border-blue-200">
            <button onclick="shtoNePazarManual()" class="bg-blue-600 text-white px-4 rounded-xl font-black text-xs">OK</button>
        </div>
        <div id="pazar-lista" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto"></div>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-6" id="main-kats"></div>

    <div class="box mb-6 border-2 border-blue-600 shadow-xl text-center relative">
        <button onclick="shportaObj={}; perditesoArken();" class="absolute top-4 right-4">🗑️</button>
        <input id="shuma" type="number" placeholder="0 L" class="text-4xl font-black text-blue-600 bg-transparent w-full text-center outline-none" readonly>
        <div id="shporta-list" class="bg-slate-100 dark:bg-slate-800 p-3 rounded-xl mt-2 text-[11px] font-bold text-slate-500 text-left min-h-[40px]">Shporta bosh...</div>
        <button id="btn-ruaj" onclick="ruajShpenzim()" class="w-full mt-4 p-4 bg-blue-600 text-white rounded-2xl font-black uppercase">PAGUAJ ✅</button>
    </div>

    <div class="box mb-4"><h3 class="text-[10px] font-black uppercase text-slate-400 mb-3">Historiku</h3><div id="historiku-list" class="space-y-2 text-[11px]"></div></div>
</div>

<div id="modal-full" class="fixed inset-0 bg-black/95 hidden z-[300] p-6 overflow-y-auto">
    <div class="flex justify-between items-center mb-6">
        <h2 id="modal-titulli" class="text-white font-black uppercase tracking-widest">Zgjidh Kategorinë</h2>
        <button onclick="mbyllModalFull()" class="text-white text-3xl font-light">&times;</button>
    </div>
    <div id="modal-content" class="grid grid-cols-2 gap-4"></div>
</div>

<div id="modal-manual" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[400]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[35px] p-6 text-center">
        <h3 id="manual-titulli" class="text-sm font-black mb-4 uppercase text-blue-600">Vendos Shumën</h3>
        <input id="manual-input" type="number" class="w-full p-5 mb-4 rounded-2xl font-black text-4xl text-center border-2 border-blue-200 outline-none" inputmode="decimal">
        <div class="flex gap-2">
            <button onclick="document.getElementById('modal-manual').classList.add('hidden')" class="w-1/4 p-4 bg-slate-100 dark:bg-slate-700 rounded-2xl font-black italic">X</button>
            <button onclick="shtoNgaModal()" class="w-3/4 p-4 bg-blue-600 text-white rounded-2xl font-black uppercase">SHTO</button>
        </div>
    </div>
</div>

<script>
    google.charts.load('current', {'packages':['corechart']});
    const URL = "https://script.google.com/macros/s/AKfycbzVA__hFM3tE_IQpZua9wlMsqtG-bxMmZVCmcXU99IiJlEzBqM-jSU2OAFNXjxSdKvn/exec"; 

    let uAktual="", allData={}, shportaObj={}, pazarData=[], katAktuale="";

    window.onload = async () => {
        const m = document.getElementById("muaji"), v = document.getElementById("viti");
        const muajt = ["Janar","Shkurt","Mars","Prill","Maj","Qershor","Korrik","Gusht","Shtator","Tetor","Nëntor","Dhjetor"];
        muajt.forEach((emri, i) => m.innerHTML += `<option value="${i+1}" ${i+1==new Date().getMonth()+1?'selected':''}>${emri}</option>`);
        for(let i=2025; i<=2027; i++) v.innerHTML += `<option value="${i}" ${i==2026?'selected':''}>${i}</option>`;
        if(localStorage.getItem("dark-mode") === "true") document.body.classList.add("dark");
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
        allData = await r.json();
        allData.users.forEach(u => document.getElementById("user-select").innerHTML += `<option value="${u}">${u}</option>`);
    };

    function toggleDark() { localStorage.setItem("dark-mode", document.body.classList.toggle("dark")); }

    document.getElementById("btn-login").onclick = async () => {
        const u = document.getElementById("user-select").value, p = document.getElementById("pass").value;
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "login", user: u, pass: p }) });
        if((await r.json()).status == "ok") {
            uAktual = u; document.getElementById("login-ui").classList.add("hidden"); 
            document.getElementById("app-ui").classList.remove("hidden");
            shfaqKatsMain(); fetchPazar(); merrRaportin(); initKursimet();
        } else alert("PIN i gabuar!");
    };

    function shfaqKatsMain() {
        let h = ""; allData.kats.forEach(k => { if(k.emri !== "Të Ardhura") h += `<div class="pad" onclick="shfaqModalFull('${k.emri}')">${k.emri}</div>`; });
        document.getElementById("main-kats").innerHTML = h;
    }

    function shfaqModalFull(titulli) {
        katAktuale = titulli;
        document.getElementById("modal-titulli").innerText = titulli;
        let h = "", filter = allData.nenkats.filter(n => n.prindi == titulli);
        if(filter.length > 0) {
            filter.forEach(n => { h += `<div class="pad bg-slate-800 text-white border-slate-700" onclick="shtoArtikull('${n.emri}', ${n.cmimi})">${n.emri}${n.cmimi>0?'<br><small>'+n.cmimi+'L</small>':''}</div>`; });
        } else { h = `<div class="col-span-2 pad bg-blue-600 text-white" onclick="mbyllModalFull(); shfaqModalManual('${titulli}')">VENDOS SHUMËN MANUALE</div>`; }
        document.getElementById("modal-content").innerHTML = h;
        document.getElementById("modal-full").classList.remove("hidden");
    }

    function shfaqModalKatsPazar() {
        document.getElementById("modal-titulli").innerText = "Shto në Pazar";
        let h = ""; allData.kats.forEach(k => { if(k.emri !== "Të Ardhura") h += `<div class="pad bg-blue-900 text-white" onclick="shtoPazar('${k.emri}'); mbyllModalFull();">${k.emri}</div>`; });
        document.getElementById("modal-content").innerHTML = h;
        document.getElementById("modal-full").classList.remove("hidden");
    }

    function mbyllModalFull() { document.getElementById("modal-full").classList.add("hidden"); }

    function shtoArtikull(e, c) {
        if(c > 0) { shtoNeShporte(e, c); mbyllModalFull(); }
        else { mbyllModalFull(); shfaqModalManual(e); }
    }

    function shfaqModalManual(e) {
        katAktuale = e; document.getElementById("manual-titulli").innerText = e;
        document.getElementById("manual-input").value = "";
        document.getElementById("modal-manual").classList.remove("hidden");
        setTimeout(()=>document.getElementById("manual-input").focus(), 200);
    }

    function shtoNgaModal() {
        let v = document.getElementById("manual-input").value;
        if(v > 0) { shtoNeShporte(katAktuale, v); document.getElementById("modal-manual").classList.add("hidden"); }
    }

    function shtoNeShporte(e, c) {
        shportaObj[e] = shportaObj[e] ? {s: shportaObj[e].s+1, c: c} : {s: 1, c: c};
        perditesoArken();
    }

    function perditesoArken() {
        let t = 0, h = ""; for(let x in shportaObj) { t += (shportaObj[x].s*shportaObj[x].c); h += `<div class="flex justify-between py-1 uppercase"><span>${x} x${shportaObj[x].s}</span><span>${shportaObj[x].s*shportaObj[x].c}L</span></div>`; }
        document.getElementById("shuma").value = t; document.getElementById("shporta-list").innerHTML = h || "Shporta bosh...";
    }

    async function ruajShpenzim() {
        let t = document.getElementById("shuma").value; if(t<=0) return;
        document.getElementById("btn-ruaj").innerText = "...";
        let detaje = ""; for(let x in shportaObj) detaje += `${x} x${shportaObj[x].s}\n`;
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto", user: uAktual, kat: Object.keys(shportaObj)[0], shuma: t, shenime: detaje }) });
        shportaObj={}; perditesoArken(); document.getElementById("btn-ruaj").innerText = "PAGUAJ ✅"; merrRaportin();
    }

    // --- PAZARI ---
    function shtoPazar(e) { pazarData.push({emri: e, done: false}); shfaqPazarin(); syncPazar(); }
    function shtoNePazarManual() { let v = document.getElementById("pazar-input").value; if(v){ shtoPazar(v); document.getElementById("pazar-input").value=""; } }
    function shfaqPazarin() {
        let h = ""; pazarData.forEach((p, i) => { h += `<div class="pad ${p.done?'pazar-done':'bg-blue-600 text-white border-none'}" onclick="veprimPazar(${i})">${p.emri}</div>`; });
        document.getElementById("pazar-lista").innerHTML = h;
    }
    function veprimPazar(i) {
        if(!pazarData[i].done) { shfaqModalManual(pazarData[i].emri); pazarData[i].done = true; }
        else pazarData[i].done = false;
        shfaqPazarin(); syncPazar();
    }
    function pastroBlerat() { pazarData = pazarData.filter(p => !p.done); shfaqPazarin(); syncPazar(); }
    async function syncPazar() { fetch(URL, { method: "POST", body: JSON.stringify({ action: "sync_pazar", pazar_list: JSON.stringify(pazarData) }) }); }
    async function fetchPazar() { const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_pazar" }) }); const d = await r.json(); pazarData = JSON.parse(d.pazar_list || "[]"); shfaqPazarin(); }

    // --- KURSIMET ---
    function initKursimet() {
        document.getElementById("obj-emri").value = localStorage.getItem("obj_emri") || "Kursimi im";
        perditesoKasaforten();
    }
    function perditesoKasaforten() {
        let m = parseFloat(localStorage.getItem("kursime_mbledhura")) || 0, t = parseFloat(localStorage.getItem("obj_vlera")) || 0;
        let p = t > 0 ? Math.min((m/t)*100, 100) : 0;
        document.getElementById("obj-bar").style.width = p + "%";
        document.getElementById("obj-perq").innerText = Math.floor(p) + "%";
        document.getElementById("obj-vlerat").innerText = `${m.toLocaleString()} / ${t.toLocaleString()} L`;
    }
    async function syncKursim() {
        const e = document.getElementById("obj-emri").value; localStorage.setItem("obj_emri", e);
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "sync_kursim", user: uAktual, emri: e, mbledhur: localStorage.getItem("kursime_mbledhura"), synimi: localStorage.getItem("obj_vlera") }) });
    }
    async function shtoKursim() {
        let v = prompt("Shto Lekë:");
        if(v > 0) {
            localStorage.setItem("kursime_mbledhura", (parseFloat(localStorage.getItem("kursime_mbledhura"))||0)+parseFloat(v));
            perditesoKasaforten(); syncKursim();
            await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto", user: uAktual, kat: "Kursime", shuma: v, shenime: "Kursim" }) });
            merrRaportin();
        }
    }
    function ndryshoSynimin() { let t = prompt("Synimi:"); if(t){ localStorage.setItem("obj_vlera", t); perditesoKasaforten(); syncKursim(); } }
    function zeroKursimet() { if(confirm("Zero kursimet?")) { localStorage.setItem("kursime_mbledhura", 0); perditesoKasaforten(); syncKursim(); } }

    async function merrRaportin() {
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: document.getElementById("muaji").value, viti: document.getElementById("viti").value, user: uAktual }) });
        const d = await r.json();
        document.getElementById("r-mbetja").innerText = d.mbetja.toLocaleString() + " L";
        let totalLimit = 0; allData.kats.forEach(k => totalLimit += (parseFloat(k.limiti) || 0));
        document.getElementById("bar-limit").style.width = Math.min((totalLimit > 0 ? (d.dalje / totalLimit) * 100 : 0), 100) + "%";
        document.getElementById("txt-limit").innerText = `${d.dalje.toLocaleString()} / ${totalLimit.toLocaleString()} L`;
        let h = ""; d.lista.slice(0, 10).forEach(x => { h += `<div class="flex justify-between border-b dark:border-slate-800 py-2"><div><b>${x.k}</b><br><small>${x.d}</small></div><span class="${x.t=='hyrje'?'text-green-500':'text-red-400'} font-black">${x.s}L</span></div>`; });
        document.getElementById("historiku-list").innerHTML = h;
        shfaqGrafikun(d.grafiku);
    }

    function shfaqGrafikun(data) {
        let gD = [['Kat', 'L']]; for(let k in data) gD.push([k, data[k]]);
        new google.visualization.PieChart(document.getElementById('piechart')).draw(google.visualization.arrayToDataTable(gD), {
            backgroundColor:'transparent', chartArea:{width:'100%',height:'100%'}, pieHole:0.5, legend:{position:'right', textStyle:{color:'white', fontSize:9}}
        });
    }
</script>
</body>
</html>
