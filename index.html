<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa Family OCR & Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        :root { --bg: #f8fafc; --box: white; --txt: #0f172a; }
        .dark { --bg: #0f172a; --box: #1e293b; --txt: #ffffff; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.3s; }
        .box { background: var(--box); padding: 20px; border-radius: 28px; border: 1px solid #e2e8f0; }
        
        @keyframes pulse-red { 0%, 100% { color: #ef4444; transform: scale(1); } 50% { color: #fca5a5; transform: scale(1.05); } }
        .limit-warning { animation: pulse-red 1s infinite; font-weight: 900 !important; }
        
        .pazar-item { color: #ffffff !important; background: #2563eb !important; padding: 10px; border-radius: 15px; font-weight: 800; text-align: center; }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="p-4 pb-20">

<div id="login-ui" class="max-w-xs mx-auto mt-16 box text-center shadow-2xl border-none">
    <div class="flex justify-center mb-6">
        <div class="bg-blue-600/10 p-8 rounded-full">
            <svg class="w-16 h-16 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
        </div>
    </div>
    <h2 class="text-3xl font-black mb-1 uppercase italic">Financa<span class="text-blue-600">-</span>Family</h2>
    <select id="user-select" class="w-full p-4 mb-3 rounded-2xl outline-none text-center bg-slate-100"></select>
    <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-8 rounded-2xl text-center text-xl bg-slate-100" inputmode="numeric">
    <button id="btn-login" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black">HYNI</button>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="p-6 bg-slate-900 rounded-[35px] mb-4 shadow-2xl text-center">
        <p class="text-slate-400 text-[10px] uppercase font-black">Mbetja Totale</p>
        <h1 id="r-mbetja" class="text-4xl font-black text-blue-400 mb-2">0 L</h1>
        <div id="piechart" style="width: 100%; height: 160px;"></div>
        <div class="mt-4 px-2">
            <div class="flex justify-between text-[10px] font-black uppercase mb-1 text-white">
                <span>Shpenzuar / Limit</span>
                <span id="txt-limit">0 / 0 L</span>
            </div>
            <div class="w-full bg-white/10 rounded-full h-2 overflow-hidden">
                <div id="bar-limit" class="bg-blue-500 h-full w-0 transition-all duration-1000"></div>
            </div>
        </div>
    </div>

    <div class="box mb-4 bg-gradient-to-r from-blue-700 to-indigo-800 text-white border-none shadow-xl">
        <div class="flex justify-between items-center mb-2">
            <input id="obj-emri" class="bg-transparent border-none text-xs font-bold text-white outline-none w-1/2" onchange="syncKursimToSheet()" placeholder="Emri i kursimit">
            <span id="obj-perq" class="text-[10px] font-black bg-white/20 px-2 py-1 rounded-md">0%</span>
        </div>
        <div class="w-full bg-black/20 rounded-full h-1.5 mb-3">
            <div id="obj-bar" class="bg-white h-full rounded-full transition-all duration-700" style="width: 0%"></div>
        </div>
        <div class="flex justify-between items-center">
            <span id="obj-vlerat" class="text-[11px] font-black">0 / 0 L</span>
            <div class="flex gap-2">
                <button onclick="shtoKursim()" class="bg-green-500 text-[9px] font-black px-3 py-2 rounded-xl shadow-md">+ SHTO</button>
                <button onclick="ndryshoQellimin()" class="bg-white/20 text-[9px] font-black px-3 py-2 rounded-xl">🎯</button>
            </div>
        </div>
    </div>

    <div class="box mb-4 bg-slate-100 border-dashed border-2 border-slate-300">
        <div class="flex items-center justify-between">
            <span class="text-[10px] font-black text-slate-500 uppercase">Skano Faturë (OCR)</span>
            <input type="file" id="ocr-upload" accept="image/*" class="hidden" onchange="processOCR(this)">
            <label for="ocr-upload" class="bg-blue-600 text-white px-4 py-2 rounded-full text-[9px] font-black cursor-pointer">HAP KAMERËN 📷</label>
        </div>
        <div id="ocr-status" class="text-[9px] font-bold text-blue-600 mt-1 hidden italic">Duke lexuar faturën...</div>
    </div>

    <div class="box mb-6 border-2 border-blue-600 shadow-xl text-center">
        <div class="text-[10px] font-black uppercase text-blue-600 mb-1 italic">Vlera për Pagesë</div>
        <input id="shuma" type="number" placeholder="0 L" class="text-4xl font-black text-blue-600 bg-transparent border-none w-full text-center outline-none">
        <button id="btn-ruaj" onclick="ruajShpenzim()" class="w-full mt-4 p-5 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-lg">PAGUAJ ✅</button>
    </div>

    <div id="kategori-pads" class="grid grid-cols-3 gap-3"></div>
</div>

<div id="modal-manual" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[100]">
    <div class="bg-white w-full max-w-xs rounded-[35px] p-6 text-center">
        <h3 id="manual-titulli" class="text-sm font-black mb-4 uppercase text-blue-600">Vendos Çmimin</h3>
        <input id="manual-input" type="number" class="w-full p-5 mb-4 rounded-2xl font-black text-4xl text-center border-2 border-blue-200 outline-none text-blue-600" inputmode="decimal">
        <button onclick="konfirmoManual()" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black">SHTO</button>
    </div>
</div>

<script>
    const URL = "https://script.google.com/macros/s/AKfycbwc098j370oofDGe3D3t3YvMBQDAYTqXLFVdR5hD7z8Pna9IWCoVsEO0ZQ5rU1f8Xth/exec"; 
    let uAktual = "", allData = {};

    // 1. SINKRONIZIMI I KURSIMEVE (Kur hapet)
    async function merrRaportin() {
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: new Date().getMonth()+1, viti: 2026, user: uAktual }) });
        const d = await r.json();
        
        // Pulsimi i Limitit
        const mbetjaEl = document.getElementById("r-mbetja");
        mbetjaEl.innerText = d.mbetja.toLocaleString() + " L";
        let limitTot = 50000; // Shembull limit 50 mije
        let perq = (d.dalje / limitTot) * 100;
        
        if (perq >= 80) mbetjaEl.classList.add("limit-warning");
        else mbetjaEl.classList.remove("limit-warning");

        // Sinkronizimi i Kursimit nga Sheet
        if(d.kurs) {
            localStorage.setItem("kursime_mbledhura", d.kurs.mbledhur);
            localStorage.setItem("obj_vlera", d.kurs.synimi);
            localStorage.setItem("obj_emri", d.kurs.emri);
            document.getElementById("obj-emri").value = d.kurs.emri;
            perditesoKasaforten();
        }
        
        document.getElementById("bar-limit").style.width = Math.min(perq, 100) + "%";
        document.getElementById("txt-limit").innerText = `${d.dalje.toLocaleString()} / ${limitTot.toLocaleString()} L`;
    }

    // 2. OCR - LEXIMI I FATURAVE
    async function processOCR(input) {
        if (!input.files[0]) return;
        const status = document.getElementById("ocr-status");
        status.classList.remove("hidden");
        
        const result = await Tesseract.recognize(input.files[0], 'eng');
        const numbers = result.data.text.match(/\d+[\.,]\d+/g) || result.data.text.match(/\d+/g);
        
        if (numbers) {
            // Merret numri më i madh që zakonisht është Total i faturës
            const maxVal = Math.max(...numbers.map(n => parseFloat(n.replace(',', '.'))));
            document.getElementById("shuma").value = Math.floor(maxVal);
        }
        status.classList.add("hidden");
    }

    // 3. AUTO-FOCUS KURSORE
    function shfaqModalManual(titulli) {
        document.getElementById("manual-titulli").innerText = titulli;
        document.getElementById("modal-manual").classList.remove("hidden");
        
        // Fokusimi automatik i kursorit
        setTimeout(() => {
            const inp = document.getElementById("manual-input");
            inp.focus();
            inp.click();
        }, 300);
    }

    // 4. KURSITMET UPDATE
    async function syncKursimToSheet() {
        const dhenat = {
            action: "sync_kursim",
            user: uAktual,
            emri: document.getElementById("obj-emri").value,
            mbledhur: localStorage.getItem("kursime_mbledhura"),
            synimi: localStorage.getItem("obj_vlera")
        };
        await fetch(URL, { method: "POST", body: JSON.stringify(dhenat) });
    }

    function perditesoKasaforten() {
        let mb = parseFloat(localStorage.getItem("kursime_mbledhura")) || 0;
        let sy = parseFloat(localStorage.getItem("obj_vlera")) || 0;
        let p = sy > 0 ? (mb/sy)*100 : 0;
        document.getElementById("obj-bar").style.width = p + "%";
        document.getElementById("obj-perq").innerText = Math.floor(p) + "%";
        document.getElementById("obj-vlerat").innerText = `${mb.toLocaleString()} / ${sy.toLocaleString()} L`;
    }

    function shtoKursim() {
        let v = prompt("Sa shtohen?");
        if(v) {
            let m = (parseFloat(localStorage.getItem("kursime_mbledhura")) || 0) + parseFloat(v);
            localStorage.setItem("kursime_mbledhura", m);
            perditesoKasaforten(); syncKursimToSheet();
        }
    }

    function ndryshoQellimin() {
        let v = prompt("Synimi i ri?");
        if(v) {
            localStorage.setItem("obj_vlera", v);
            perditesoKasaforten(); syncKursimToSheet();
        }
    }

    // LOGIN & INITIALIZE
    document.getElementById("btn-login").onclick = async () => {
        uAktual = document.getElementById("user-select").value;
        document.getElementById("login-ui").classList.add("hidden");
        document.getElementById("app-ui").classList.remove("hidden");
        merrRaportin();
    };
</script>
</body>
</html>
