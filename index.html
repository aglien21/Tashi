<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/star--v1.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>KidQuest Pro - Gamified</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Nunito', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        .game-card { border-bottom-width: 6px; border-right-width: 4px; transition: all 0.1s; }
        .game-card:active { border-bottom-width: 2px; border-right-width: 2px; transform: translateY(4px) translateX(2px); }
        .progress-fill { transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="login-screen" class="flex flex-col items-center justify-center h-screen px-4 bg-indigo-600">
        <div class="text-center mb-8 text-white">
            <h1 class="text-6xl font-black mb-2 drop-shadow-xl italic">KidQuest</h1>
            <p class="font-bold opacity-80 uppercase tracking-tighter">Mission Control</p>
        </div>
        <div class="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-md border-b-8 border-indigo-200">
            <p id="loading-text" class="text-indigo-500 font-bold mb-4 animate-pulse italic text-center">Po lidhet me serverin...</p>
            <div id="login-form" class="hidden space-y-4">
                <input id="user-input" type="text" placeholder="Emri yt..." class="w-full p-4 bg-slate-100 rounded-2xl font-bold focus:outline-none focus:ring-4 focus:ring-indigo-200">
                <input id="pass-input" type="password" placeholder="PIN" class="w-full p-4 bg-slate-100 rounded-2xl font-bold focus:outline-none focus:ring-4 focus:ring-indigo-200">
                <button onclick="login()" class="w-full bg-indigo-500 text-white p-5 rounded-2xl font-black text-xl shadow-[0_5px_0_#4338ca] active:translate-y-1 active:shadow-none">HYR NГӢ LOJГӢ</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden max-w-lg mx-auto bg-white min-h-screen shadow-2xl relative pb-20">
        <header class="bg-indigo-600 text-white p-6 flex justify-between items-center rounded-b-[2.5rem] shadow-lg">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-xl">рҹ‘‘</div>
                <h2 id="welcome-text" class="text-xl font-black">Heroi</h2>
            </div>
            <div class="flex gap-2">
                <button id="btn-settings" onclick="toggleSettings()" class="hidden bg-white/20 p-3 rounded-xl">вҡҷпёҸ</button>
                <button onclick="logout()" class="bg-red-500/80 px-4 py-2 rounded-xl text-xs font-bold">Dil</button>
            </div>
        </header>

        <div id="admin-panel" class="hidden p-5">
            <h3 class="text-lg font-black text-orange-500 mb-4 flex items-center gap-2">вҸі NГӢ PRITJE <span id="pending-count" class="bg-orange-500 text-white px-2 rounded-full">0</span></h3>
            <div id="admin-pending-tasks" class="space-y-3 mb-8"></div>

            <div class="bg-indigo-50 p-6 rounded-[2.5rem] border-4 border-indigo-100 mb-8 shadow-inner">
                <h3 class="font-black text-indigo-700 mb-4">рҹҡҖ JEP NJГӢ MISION</h3>
                <select id="quick-task-select" class="w-full p-4 mb-4 border-2 border-indigo-200 rounded-2xl font-bold text-sm" onchange="fillTaskForm()"></select>
                <div class="flex gap-2 mb-3">
                    <input id="task-emoji" type="text" readonly onclick="openCustomEmojiPicker('task-emoji')" placeholder="рҹ‘Ү" class="w-1/4 p-4 border-2 border-indigo-200 rounded-2xl bg-white text-center text-2xl cursor-pointer">
                    <input id="task-name" type="text" placeholder="Emri i misionit" class="w-3/4 p-4 border-2 border-indigo-200 rounded-2xl font-bold">
                </div>
                <input id="task-points" type="number" placeholder="PikГ«t (PГ«rdor - pГ«r zbritje)" class="w-full p-4 mb-5 border-2 border-indigo-200 rounded-2xl font-bold">
                <div id="assign-checkboxes" class="flex flex-wrap gap-2 mb-6"></div>
                <button onclick="sendTaskToFirebase()" id="btn-send-task" class="w-full bg-indigo-500 text-white p-5 rounded-2xl font-black text-xl shadow-[0_5px_0_#4338ca] active:translate-y-1">DГӢRGO</button>
            </div>
            
            <div class="grid grid-cols-1 gap-4 mb-8">
                <div class="bg-white p-4 rounded-3xl border-2 h-44"><canvas id="adminChart"></canvas></div>
                <div class="bg-slate-900 p-5 rounded-[2rem] h-60"><canvas id="weeklyChart"></canvas></div>
            </div>
        </div>

        <div id="settings-panel" class="hidden p-5 bg-slate-50 min-h-screen">
            <h2 class="text-3xl font-black mb-6 text-indigo-700">Settings</h2>
            
            <div class="bg-gradient-to-r from-indigo-500 to-purple-600 p-6 rounded-3xl text-white mb-6 shadow-lg">
                <h3 class="font-black mb-4 italic">рҹҺҜ SYNIMI I MADH</h3>
                <div class="space-y-3">
                    <input id="setting-goal-points" type="number" placeholder="Sa pikГ« duhen?" class="w-full p-3 rounded-xl text-slate-900 font-bold">
                    <input id="setting-goal-reward" type="text" placeholder="Cili Г«shtГ« shpГ«rblimi?" class="w-full p-3 rounded-xl text-slate-900 font-bold">
                </div>
            </div>

            <div id="edit-parents-list" class="bg-white p-5 rounded-3xl border-2 mb-6"></div>
            <div id="edit-children-list" class="bg-white p-5 rounded-3xl border-2 mb-6"></div>

            <div class="bg-white p-5 rounded-3xl border-2 border-purple-100 mb-6">
                <h3 class="text-purple-600 font-black mb-3">рҹ“қ SHABLLONET</h3>
                <ul id="saved-tasks-list" class="space-y-2 mb-4"></ul>
                <button onclick="saveTaskTemplate()" class="w-full bg-purple-100 text-purple-700 p-3 rounded-xl font-bold">SHTO TГӢ RE</button>
            </div>

            <button onclick="saveSettings()" class="w-full bg-indigo-600 text-white font-black p-5 rounded-2xl shadow-xl mb-4">RUAJ TГӢ GJITHA</button>
            <button onclick="resetApp()" class="w-full text-red-400 font-bold p-3">Reset Data</button>
        </div>

        <div id="child-panel" class="hidden p-5">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-b-8 border-slate-100 mb-8 mt-2">
                <div class="flex justify-between items-end mb-2">
                    <span id="goal-text" class="text-sm font-black text-indigo-600 italic">Dhurata: Duke u ngarkuar...</span>
                    <span class="text-xs font-bold text-slate-400"><span id="my-points">0</span> / <span id="goal-points-display">0</span> вӯҗ</span>
                </div>
                <div class="w-full bg-slate-100 h-8 rounded-full overflow-hidden border-2 border-slate-50 p-1">
                    <div id="progress-bar" class="progress-fill h-full bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-full" style="width: 0%"></div>
                </div>
                <p id="progress-percent" class="text-center mt-2 font-black text-slate-300 text-xs tracking-widest">0% COMPLETED</p>
            </div>

            <h3 class="text-2xl font-black mb-5 text-indigo-800 flex items-center gap-2">рҹҺҜ MISIONET <span class="bg-indigo-100 text-indigo-600 text-xs px-2 py-1 rounded-lg">LIVE</span></h3>
            <div id="task-list" class="space-y-4"></div>
            
            <div class="mt-10 bg-slate-900 p-5 rounded-[2.5rem] h-44 shadow-2xl border-b-4 border-indigo-500">
                <canvas id="childChart"></canvas>
            </div>
        </div>
    </div>

    <div id="emoji-modal" class="hidden fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 px-4 backdrop-blur-md">
        <div class="bg-white rounded-[3rem] p-8 w-full max-w-xs shadow-2xl text-center">
            <div class="grid grid-cols-5 gap-3 text-3xl mb-8" id="emoji-grid"></div>
            <button onclick="closeEmojiModal()" class="w-full bg-slate-100 font-black py-4 rounded-2xl">MBYLL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, doc, updateDoc, where, setDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaN5zEU0_pByPUM_EySHnLvEkbduuFX34",
            authDomain: "ian-jon-ansi.firebaseapp.com",
            projectId: "ian-jon-ansi",
            storageBucket: "ian-jon-ansi.firebasestorage.app",
            messagingSenderId: "847967076537",
            appId: "1:847967076537:web:05f57a87a71decf14e5b68"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null, adminChart = null, childChart = null, weekChart = null, isFirstLoad = true, pointsData = {}, appConfig = null;
        const myEmojis = ['рҹ“ҡ','рҹӣҸпёҸ','рҹ§№','рҹҚҪпёҸ','рҹ‘•','рҹҰ·','рҹҡҝ','рҹ—‘пёҸ','рҹҸғ','рҹҺЁ','рҹ“қ','рҹҗ¶','рҹҗұ','рҹҚҺ','рҹҘҰ','рҹҸ…','рҹҸҶ','вӯҗ','рҹҺ®','рҹҡ—','рҹҸҖ','вҡҪ','рҹҢұ','рҹӣ пёҸ','рҹ§©','рҹ§ё','рҹҺө','рҹҡІ','рҹ§ј','рҹҷҢ'];
        let targetEmojiField = null;

        window.openCustomEmojiPicker = f => { targetEmojiField = document.getElementById(f); document.getElementById('emoji-grid').innerHTML = myEmojis.map(e => `<div class="cursor-pointer hover:scale-125 transition-transform" onclick="selectEmoji('${e}')">${e}</div>`).join(''); document.getElementById('emoji-modal').classList.remove('hidden'); };
        window.selectEmoji = e => { if(targetEmojiField) targetEmojiField.value = e; window.closeEmojiModal(); };
        window.closeEmojiModal = () => document.getElementById('emoji-modal').classList.add('hidden');

        const configRef = doc(db, "system", "settings");
        onSnapshot(configRef, (docSnap) => {
            if (!docSnap.exists()) {
                const def = { 
                    femijet: [{id:"c1", emri:"Ian", pass:"123", tel:""}, {id:"c2", emri:"Jon", pass:"123", tel:""}, {id:"c3", emri:"Ansi", pass:"123", tel:""}], 
                    prinderit: [{id:"p1", emri:"Babi", pass:"123"}], 
                    shabllone: [], goal_piket: 100, goal_shperblimi: "DhuratГ« Mister", tg_token: "", tg_id: "" 
                };
                setDoc(configRef, def);
            } else { appConfig = docSnap.data(); showLogin(); updateUI(); }
        });

        function showLogin() { document.getElementById('loading-text').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); }
        
        function updateUI() {
            if(!appConfig) return;
            const cc = document.getElementById('assign-checkboxes');
            cc.innerHTML = `<div class="w-full mb-2"><input type="checkbox" id="check-all" class="hidden checkbox-custom" onchange="toggleAll(this)"><label for="check-all" class="cursor-pointer block p-2 border-2 rounded-xl text-center font-bold text-gray-400">Zgjidh tГ« gjithГ«</label></div>`;
            appConfig.femijet.forEach(f => {
                cc.innerHTML += `<div class="flex-1"><input type="checkbox" id="chk-${f.id}" value="${f.emri}" class="hidden checkbox-custom child-chk"><label for="chk-${f.id}" class="cursor-pointer block p-3 border-2 border-indigo-100 bg-white rounded-2xl font-black text-center text-xs shadow-sm">${f.emri}</label></div>`;
            });

            document.getElementById('setting-goal-points').value = appConfig.goal_piket || 100;
            document.getElementById('setting-goal-reward').value = appConfig.goal_shperblimi || "";
            document.getElementById('goal-text').innerText = "SHPГӢRBLIMI: " + (appConfig.goal_shperblimi || "Vazhdo Misionet!");
            document.getElementById('goal-points-display').innerText = appConfig.goal_piket || 100;

            const qs = document.getElementById('quick-task-select'); qs.innerHTML = `<option value="">-- Misionet e Gati --</option>`;
            const sl = document.getElementById('saved-tasks-list'); sl.innerHTML = "";
            (appConfig.shabllone || []).forEach((sh, i) => { 
                qs.innerHTML += `<option value="${sh.titulli}|${sh.emoji}|${sh.piket}">${sh.emoji} ${sh.titulli}</option>`; 
                sl.innerHTML += `<li class="flex justify-between bg-slate-50 p-3 rounded-xl font-bold"><span>${sh.emoji} ${sh.titulli}</span><button onclick="deleteTemplate(${i})" class="text-red-400">X</button></li>`;
            });
            
            const pl = document.getElementById('edit-parents-list'); pl.innerHTML = `<h3 class="font-black mb-3">рҹ‘Ө ADMINS</h3>`;
            appConfig.prinderit.forEach(p => { pl.innerHTML += `<div class="flex gap-2 mb-2"><input type="text" id="edit-pname-${p.id}" value="${p.emri}" class="w-1/2 p-2 border rounded-lg"><input type="text" id="edit-ppass-${p.id}" value="${p.pass}" class="w-1/2 p-2 border rounded-lg"></div>`; });

            const el = document.getElementById('edit-children-list'); el.innerHTML = `<h3 class="font-black mb-3 text-blue-600">рҹ‘Ұ HEROES</h3>`;
            appConfig.femijet.forEach(f => { el.innerHTML += `<div class="p-2 border-b"><input type="text" id="edit-name-${f.id}" value="${f.emri}" class="font-bold text-sm"> | <input type="text" id="edit-tel-${f.id}" value="${f.tel || ''}" placeholder="WhatsApp" class="text-xs"></div>`; });
        }

        window.login = () => {
            const u = document.getElementById('user-input').value.trim(), p = document.getElementById('pass-input').value.trim();
            const pr = appConfig.prinderit.find(x => x.emri.toLowerCase() === u.toLowerCase() && x.pass === p);
            const fe = appConfig.femijet.find(x => x.emri.toLowerCase() === u.toLowerCase() && x.pass === p);
            if (pr) { currentUser = { emri: pr.emri, role: 'admin' }; dash(); }
            else if (fe) { currentUser = { emri: fe.emri, role: 'child' }; dash(); }
            else alert("PIN i gabuar!");
        };

        function dash() {
            document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('welcome-text').innerText = currentUser.emri;
            window.calculateTotalPoints();
            if (currentUser.role === 'admin') { document.getElementById('btn-settings').classList.remove('hidden'); document.getElementById('admin-panel').classList.remove('hidden'); window.listenForApprovals(); }
            else { document.getElementById('child-panel').classList.remove('hidden'); window.listenToMyTasks(currentUser.emri); }
        }

        window.sendTaskToFirebase = async () => {
            const n = document.getElementById('task-name').value, e = document.getElementById('task-emoji').value || "вңЁ", p = parseInt(document.getElementById('task-points').value);
            const r = Array.from(document.querySelectorAll('.child-chk:checked')).map(c => c.value);
            if(!n || isNaN(p) || r.length === 0) return alert("PlotГ«so misionin!");
            
            const btn = document.getElementById('btn-send-task');
            btn.innerText = "вҸі DUKE U DГӢRGUAR...";
            
            for (let c of r) { await addDoc(collection(db, "tasks"), { titulli: n, emoji: e, piket: p, kujt_i_caktohet: c, krijuar_nga: currentUser.emri, statusi: "hapur", koha: serverTimestamp() }); }
            
            if(r.length === 1) { 
                btn.innerText = "KLIKO PГӢR WHATSAPP"; 
                btn.onclick = () => {
                    const f = appConfig.femijet.find(x => x.emri === r[0]);
                    if(f && f.tel) window.location.href = `https://api.whatsapp.com/send?phone=${f.tel.replace(/\D/g,'')}&text=${encodeURIComponent(`рҹҡҖ Mision: *${n}* (+${p}вӯҗ)`) }`;
                };
            } else { alert("Misionet u dГ«rguan!"); location.reload(); }
        };

        window.listenToMyTasks = (c) => {
            onSnapshot(query(collection(db, "tasks"), orderBy("koha", "desc")), (snap) => {
                const l = document.getElementById('task-list'); l.innerHTML = ""; let pts = 0;
                snap.forEach(d => {
                    const t = d.data(); if(t.kujt_i_caktohet === c && t.statusi !== "refuzuar") {
                        if(t.statusi === "aprovuar") pts += t.piket;
                        let b = "", clr = "bg-white border-indigo-200";
                        if(t.statusi === "hapur") b = `<button onclick="sub('${d.id}', '${t.titulli}')" class="bg-indigo-500 text-white px-4 py-2 rounded-xl font-black shadow-[0_4px_0_#4338ca]">KREVA</button>`;
                        else if(t.statusi === "ne_pritje") { b = `<span class="text-orange-400 font-bold italic text-xs">Prit...</span>`; clr = "bg-orange-50 border-orange-200 shake"; }
                        else if(t.statusi === "aprovuar") { b = `<span class="text-green-500 text-xl font-black">вң”</span>`; clr = "bg-gray-50 border-gray-100 opacity-60"; }
                        l.innerHTML += `<div class="${clr} p-4 rounded-3xl border-2 mb-3 flex justify-between items-center game-card"><div><p class="font-black text-sm">${t.emoji} ${t.titulli}</p><p class="text-[10px] font-bold text-yellow-600">${t.piket > 0 ? '+'+t.piket : t.piket} вӯҗ</p></div>${b}</div>`;
                    }
                });
                document.getElementById('my-points').innerText = pts;
                updateProgressBar(pts);
            });
        };

        function updateProgressBar(pts) {
            const goal = appConfig.goal_piket || 100;
            let perc = Math.floor((pts / goal) * 100);
            if(perc > 100) perc = 100;
            if(perc < 0) perc = 0;
            document.getElementById('progress-bar').style.width = perc + "%";
            document.getElementById('progress-percent').innerText = perc + "% COMPLETED";
            if(perc >= 100) { confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); }
        }

        window.sub = async (id, t) => { 
            await updateDoc(doc(db, "tasks", id), { statusi: "ne_pritje" }); 
            if(appConfig.tg_token) fetch(`https://api.telegram.org/bot${appConfig.tg_token}/sendMessage?chat_id=${appConfig.tg_id}&text=${encodeURIComponent(`вң… ${currentUser.emri} kreu: "${t}"`)}`);
        };

        window.listenForApprovals = () => {
            onSnapshot(query(collection(db, "tasks"), where("statusi", "==", "ne_pritje")), (snap) => {
                const pl = document.getElementById('admin-pending-tasks'); const bd = document.getElementById('pending-count'); pl.innerHTML = ""; let c = 0;
                snap.forEach(d => { c++; const t = d.data(); pl.innerHTML += `<div class="bg-orange-50 p-4 rounded-2xl border-2 border-orange-200 flex justify-between items-center mb-2"><div><p class="font-black text-xs">${t.emoji} ${t.titulli}</p><p class="text-[10px] text-indigo-500 font-bold">${t.kujt_i_caktohet}</p></div><div class="flex gap-2"><button onclick="dec('${d.id}','aprovuar')" class="bg-green-500 text-white p-3 rounded-xl font-bold">вң”</button><button onclick="dec('${d.id}','refuzuar')" class="bg-red-500 text-white p-3 rounded-xl font-bold">вң–</button></div></div>`; });
                bd.innerText = c;
            });
        };

        window.dec = async (id, decision) => {
            await updateDoc(doc(db, "tasks", id), { statusi: decision });
            if(decision === 'aprovuar') {
                // Kjo do tГ« shkaktojГ« animacionin te fГ«mija (sepse Snapshot pГ«rditГ«sohet)
            }
        };

        window.calculateTotalPoints = () => {
            onSnapshot(query(collection(db, "tasks"), where("statusi", "==", "aprovuar")), (snap) => {
                if(!appConfig) return;
                pointsData = {}; appConfig.femijet.forEach(f => pointsData[f.emri] = 0);
                let wData = {}; const ditet = ["E Diel", "E HГ«nГ«", "E MartГ«", "E MГ«rkurГ«", "E Enjte", "E Premte", "E ShtunГ«"];
                ditet.forEach(d => { wData[d] = {}; appConfig.femijet.forEach(f => wData[d][f.emri] = 0); });
                snap.forEach(d => {
                    const t = d.data(); if(pointsData[t.kujt_i_caktohet] !== undefined) {
                        pointsData[t.kujt_i_caktohet] += t.piket;
                        if(t.koha) { try { const dObj = t.koha.toDate(); wData[ditet[dObj.getDay()]][t.kujt_i_caktohet] += t.piket; } catch(e) {} }
                    }
                });
                renderCharts(wData);
            });
        };

        function renderCharts(wData) {
            const labels = Object.keys(pointsData), vals = Object.values(pointsData);
            const opt = { plugins: { legend: false }, scales: { y: { display: false } } };
            const ctxA = document.getElementById('adminChart')?.getContext('2d');
            if(ctxA) { if(adminChart) adminChart.destroy(); adminChart = new Chart(ctxA, { type: 'bar', data: { labels, datasets: [{ data: vals, backgroundColor: ['#4f46e5', '#f97316', '#10b981'], borderRadius: 12 }] }, options: opt }); }
            const ctxC = document.getElementById('childChart')?.getContext('2d');
            if(ctxC) { if(childChart) childChart.destroy(); childChart = new Chart(ctxC, { type: 'bar', data: { labels, datasets: [{ data: vals, backgroundColor: ['#818cf8', '#fb923c', '#4ade80'], borderRadius: 12 }] }, options: { ...opt, scales: { x: { ticks: { color: '#fff' } }, y: { display: false } } } }); }
            const ctxW = document.getElementById('weeklyChart')?.getContext('2d');
            if(ctxW) {
                if(weekChart) weekChart.destroy();
                const dL = ["E HГ«nГ«", "E MartГ«", "E MГ«rkurГ«", "E Enjte", "E Premte", "E ShtunГ«", "E Diel"];
                const ds = appConfig.femijet.map((f, i) => ({ label: f.emri, data: dL.map(d => wData[d][f.emri]), borderColor: ['#818cf8', '#fb923c', '#4ade80'][i], tension: 0.4 }));
                weekChart = new Chart(ctxW, { type: 'line', data: { labels: dL, datasets: ds }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } } });
            }
        }

        window.saveSettings = async () => {
            let upF = appConfig.femijet.map(f => ({ id: f.id, emri: document.getElementById(`edit-name-${f.id}`).value, tel: document.getElementById(`edit-tel-${f.id}`).value, pass: f.pass }));
            let upP = appConfig.prinderit.map(p => ({ id: p.id, emri: document.getElementById(`edit-pname-${p.id}`).value, pass: document.getElementById(`edit-ppass-${p.id}`).value }));
            await updateDoc(configRef, { 
                femijet: upF, prinderit: upP, 
                goal_piket: parseInt(document.getElementById('setting-goal-points').value),
                goal_shperblimi: document.getElementById('setting-goal-reward').value
            }); 
            alert("U RUAJT!");
        };

        window.saveTaskTemplate = async () => {
            const n = prompt("Titulli?"), e = prompt("Emoji?"), p = parseInt(prompt("PikГ«t?"));
            if(n) await updateDoc(configRef, { shabllone: [...(appConfig.shabllone || []), {titulli: n, emoji: e, piket: p}] });
        };
        window.deleteTemplate = async i => { let nt = [...appConfig.shabllone]; nt.splice(i,1); await updateDoc(configRef, { shabllone: nt }); };
        window.resetApp = async () => { if(confirm("ZERO GJITHГҮKA?")) { const q = await getDocs(collection(db, "tasks")); const b = writeBatch(db); q.forEach(d => b.delete(d.ref)); await b.commit(); location.reload(); } };
        window.logout = () => location.reload();
        window.toggleSettings = () => { document.getElementById('admin-panel').classList.toggle('hidden'); document.getElementById('settings-panel').classList.toggle('hidden'); };
        window.fillTaskForm = () => { const s = document.getElementById('quick-task-select').value; if(s) { const p = s.split('|'); document.getElementById('task-name').value = p[0]; document.getElementById('task-emoji').value = p[1]; document.getElementById('task-points').value = p[2]; } };
        window.toggleAll = m => document.querySelectorAll('.child-chk').forEach(c => c.checked = m.checked);
    </script>
</body>
</html>
