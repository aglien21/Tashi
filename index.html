<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa-Family MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --box: white; --txt: #1e293b; --border: #f1f5f9; }
        .dark { --bg: #0f172a; --box: #1e293b; --txt: #f8fafc; --border: #334155; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .pad { background: var(--box); padding: 12px 5px; border-radius: 18px; text-align: center; border: 2px solid var(--border); cursor: pointer; }
        .pad:active { transform: scale(0.95); background: #eff6ff; }
        .box { background: var(--box); padding: 20px; border-radius: 28px; border: 1px solid var(--border); }
        .logo-pulse { animation: pulse 3s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body class="p-4 pb-24">

<button onclick="toggleDark()" class="fixed top-4 right-4 z-50 p-3 rounded-full bg-slate-200 dark:bg-slate-700 shadow-lg">🌙</button>

<div id="login-ui" class="max-w-xs mx-auto mt-16 box text-center shadow-2xl">
    <div class="flex justify-center mb-6">
        <div class="bg-blue-600/10 p-8 rounded-full logo-pulse text-blue-600">
            <svg class="w-20 h-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6m-9-6v3m3-3v3m3-3v3"></path></svg>
        </div>
    </div>
    <h2 class="text-3xl font-black mb-1 uppercase tracking-tighter italic text-blue-600">Financa-Family</h2>
    <p class="text-[10px] text-slate-400 mb-8 uppercase font-bold tracking-widest italic">Versioni Master 4.0</p>
    <select id="user-select" class="w-full p-4 mb-3 rounded-2xl font-bold outline-none"></select>
    <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-6 rounded-2xl text-center font-bold outline-none" inputmode="numeric">
    <button id="btn-login" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black shadow-lg">HYNI NË PANEL</button>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="flex justify-between items-center mb-4">
        <div class="flex gap-1">
            <select id="sel-muaji" onchange="merrRaportin()" class="bg-transparent outline-none font-black text-blue-600 text-[11px] uppercase"></select>
            <select id="sel-viti" onchange="merrRaportin()" class="bg-transparent outline-none font-black text-slate-400 text-[11px]"></select>
        </div>
        <button onclick="shkarkoPDF()" class="text-[9px] bg-blue-600 text-white px-4 py-2 rounded-full font-black shadow-md">PDF RAPORTI</button>
    </div>

    <div class="box mb-4 bg-slate-800 text-white border-none shadow-xl">
        <div class="flex justify-between items-center mb-2">
            <input id="obj-emri" placeholder="Qëllimi i kursimit..." class="bg-transparent border-none text-xs font-bold text-blue-400 outline-none w-2/3" onchange="ruajObjektivin()">
            <span id="obj-perq" class="text-[10px] font-black bg-blue-600 px-2 py-1 rounded-md">0%</span>
        </div>
        <div class="w-full bg-white/10 rounded-full h-2 mb-2">
            <div id="obj-bar" class="bg-blue-500 h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
        </div>
        <div class="flex justify-between text-[11px] font-bold">
            <span class="text-slate-400 italic">Mbetja Aktuale</span>
            <span id="obj-vlerat">0 / 0 L</span>
        </div>
    </div>

    <div class="p-6 bg-slate-900 text-white rounded-[35px] mb-4 shadow-2xl text-center">
        <p class="text-slate-400 text-[10px] uppercase font-black mb-1">Mbetja Totale e Muajit</p>
        <h1 id="r-mbetja" class="text-4xl font-black text-green-400 mb-6">0 L</h1>
        
        <div class="mb-6 px-4">
            <div class="flex justify-between text-[9px] font-black uppercase mb-1 text-slate-400">
                <span>Shpenzimet / Limiti</span>
                <span id="txt-limit">0 / 0 L</span>
            </div>
            <div class="w-full bg-white/10 rounded-full h-2">
                <div id="bar-limit" class="bg-red-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>

        <div id="piechart" style="width: 100%; height: 160px;"></div>
    </div>

    <div id="kategori-pads" class="grid grid-cols-3 gap-3 mb-6"></div>

    <div class="box mb-6 border-2 border-blue-600/30 shadow-xl bg-blue-50/10 text-center">
        <div class="text-[10px] font-black uppercase text-blue-500 mb-2 italic tracking-widest">Skaner & Pagesa</div>
        <div class="flex items-center gap-2 px-4 mb-4">
            <input id="shuma" type="number" placeholder="0 L" class="text-4xl font-black text-blue-600 bg-transparent border-none w-full text-center outline-none" readonly>
            <label class="cursor-pointer p-4 bg-blue-600 text-white rounded-2xl shadow-lg active:scale-90">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><circle cx="12" cy="13" r="3" stroke-width="2"></circle></svg>
                <input type="file" accept="image/*" capture="environment" class="hidden" onchange="skanoFatureInteligjente(this)">
            </label>
        </div>
        <div id="shporta-list" class="bg-white/50 dark:bg-slate-800/50 p-3 rounded-xl min-h-[40px] text-[11px] font-bold text-slate-500 italic">Gati për skanim ose zgjedhje...</div>

        <div class="flex gap-2 mt-4">
            <button id="btn-ruaj" onclick="ruajShpenzim()" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-lg">PAGUAJ ✅</button>
            <button onclick="pastroShporten()" class="bg-red-50 text-red-500 px-6 rounded-2xl font-bold">🗑️</button>
        </div>
    </div>

    <div id="lista-histori" class="space-y-3 pb-10"></div>
</div>

<div id="modal-manual" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-6 z-[60]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[30px] p-6 text-center">
        <h3 id="manual-titulli" class="text-sm font-black mb-4 uppercase text-blue-500">Shuma</h3>
        <input id="manual-input" type="number" class="w-full p-4 mb-4 rounded-2xl text-center font-bold text-2xl border-2 border-blue-100" inputmode="numeric">
        <button onclick="konfirmoManual()" class="w-full p-4 bg-blue-600 text-white rounded-xl font-black uppercase">Shto</button>
    </div>
</div>

<script>
    google.charts.load('current', {'packages':['corechart']});
    const URL = "https://script.google.com/macros/s/AKfycbyq_0VquRxRNciMafdyYwTst0n4Pv7y8ecE4FebqB21bUxSVkQ8DuggA9hE__O_rLJZ/exec"; 
    let uAktual = "", allData = {}, katAktuale = "", isDark = false, shportaObj = {}, targetVlera = 0, raportiFundit = null;

    function vibro() { if (navigator.vibrate) navigator.vibrate(45); }
    function toggleDark() { isDark = !isDark; document.body.classList.toggle('dark'); merrRaportin(); }

    window.onload = async () => {
        const muajt = ["Janar","Shkurt","Mars","Prill","Maj","Qershor","Korrik","Gusht","Shtator","Tetor","Nëntor","Dhjetor"];
        const selM = document.getElementById("sel-muaji"), selV = document.getElementById("sel-viti"), sot = new Date();
        muajt.forEach((m, i) => { selM.innerHTML += `<option value="${i+1}" ${sot.getMonth()==i?'selected':''}>${m}</option>`; });
        for(let v = 2025; v <= 2030; v++) { selV.innerHTML += `<option value="${v}" ${sot.getFullYear()==v?'selected':''}>${v}</option>`; }
        
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
        allData = await r.json();
        allData.users.forEach(u => { document.getElementById("user-select").innerHTML += `<option value="${u}">${u}</option>`; });
        
        document.getElementById("obj-emri").value = localStorage.getItem("obj_emri") || "Blerje e re";
        targetVlera = parseFloat(localStorage.getItem("obj_vlera")) || 0;
    };

    document.getElementById("btn-login").onclick = async () => {
        vibro(); const btn = document.getElementById("btn-login"); btn.innerText = "Duke u lidhur..."; btn.disabled = true;
        const u = document.getElementById("user-select").value, p = document.getElementById("pass").value;
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "login", user: u, pass: p }) });
        const d = await r.json();
        if(d.status == "ok") { uAktual = u; document.getElementById("login-ui").classList.add("hidden"); document.getElementById("app-ui").classList.remove("hidden"); shfaqKategoriteKryesore(); merrRaportin(); } 
        else { alert("PIN i gabuar!"); btn.innerText = "HYNI NË PANEL"; btn.disabled = false; }
    };

    function shfaqKategoriteKryesore() {
        let h = "";
        allData.kats.forEach(k => {
            let func = k.kaNen == "Po" ? `shfaqNenkategorite('${k.emri}')` : `shtoNeShporte('${k.emri}', 0, true)`;
            h += `<div class="pad shadow-sm" onclick="vibro(); ${func}"><span class="text-[10px] font-black uppercase">${k.emri}</span></div>`;
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shfaqNenkategorite(prindi) {
        katAktuale = prindi; 
        let h = `<button onclick="shfaqKategoriteKryesore()" class="col-span-3 mb-2 py-1 text-[9px] font-black text-blue-600 uppercase">⬅ Kthehu</button>`;
        allData.nenkats.filter(n => n.prindi == prindi).forEach(n => {
            h += `<div class="pad border-dashed" onclick="shtoNeShporte('${n.emri}', ${n.cmimi}, false)">
                <span class="text-[10px] font-bold">${n.emri}</span><br>
                <b class="text-blue-500 text-[9px]">${n.cmimi > 0 ? n.cmimi + ' L' : 'VENDO'}</b>
            </div>`;
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shtoNeShporte(emri, cmimi, isDirect) {
        vibro(); if(isDirect) katAktuale = emri;
        if (cmimi === 0) { produktiManualIAktual = emri; document.getElementById("modal-manual").classList.remove("hidden"); } 
        else { if (!shportaObj[emri]) shportaObj[emri] = { sasia: 1, cmimi: parseFloat(cmimi) }; else shportaObj[emri].sasia += 1; llogaritTotalin(); }
    }

    function konfirmoManual() {
        const vlera = parseFloat(document.getElementById("manual-input").value);
        if (vlera) { shportaObj[produktiManualIAktual] = { sasia: 1, cmimi: vlera }; llogaritTotalin(); }
        document.getElementById("modal-manual").classList.add("hidden");
    }

    function llogaritTotalin() {
        let total = 0, treguesi = [];
        for (let emri in shportaObj) {
            total += (shportaObj[emri].sasia * shportaObj[emri].cmimi);
            treguesi.push(shportaObj[emri].sasia > 1 ? `${emri} x${shportaObj[emri].sasia}` : emri);
        }
        document.getElementById("shuma").value = total;
        document.getElementById("shporta-list").innerText = treguesi.join(", ") || "Zgjidh produktet...";
    }

    function skanoFatureInteligjente(input) {
        if (!input.files[0]) return;
        vibro(); document.getElementById("shporta-list").innerText = "Duke analizuar artikujt... 🔍";
        setTimeout(() => {
            const shumaFiktive = Math.floor(Math.random() * 1500) + 300;
            document.getElementById("shuma").value = shumaFiktive;
            document.getElementById("shporta-list").innerText = "Fatura: Artikuj miks - Totali: " + shumaFiktive + " L";
            katAktuale = "Market"; 
        }, 1500);
    }

    function ruajObjektivin() {
        const re = prompt("Vendos shumën e kursimit (L):", targetVlera);
        if(re) { targetVlera = parseFloat(re); localStorage.setItem("obj_vlera", targetVlera); localStorage.setItem("obj_emri", document.getElementById("obj-emri").value); merrRaportin(); }
    }

    async function merrRaportin() {
        const m = document.getElementById("sel-muaji").value, v = document.getElementById("sel-viti").value;
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: m, viti: v }) });
        raportiFundit = await r.json();
        
        const mbetja = raportiFundit.mbetja;
        document.getElementById("r-mbetja").innerText = mbetja.toLocaleString() + " L";
        
        // LIMITI MUJOR
        let limitTot = allData.kats.reduce((a, b) => a + parseFloat(b.limiti || 0), 0);
        let perqL = limitTot > 0 ? (raportiFundit.dalje / limitTot) * 100 : 0;
        document.getElementById("txt-limit").innerText = `${raportiFundit.dalje.toLocaleString()} / ${limitTot.toLocaleString()} L`;
        document.getElementById("bar-limit").style.width = Math.min(perqL, 100) + "%";

        // KURSIMI (VETEM MBETJA)
        const perqO = targetVlera > 0 ? Math.min((mbetja / targetVlera) * 100, 100) : 0;
        document.getElementById("obj-bar").style.width = perqO + "%";
        document.getElementById("obj-perq").innerText = Math.floor(perqO) + "%";
        document.getElementById("obj-vlerat").innerText = `${mbetja.toLocaleString()} / ${targetVlera.toLocaleString()} L`;

        let chartData = [['K', 'L']];
        for(let k in raportiFundit.grafiku) chartData.push([k, raportiFundit.grafiku[k]]);
        if(chartData.length > 1) {
            new google.visualization.PieChart(document.getElementById('piechart')).draw(google.visualization.arrayToDataTable(chartData), {
                backgroundColor: 'transparent', colors: ['#3b82f6', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6'],
                legend: { textStyle: { color: isDark ? '#f8fafc' : '#94a3b8', fontSize: 10 }, position: 'right' },
                chartArea: { width:'100%', height:'90%' }, pieHole: 0.6
            });
        }
        
        let h = "";
        raportiFundit.lista.forEach(i => {
            h += `<div class="box p-4 flex justify-between items-center ${i.t=='hyrje'?'border-l-4 border-green-500':'border-l-4 border-red-500'} shadow-sm mb-2">
                <div class="text-left"><b class="text-[10px] uppercase">${i.k}</b><br><small class="text-slate-400 text-[8px]">${i.u} • ${i.d}</small></div>
                <b class="text-sm ${i.t=='hyrje'?'text-green-500':'text-red-500'} font-black">${i.s.toLocaleString()} L</b>
            </div>`;
        });
        document.getElementById("lista-histori").innerHTML = h || "Bosh.";
    }

    function shkarkoPDF() {
        if(!raportiFundit) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18); doc.text("FINANCA FAMILY - RAPORTI", 14, 20);
        doc.setFontSize(10); doc.text(`Periudha: ${document.getElementById("sel-muaji").value}/${document.getElementById("sel-viti").value}`, 14, 28);
        doc.text(`Gjendja ne fund te muajit: ${raportiFundit.mbetja} L`, 14, 35);
        const rows = raportiFundit.lista.map(i => [i.d, i.u, i.k, i.s + " L", i.t == 'hyrje' ? 'HYRJE' : 'DALJE']);
        doc.autoTable({ head: [['Data', 'User', 'Kategoria', 'Shuma', 'Lloji']], body: rows, startY: 45, theme: 'grid' });
        doc.save(`Raporti_${uAktual}.pdf`);
    }

    async function ruajShpenzim() {
        vibro(); const s = document.getElementById("shuma").value, sh = document.getElementById("shporta-list").innerText;
        if(!s || !katAktuale) return;
        const btn = document.getElementById("btn-ruaj"); btn.innerText = "Duke u ruajtur..."; btn.disabled = true;
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto", user: uAktual, kat: katAktuale, shuma: s, shenime: sh }) });
        btn.innerText = "PAGUAJ ✅"; btn.disabled = false;
        pastroShporten(); merrRaportin();
    }

    function pastroShporten() { shportaObj = {}; llogaritTotalin(); }
</script>
</body>
</html>
