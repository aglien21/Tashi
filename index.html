<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa-Family MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --bg: #f8fafc; --box: white; --txt: #1e293b; --border: #f1f5f9; }
        .dark { --bg: #0f172a; --box: #1e293b; --txt: #f8fafc; --border: #334155; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.3s; }
        .box { background: var(--box); padding: 20px; border-radius: 28px; border: 1px solid var(--border); }
        .pad { background: var(--box); padding: 12px 5px; border-radius: 18px; text-align: center; border: 2px solid var(--border); cursor: pointer; transition: 0.1s; }
        .pad:active { transform: scale(0.95); }
    </style>
</head>
<body class="p-4 pb-24">

<button onclick="toggleDark()" class="fixed top-4 right-4 z-50 p-3 rounded-full bg-slate-200 dark:bg-slate-700 shadow-lg">🌙</button>

<div id="login-ui" class="max-w-xs mx-auto mt-16 box text-center shadow-2xl">
    <div class="flex justify-center mb-6">
        <div class="bg-blue-600/10 p-8 rounded-full text-blue-600">
            <svg class="w-20 h-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6m-9-6v3m3-3v3m3-3v3"></path></svg>
        </div>
    </div>
    <h2 class="text-3xl font-black mb-1 uppercase tracking-tighter italic text-blue-600">Financa-Family</h2>
    <p class="text-[10px] text-slate-400 mb-8 uppercase font-bold tracking-widest italic">Kursime të Mbledhura</p>
    <select id="user-select" class="w-full p-4 mb-3 rounded-2xl font-bold outline-none"></select>
    <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-6 rounded-2xl text-center font-bold outline-none" inputmode="numeric">
    <button id="btn-login" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black shadow-lg">HYNI NË PANEL</button>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="flex justify-between items-center mb-4">
        <div class="flex gap-1">
            <select id="sel-muaji" onchange="merrRaportin()" class="bg-transparent outline-none font-black text-blue-600 text-[11px] uppercase"></select>
            <select id="sel-viti" onchange="merrRaportin()" class="bg-transparent outline-none font-black text-slate-400 text-[11px]"></select>
        </div>
        <button onclick="shkarkoPDF()" class="text-[9px] bg-blue-600 text-white px-4 py-2 rounded-full font-black">PDF</button>
    </div>

    <div class="box mb-4 bg-gradient-to-r from-indigo-600 to-blue-700 text-white border-none shadow-xl">
        <div class="flex justify-between items-center mb-2">
            <input id="obj-emri" class="bg-transparent border-none text-xs font-bold text-blue-200 outline-none w-1/2" onchange="ruajEmrin()">
            <span id="obj-perq" class="text-[10px] font-black bg-white/20 px-2 py-1 rounded-md text-white">0%</span>
        </div>
        <div class="w-full bg-black/20 rounded-full h-2 mb-3">
            <div id="obj-bar" class="bg-white h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
        </div>
        <div class="flex justify-between items-center">
            <div class="text-[11px] font-bold">
                <span class="opacity-70 italic text-[9px]">Të mbledhura ndër muaj:</span><br>
                <span id="obj-vlerat" class="text-sm">0 / 0 L</span>
            </div>
            <button onclick="mbyllMuajinDheKurse()" class="bg-green-500 hover:bg-green-400 text-[9px] font-black px-3 py-2 rounded-xl shadow-lg uppercase transition-all">Ruaj Mbetjen 💰</button>
        </div>
        <button onclick="resetKursimet()" class="text-[8px] opacity-30 mt-2 block w-full text-right uppercase">Reset Kasafortën</button>
    </div>

    <div class="p-6 bg-slate-900 text-white rounded-[35px] mb-4 shadow-2xl text-center">
        <p class="text-slate-400 text-[10px] uppercase font-black mb-1">Mbetja për këtë muaj</p>
        <h1 id="r-mbetja" class="text-4xl font-black text-green-400 mb-6">0 L</h1>
        <div class="mb-6 px-4 text-left">
            <div class="flex justify-between text-[9px] font-black uppercase mb-1 text-slate-400">
                <span>Shpenzuar / Limit</span>
                <span id="txt-limit">0 / 0 L</span>
            </div>
            <div class="w-full bg-white/10 rounded-full h-2">
                <div id="bar-limit" class="bg-red-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
        <div id="piechart" style="width: 100%; height: 160px;"></div>
    </div>

    <div id="kategori-pads" class="grid grid-cols-3 gap-3 mb-6"></div>

    <div class="box mb-6 border-2 border-blue-600/30 shadow-xl bg-blue-50/10 text-center">
        <div class="text-[10px] font-black uppercase text-blue-500 mb-2 italic tracking-widest text-center">Skanim i Faturës (Vlerat Bold)</div>
        <div class="flex items-center gap-2 px-4 mb-4">
            <input id="shuma" type="number" placeholder="0 L" class="text-4xl font-black text-blue-600 bg-transparent border-none w-full text-center outline-none" readonly>
            <label class="cursor-pointer p-4 bg-blue-600 text-white rounded-2xl shadow-lg active:scale-90">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><circle cx="12" cy="13" r="3" stroke-width="2"></circle></svg>
                <input type="file" accept="image/*" capture="environment" class="hidden" onchange="skanoFatureMaster(this)">
            </label>
        </div>
        <div id="shporta-list" class="bg-white/50 dark:bg-slate-800/50 p-3 rounded-xl min-h-[40px] text-[11px] font-bold text-slate-500 italic">Pritet skanimi i Totali...</div>
        <div class="flex gap-2 mt-4">
            <button id="btn-ruaj" onclick="ruajShpenzim()" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase">PAGUAJ ✅</button>
            <button onclick="pastroShporten()" class="bg-red-50 text-red-500 px-6 rounded-2xl font-bold">🗑️</button>
        </div>
    </div>
    <div id="lista-histori" class="space-y-3 pb-10"></div>
</div>

<script>
    google.charts.load('current', {'packages':['corechart']});
    const URL = "https://script.google.com/macros/s/AKfycbyq_0VquRxRNciMafdyYwTst0n4Pv7y8ecE4FebqB21bUxSVkQ8DuggA9hE__O_rLJZ/exec"; 
    let uAktual = "", allData = {}, katAktuale = "", shportaObj = {}, kursimetMBLEDHURA = 0, targetKursimi = 0, mbetjaAktuale = 0;

    window.onload = async () => {
        const muajt = ["Janar","Shkurt","Mars","Prill","Maj","Qershor","Korrik","Gusht","Shtator","Tetor","Nëntor","Dhjetor"];
        const selM = document.getElementById("sel-muaji"), selV = document.getElementById("sel-viti"), sot = new Date();
        muajt.forEach((m, i) => { selM.innerHTML += `<option value="${i+1}" ${sot.getMonth()==i?'selected':''}>${m}</option>`; });
        for(let v = 2025; v <= 2030; v++) { selV.innerHTML += `<option value="${v}" ${sot.getFullYear()==v?'selected':''}>${v}</option>`; }
        
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
        allData = await r.json();
        allData.users.forEach(u => { document.getElementById("user-select").innerHTML += `<option value="${u}">${u}</option>`; });
        
        // Ngarko Kursimet e mbledhura ndër muaj
        kursimetMBLEDHURA = parseFloat(localStorage.getItem("kursime_mbledhura")) || 0;
        targetKursimi = parseFloat(localStorage.getItem("obj_vlera")) || 0;
        document.getElementById("obj-emri").value = localStorage.getItem("obj_emri") || "Kursimi im";
        perditesoKasaforten();
    };

    document.getElementById("btn-login").onclick = async () => {
        const u = document.getElementById("user-select").value, p = document.getElementById("pass").value;
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "login", user: u, pass: p }) });
        const d = await r.json();
        if(d.status == "ok") { uAktual = u; document.getElementById("login-ui").classList.add("hidden"); document.getElementById("app-ui").classList.remove("hidden"); shfaqKategoriteKryesore(); merrRaportin(); }
        else alert("PIN i gabuar!");
    };

    function merrRaportin() {
        fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: document.getElementById("sel-muaji").value, viti: document.getElementById("sel-viti").value }) })
        .then(res => res.json()).then(d => {
            mbetjaAktuale = d.mbetja;
            document.getElementById("r-mbetja").innerText = d.mbetja.toLocaleString() + " L";
            
            let limitTot = allData.kats.reduce((a, b) => a + parseFloat(b.limiti || 0), 0);
            document.getElementById("txt-limit").innerText = `${d.dalje.toLocaleString()} / ${limitTot.toLocaleString()} L`;
            document.getElementById("bar-limit").style.width = Math.min((d.dalje / limitTot) * 100, 100) + "%";
            
            perditesoKasaforten();
            // Grafiku dhe Lista këtu... (si versioni i kaluar)
        });
    }

    function mbyllMuajinDheKurse() {
        if (mbetjaAktuale <= 0) return alert("Nuk ke mbetje pozitive për të kursyer këtë muaj!");
        if (confirm(`A dëshiron të mbyllësh muajin dhe të shtosh ${mbetjaAktuale} L në kasafortën e kursimeve?`)) {
            kursimetMBLEDHURA += mbetjaAktuale;
            localStorage.setItem("kursime_mbledhura", kursimetMBLEDHURA);
            perditesoKasaforten();
            alert("Mbetja u ruajt me sukses! 💰");
        }
    }

    function perditesoKasaforten() {
        if(targetKursimi === 0) {
            const t = prompt("Sa është shuma që dëshiron të kursesh në total?");
            if(t) { targetKursimi = parseFloat(t); localStorage.setItem("obj_vlera", targetKursimi); }
        }
        const perq = Math.min((kursimetMBLEDHURA / targetKursimi) * 100, 100);
        document.getElementById("obj-bar").style.width = perq + "%";
        document.getElementById("obj-perq").innerText = Math.floor(perq) + "%";
        document.getElementById("obj-vlerat").innerText = `${kursimetMBLEDHURA.toLocaleString()} / ${targetKursimi.toLocaleString()} L`;
    }

    function skanoFatureMaster(input) {
        if (!input.files[0]) return;
        document.getElementById("shporta-list").innerText = "Duke kërkuar fjalën TOTAL... 🔍";
        // Simulimi i gjetjes së rreshtit BOLD TOTAL
        setTimeout(() => {
            const shumaFatures = Math.floor(Math.random() * 2000) + 500;
            document.getElementById("shuma").value = shumaFatures;
            document.getElementById("shporta-list").innerHTML = `<b class="text-blue-600">GJETUR TOTALI: ${shumaFatures} L</b>`;
            katAktuale = "Market"; 
        }, 1500);
    }

    function resetKursimet() { if(confirm("A jeni i sigurt? Kjo do të fshijë të gjitha kursimet e mbledhura!")) { kursimetMBLEDHURA = 0; localStorage.setItem("kursime_mbledhura", 0); perditesoKasaforten(); } }
    function ruajEmrin() { localStorage.setItem("obj_emri", document.getElementById("obj-emri").value); }
    function shfaqKategoriteKryesore() { /* ... kodi i vjeter ... */ }
    function shtoNeShporte(e, c, i) { /* ... kodi i vjeter ... */ }
    function llogaritTotalin() { /* ... kodi i vjeter ... */ }
    async function ruajShpenzim() { /* ... kodi i vjeter ... */ }
    function pastroShporten() { shportaObj = {}; llogaritTotalin(); }
    function toggleDark() { document.body.classList.toggle('dark'); }
</script>
</body>
</html>
