<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root { --bg: #f8fafc; --box: white; --txt: #1e293b; --border: #f1f5f9; }
        .dark { --bg: #0f172a; --box: #1e293b; --txt: #f8fafc; --border: #334155; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.3s; }
        .pad { background: var(--box); padding: 15px 5px; border-radius: 20px; text-align: center; border: 2px solid var(--border); }
        .box { background: var(--box); padding: 20px; border-radius: 28px; border: 1px solid var(--border); }
        input, select { background: var(--bg); color: var(--txt); border: 1px solid var(--border); }
    </style>
</head>
<body class="p-4 pb-20">

<button onclick="toggleDark()" class="fixed top-4 right-4 z-50 p-2 rounded-full bg-slate-200 dark:bg-slate-700">🌙</button>

<div id="login-ui" class="max-w-xs mx-auto mt-20 box text-center">
    <h2 class="text-xl font-black mb-6 uppercase italic text-blue-600">FAMILY Finance</h2>
    <select id="user-select" class="w-full p-4 mb-3 rounded-2xl font-bold outline-none"></select>
    <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-6 rounded-2xl text-center font-bold outline-none" inputmode="numeric">
    <button id="btn-login" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-black">HYR</button>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="flex justify-between items-center mb-4 text-[12px] font-bold">
        <select id="sel-muaji" onchange="merrRaportin()" class="bg-transparent outline-none"></select>
        <button onclick="shfaqFondet()" class="text-green-500 uppercase">+ Fond</button>
    </div>

    <div class="p-6 bg-slate-900 text-white rounded-[30px] mb-4">
        <p class="text-slate-400 text-[10px] uppercase font-bold mb-1">Mbetja</p>
        <h1 id="r-mbetja" class="text-3xl font-black text-blue-400 mb-2">0 L</h1>
        <div id="piechart" style="width: 100%; height: 160px;"></div>
    </div>

    <div id="kategori-pads" class="grid grid-cols-3 gap-3 mb-6"></div>

    <div class="box mb-6 border-2 border-blue-600/20">
        <input id="shuma" type="number" placeholder="0 L" class="text-4xl font-black text-blue-500 bg-transparent border-none w-full text-center outline-none" inputmode="numeric">
        <input id="shenime" placeholder="Shënim..." class="text-[10px] text-slate-500 mt-2 bg-transparent border-none w-full text-center outline-none">
        <div class="flex gap-2 mt-4">
            <button onclick="ruajShpenzim()" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase italic">Ruaj ✅</button>
            <button onclick="pastroShporten()" class="bg-slate-100 dark:bg-slate-800 px-6 rounded-2xl">🗑️</button>
        </div>
    </div>

    <div id="lista-histori" class="space-y-3"></div>
</div>

<div id="modal-fond" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-6 z-50">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[30px] p-6 text-center">
        <input id="f-burimi" placeholder="Burimi" class="w-full p-4 mb-2 rounded-2xl outline-none">
        <input id="f-shuma" type="number" placeholder="Shuma" class="w-full p-4 mb-4 rounded-2xl outline-none font-bold">
        <button onclick="ruajFond()" class="w-full p-4 bg-green-600 text-white rounded-xl font-bold">SHTO</button>
    </div>
</div>

<script>
    google.charts.load('current', {'packages':['corechart']});
    const URL = "https://script.google.com/macros/s/AKfycbyq_0VquRxRNciMafdyYwTst0n4Pv7y8ecE4FebqB21bUxSVkQ8DuggA9hE__O_rLJZ/exec"; 
    let uAktual = "", allData = {}, katAktuale = "", isDark = false;

    function toggleDark() {
        isDark = !isDark;
        document.body.classList.toggle('dark');
        merrRaportin(); // Ridrejtojme grafikun me ngjyra te reja
    }

    window.onload = async () => {
        const muajt = ["Janar","Shkurt","Mars","Prill","Maj","Qershor","Korrik","Gusht","Shtator","Tetor","Nëntor","Dhjetor"];
        const selM = document.getElementById("sel-muaji");
        muajt.forEach((m, i) => { selM.innerHTML += `<option value="${i+1}" ${new Date().getMonth()==i?'selected':''}>${m} ${new Date().getFullYear()}</option>`; });
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
        allData = await r.json();
        allData.users.forEach(u => { document.getElementById("user-select").innerHTML += `<option value="${u}">${u}</option>`; });
    };

    document.getElementById("btn-login").onclick = async () => {
        const u = document.getElementById("user-select").value, p = document.getElementById("pass").value;
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "login", user: u, pass: p }) });
        const d = await r.json();
        if(d.status == "ok") { uAktual = u; document.getElementById("login-ui").classList.add("hidden"); document.getElementById("app-ui").classList.remove("hidden"); shfaqKategoriteKryesore(); merrRaportin(); }
        else alert("PIN i gabuar!");
    };

    function shfaqKategoriteKryesore() {
        katAktuale = ""; 
        let h = "";
        allData.kats.forEach(k => {
            let func = k.kaNen == "Po" ? `shfaqNenkategorite('${k.emri}')` : `shtoNeShporte('${k.emri}', 0, true)`;
            h += `<div class="pad" onclick="${func}"><span class="text-[10px] font-black uppercase">${k.emri}</span></div>`;
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shfaqNenkategorite(prindi) {
        katAktuale = prindi; 
        let h = `<button onclick="shfaqKategoriteKryesore()" class="col-span-3 mb-2 text-[9px] font-bold text-blue-500 uppercase">⬅ Mbrapa</button>`;
        allData.nenkats.filter(n => n.prindi == prindi).forEach(n => {
            h += `<div class="pad" style="border-style:dashed" onclick="shtoNeShporte('${n.emri}', ${n.cmimi}, false)">
                <span class="text-[10px] font-bold">${n.emri}</span><br>
                <b class="text-blue-500 text-[9px]">${n.cmimi > 0 ? n.cmimi + ' L' : 'Pa çmim'}</b>
            </div>`;
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shtoNeShporte(e, c, isDirect) {
        if(isDirect) katAktuale = e; 
        let sInput = document.getElementById("shuma");
        let currentS = parseFloat(sInput.value) || 0;
        if(c > 0) sInput.value = currentS + c;
        else sInput.focus();
        let note = document.getElementById("shenime").value;
        document.getElementById("shenime").value = note ? note + ", " + e : e;
    }

    function pastroShporten() { document.getElementById("shuma").value = ""; document.getElementById("shenime").value = ""; }

    async function ruajShpenzim() {
        const s = document.getElementById("shuma").value, sh = document.getElementById("shenime").value;
        if(!s || !katAktuale) return alert("Zgjidh kategorinë!");
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto", user: uAktual, kat: katAktuale, shuma: s, shenime: sh }) });
        alert("✅ U ruajt!"); pastroShporten(); merrRaportin();
    }

    function shfaqFondet() { document.getElementById("modal-fond").classList.toggle("hidden"); }

    async function ruajFond() {
        const b = document.getElementById("f-burimi").value, s = document.getElementById("f-shuma").value;
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto_fond", user: uAktual, burimi: b, shuma: s }) });
        shfaqFondet(); merrRaportin();
    }

    async function merrRaportin() {
        const m = document.getElementById("sel-muaji").value, v = new Date().getFullYear();
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: m, viti: v }) });
        const d = await r.json();
        document.getElementById("r-mbetja").innerText = d.mbetja.toLocaleString() + " L";
        
        // Grafiku
        let chartData = [['K', 'L']];
        for(let k in d.grafiku) chartData.push([k, d.grafiku[k]]);
        if(chartData.length > 1) {
            let data = google.visualization.arrayToDataTable(chartData);
            new google.visualization.PieChart(document.getElementById('piechart')).draw(data, {
                backgroundColor: 'transparent',
                colors: ['#3b82f6', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6'],
                legend: {textStyle: {color: isDark ? '#f8fafc' : '#cbd5e1', fontSize: 8}},
                chartArea: {width:'100%', height:'100%'}
            });
        }
        
        let h = "";
        d.lista.forEach(i => {
            h += `<div class="box p-4 flex justify-between items-center ${i.t=='hyrje'?'border-l-4 border-green-500':'border-l-4 border-red-500'}">
                <div class="text-left"><b class="text-[10px] uppercase">${i.k}</b><br><small class="text-slate-500 text-[8px]">${i.u} • ${i.d}</small></div>
                <b class="text-sm ${i.t=='hyrje'?'text-green-500':'text-red-500'}">${i.s.toLocaleString()} L</b>
            </div>`;
        });
        document.getElementById("lista-histori").innerHTML = h;
    }
</script>
</body>
</html>
