<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance App PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; color: #1e293b; }
        .box { background: white; padding: 22px; border-radius: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .pad { background: white; border: 2px solid #e2e8f0; padding: 15px; border-radius: 20px; text-align: center; cursor: pointer; font-weight: 800; font-size: 11px; transition: 0.2s; }
        .pad.active { border-color: #2563eb; background: #2563eb; color: white; transform: scale(0.95); }
    </style>
</head>
<body class="p-4">

<div id="login-ui" class="max-w-xs mx-auto mt-20 box text-center">
    <h1 class="text-2xl font-black italic mb-6">Finance <span class="text-blue-600">PRO</span></h1>
    <div id="status-load" class="text-[10px] text-blue-500 mb-4 uppercase font-bold tracking-widest animate-pulse">Duke lidhur serverin...</div>
    
    <select id="user-select" class="w-full p-4 mb-3 rounded-2xl border-2 font-bold bg-slate-50 outline-none border-slate-100">
        <option value="">Duke kërkuar përdorues...</option>
    </select>
    
    <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-6 rounded-2xl border-2 text-center font-bold outline-none border-slate-100" inputmode="numeric">
    
    <button onclick="login()" id="btn-login" disabled class="w-full p-4 bg-slate-200 text-white rounded-2xl font-black transition-all">PRIT...</button>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden pt-2">
    <div class="box text-center">
        <input id="shuma" type="number" placeholder="0 L" class="w-full text-center text-5xl font-black text-blue-600 outline-none mb-6" inputmode="numeric">
        
        <div id="kategorite-grid" class="grid grid-cols-2 gap-2 mb-6 text-xs">
            </div>
        
        <button id="btn-save" onclick="regjistro()" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black shadow-lg uppercase active:scale-95 transition-all">REGJISTRO ✅</button>
    </div>
    
    <div class="box">
        <h3 class="text-[10px] font-black uppercase text-slate-400 mb-4 text-center tracking-widest">Analiza e Muajit</h3>
        <canvas id="myChart" style="max-height: 200px;"></canvas>
    </div>
</div>

<script>
    const SHEET_ID = "10G3upOlUypMC_ITUu1jtWa8LQRWTtw1oVgCVP88AqIs";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyhxTCRPLrUHDdgHCU4sziQR0VHjBzEOyibiIRAVnQ4RssH4GoLDVs9bomrTCt6ozzU/exec";
    
    let dbPerdoruesit = {}; 
    let uAktual = "", katZgjedhur = "", chartInstance = null;

    // Kthen te dhenat ne array te paster
    async function merriNgaSheets(faqja) {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${faqja}`);
        const csv = await res.text();
        return csv.split('\n').slice(1).map(r => r.split('","').map(c => c.replace(/"/g, '').trim()));
    }

    // Fillon Aplikacionin
    async function initApp() {
        try {
            // 1. Merr Perdoruesit
            const userRows = await merriNgaSheets('Perdoruesit');
            let userHTML = "";
            userRows.forEach(cols => {
                if(cols[0] && cols[1]) {
                    dbPerdoruesit[cols[0]] = cols[1];
                    userHTML += `<option value="${cols[0]}">${cols[0]}</option>`;
                }
            });
            document.getElementById('user-select').innerHTML = userHTML;

            // 2. Merr Kategorite
            const katRows = await merriNgaSheets('Kategorite');
            let katHTML = "";
            katRows.forEach(cols => {
                if(cols[0]) {
                    katHTML += `<div class="pad" onclick="setKat(this, '${cols[0]}')">${cols[0]}</div>`;
                }
            });
            document.getElementById('kategorite-grid').innerHTML = katHTML;

            // Ndiz Butonin e Hyrjes
            document.getElementById('btn-login').disabled = false;
            document.getElementById('btn-login').className = "w-full p-4 bg-slate-900 text-white rounded-2xl font-black shadow-lg";
            document.getElementById('btn-login').innerText = "HYR";
            document.getElementById('status-load').innerText = "Sistemi Gati ✅";
            document.getElementById('status-load').classList.remove('animate-pulse');

        } catch (e) {
            document.getElementById('status-load').innerText = "Gabim! Kontrollo Google Sheets.";
            document.getElementById('status-load').style.color = "red";
        }
    }

    function login() {
        const u = document.getElementById("user-select").value;
        const p = document.getElementById("pass").value;
        if(dbPerdoruesit[u] === p) {
            uAktual = u;
            document.getElementById("login-ui").style.display = "none";
            document.getElementById("app-ui").classList.remove("hidden");
            buildChart();
        } else {
            alert("PIN i gabuar!");
        }
    }

    function setKat(el, kat) {
        document.querySelectorAll('.pad').forEach(p => p.classList.remove('active'));
        el.classList.add('active'); 
        katZgjedhur = kat.split(' ')[0]; // Mban vetem tekstin, heq emoji per databaze nese ka
    }

    async function regjistro() {
        const sh = document.getElementById("shuma").value;
        if(!sh || !katZgjedhur) return alert("Plotëso të dhënat!");
        
        const btn = document.getElementById('btn-save');
        btn.innerText = "DUKE RUAJTUR...";
        btn.disabled = true;

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ emri: uAktual, kategoria: katZgjedhur, shuma: sh })
            });
            alert("U regjistrua! ✅");
            document.getElementById("shuma").value = "";
            document.querySelectorAll('.pad').forEach(p => p.classList.remove('active'));
            katZgjedhur = "";
            btn.innerText = "REGJISTRO ✅";
            btn.disabled = false;
            buildChart(); // Llogarit grafikun e ri prapa kuintave
        } catch (e) {
            alert("Ndodhi një gabim!");
            btn.innerText = "REGJISTRO ✅";
            btn.disabled = false;
        }
    }

    async function buildChart() {
        try {
            const rows = await merriNgaSheets('Log');
            let katsData = {};
            
            rows.forEach(cols => {
                // Supozohet Kolona 2=Kategoria, Kolona 3=Shuma
                if(cols.length >= 4) {
                    const k = cols[2];
                    const v = parseFloat(cols[3]);
                    if(k && !isNaN(v)) {
                        katsData[k] = (katsData[k] || 0) + v;
                    }
                }
            });

            const ctx = document.getElementById('myChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(katsData),
                    datasets: [{
                        data: Object.values(katsData),
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#64748b'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } } }
            });
        } catch (e) { console.log("Grafiku nuk ka të dhëna ende."); }
    }

    // Fillo sistemin sapo hapet faqja
    initApp();
</script>
</body>
</html>
