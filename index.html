<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa-Family Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --bg: #f8fafc; --box: white; --txt: #0f172a; --border: #e2e8f0; }
        .dark { --bg: #0f172a; --box: #1e293b; --txt: #ffffff; --border: #334155; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        
        .pad { background: var(--box); padding: 15px 5px; border-radius: 20px; text-align: center; border: 2px solid var(--border); transition: 0.1s; cursor: pointer; }
        .pad:active { transform: scale(0.90); background: #dbeafe; border-color: #3b82f6; }
        
        .box { background: var(--box); padding: 20px; border-radius: 28px; border: 1px solid var(--border); }
        input, select { background: var(--bg); color: var(--txt); border: 1px solid var(--border); font-weight: bold; }
        
        /* Teksti i Bardhë për zona specifike */
        .text-white-fix { color: #ffffff !important; }
        .pazar-item { color: #ffffff !important; background: #2563eb !important; border: 2px solid #60a5fa !important; font-weight: 900 !important; }
        .pazar-item.done { text-decoration: line-through; opacity: 0.3; background: #475569 !important; border-color: transparent !important; }
        
        @keyframes pulse-red { 0%, 100% { color: #ef4444; } 50% { color: #fca5a5; opacity: 0.8; } }
        .limit-warning { animation: pulse-red 1.5s infinite; font-weight: 900; }
        
        button:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="p-4 pb-20">

<div class="fixed top-4 right-4 z-50 flex gap-2">
    <button onclick="shkarkoPDF()" class="p-3 rounded-full bg-red-600 text-white shadow-lg text-[10px] font-black">PDF</button>
    <button onclick="toggleDark()" class="p-3 rounded-full bg-slate-200 dark:bg-slate-700 shadow-lg text-lg">🌙</button>
</div>

<div id="login-ui" class="max-w-xs mx-auto mt-16 box text-center shadow-2xl">
    <h2 class="text-3xl font-black mb-6 uppercase tracking-tighter italic">Financa<span class="text-blue-600">-</span>Family</h2>
    <select id="user-select" class="w-full p-4 mb-3 rounded-2xl outline-none text-center"></select>
    <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-8 rounded-2xl text-center text-xl" inputmode="numeric">
    <button id="btn-login" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black uppercase">Hyni</button>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="flex justify-between items-center mb-4 text-[11px] font-black uppercase">
        <div class="flex gap-1">
            <select id="sel-muaji" onchange="merrRaportin()" class="bg-transparent text-blue-600 border-none"></select>
            <select id="sel-viti" onchange="merrRaportin()" class="bg-transparent text-slate-400 border-none"></select>
        </div>
        <span class="text-slate-400">Arka Aktive</span>
    </div>

    <div class="p-6 bg-slate-900 rounded-[35px] mb-4 shadow-2xl text-center">
        <p class="text-slate-400 text-[10px] uppercase font-black mb-1">Mbetja Totale</p>
        <h1 id="r-mbetja" class="text-4xl font-black text-blue-400 mb-2">0 L</h1>
        <div id="top-3-container" class="mb-4 flex justify-center gap-2"></div>
        <div id="piechart" style="width: 100%; height: 160px;"></div>
        <div class="mt-4 px-2">
            <div class="flex justify-between text-[9px] font-black uppercase mb-1 text-white-fix">
                <span>Shpenzuar / Limit</span>
                <span id="txt-limit" class="text-white-fix">0 / 0 L</span>
            </div>
            <div class="w-full bg-white/10 rounded-full h-2 overflow-hidden">
                <div id="bar-limit" class="bg-blue-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
        <button onclick="shfaqFondet()" class="mt-6 bg-blue-600 border border-blue-400 px-5 py-2 rounded-full text-[10px] font-black uppercase text-white">+ SHTO PARA</button>
    </div>

    <div class="box mb-4 bg-gradient-to-r from-blue-700 to-indigo-800 text-white border-none shadow-xl">
        <div class="flex justify-between items-center mb-2">
            <input id="obj-emri" class="bg-transparent border-none text-xs font-bold text-white outline-none w-1/2 placeholder-blue-200" onchange="syncKursimToSheet()" placeholder="Emri i kursimit">
            <span id="obj-perq" class="text-[10px] font-black bg-white/20 px-2 py-1 rounded-md">0%</span>
        </div>
        <div class="w-full bg-black/20 rounded-full h-1.5 mb-3">
            <div id="obj-bar" class="bg-white h-full rounded-full transition-all duration-700" style="width: 0%"></div>
        </div>
        <div class="flex justify-between items-center">
            <span id="obj-vlerat" class="text-[11px] font-black text-white">0 / 0 L</span>
            <div class="flex gap-2">
                <button onclick="shtoKursim()" class="bg-green-500 text-[9px] font-black px-3 py-2 rounded-xl shadow-md">+ SHTO</button>
                <button onclick="ndryshoQellimin()" class="bg-white/20 text-[9px] font-black px-3 py-2 rounded-xl">🎯</button>
            </div>
        </div>
    </div>

    <div class="box mb-4 border-dashed border-2 border-blue-400 dark:border-blue-500 bg-blue-50/5">
        <h3 class="text-[10px] font-black uppercase text-blue-600 dark:text-blue-400 mb-3 italic">🛒 Lista e Pazarit</h3>
        <div class="flex flex-col gap-2 mb-3">
            <select id="pazar-select" class="w-full p-3 rounded-xl text-xs outline-none bg-white dark:bg-slate-700 font-black border-blue-200"></select>
            <div class="flex gap-2">
                <input id="pazar-manual-input" type="text" placeholder="Shto artikull të ri..." class="flex-1 p-3 rounded-xl text-xs outline-none bg-white dark:bg-slate-700 font-bold border-blue-200">
                <button onclick="shtoNePazar()" class="bg-blue-600 text-white px-6 rounded-xl font-black shadow-lg">SHTO</button>
            </div>
        </div>
        <div id="pazar-lista" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto"></div>
        <button onclick="pastroPazarin()" class="w-full mt-3 text-[9px] font-bold text-red-500 uppercase">Pastro të blerat</button>
    </div>

    <div id="kategori-pads" class="grid grid-cols-3 gap-3 mb-6"></div>

    <div class="box mb-6 border-2 border-blue-600 shadow-xl bg-blue-50/10 text-center relative">
        <div class="text-[10px] font-black uppercase text-blue-600 mb-1">Totali i Shportës</div>
        <input id="shuma" type="number" placeholder="0 L" class="text-4xl font-black text-blue-600 bg-transparent border-none w-full text-center outline-none" readonly>
        <div id="shporta-list" class="bg-white dark:bg-slate-800 p-3 rounded-xl mt-2 min-h-[40px] text-[11px] font-black text-slate-600 dark:text-slate-300">Zgjidh produktet...</div>
        <div class="flex gap-2 mt-4">
            <button id="btn-ruaj" onclick="ruajShpenzim()" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-md active:bg-green-600">PAGUAJ ✅</button>
            <button onclick="pastroShporten()" class="bg-red-100 px-4 rounded-2xl text-red-600 font-bold">🗑️</button>
        </div>
    </div>
    
    <div id="lista-histori" class="space-y-3 pb-10"></div>
</div>

<div id="modal-manual" class="fixed inset-0 bg-black/95 hidden flex items-center justify-center p-6 z-[100]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[35px] p-6 text-center shadow-2xl border-t-8 border-blue-600">
        <h3 id="manual-titulli" class="text-sm font-black mb-4 uppercase text-blue-600 italic">Shuma</h3>
        <input id="manual-input" type="number" class="w-full p-5 mb-4 rounded-2xl font-black text-4xl text-center border-2 border-blue-100 outline-none text-blue-600" inputmode="decimal" placeholder="0">
        <button onclick="konfirmoManual()" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black uppercase shadow-xl">Shto në Shportë</button>
    </div>
</div>

<div id="modal-fond" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-6 z-50">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[30px] p-6 shadow-2xl text-center">
        <input id="f-burimi" placeholder="Burimi" class="w-full p-4 mb-2 rounded-2xl text-center font-bold">
        <input id="f-shuma" type="number" placeholder="Shuma L" class="w-full p-4 mb-4 rounded-2xl font-black text-center">
        <div class="flex gap-2"><button onclick="ruajFond()" class="flex-1 p-4 bg-green-600 text-white rounded-xl font-black uppercase text-[10px]">Shto</button>
        <button onclick="shfaqFondet()" class="flex-1 p-4 bg-slate-200 dark:bg-slate-700 rounded-xl font-bold uppercase text-[10px]">Mbyll</button></div>
    </div>
</div>

<script>
    google.charts.load('current', {'packages':['corechart']});
    const URL = "https://script.google.com/macros/s/AKfycbyq_0VquRxRNciMafdyYwTst0n4Pv7y8ecE4FebqB21bUxSVkQ8DuggA9hE__O_rLJZ/exec"; 
    let uAktual = "", allData = {}, katAktuale = "", isDark = false, shportaObj = {}, listaRaportit = [], produktiManualIAktual = "";
    let pazarData = JSON.parse(localStorage.getItem("pazar_list")) || [];

    function vibro() { if (navigator.vibrate) navigator.vibrate(50); }
    function toggleDark() { isDark = !isDark; document.body.classList.toggle('dark'); merrRaportin(); }

    window.onload = async () => {
        initKursimet(); 
        shfaqPazarin();
        const muajt = ["Janar","Shkurt","Mars","Prill","Maj","Qershor","Korrik","Gusht","Shtator","Tetor","Nëntor","Dhjetor"];
        const selM = document.getElementById("sel-muaji"), selV = document.getElementById("sel-viti"), sot = new Date();
        muajt.forEach((m, i) => { selM.innerHTML += `<option value="${i+1}" ${sot.getMonth()==i?'selected':''}>${m}</option>`; });
        for(let v = 2025; v <= 2030; v++) { selV.innerHTML += `<option value="${v}" ${sot.getFullYear()==v?'selected':''}>${v}</option>`; }
        
        try {
            const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
            allData = await r.json();
            allData.users.forEach(u => { document.getElementById("user-select").innerHTML += `<option value="${u}">${u}</option>`; });
            mbushPazarSelect();
        } catch(e) { console.log("Error loading data"); }
    };

    function mbushPazarSelect() {
        const sel = document.getElementById("pazar-select");
        sel.innerHTML = '<option value="">Zgjidh nga kategoritë...</option>';
        allData.nenkats.forEach(n => { sel.innerHTML += `<option value='${JSON.stringify(n)}'>${n.emri}</option>`; });
    }

    function shtoNePazar() {
        const manualName = document.getElementById("pazar-manual-input").value.trim();
        const selectVal = document.getElementById("pazar-select").value;
        if (manualName !== "") {
            pazarData.push({txt: manualName, cmimi: 0, done: false});
            document.getElementById("pazar-manual-input").value = "";
        } else if (selectVal) {
            const item = JSON.parse(selectVal);
            pazarData.push({txt: item.emri, cmimi: item.cmimi, done: false});
        }
        localStorage.setItem("pazar_list", JSON.stringify(pazarData));
        shfaqPazarin();
    }

    function shfaqPazarin() {
        let h = "";
        pazarData.forEach((item, i) => {
            h += `<div onclick="blejNgaPazari(${i})" class="p-3 rounded-2xl text-[11px] font-black cursor-pointer shadow-md pazar-item ${item.done?'done':''}">${item.txt}</div>`;
        });
        document.getElementById("pazar-lista").innerHTML = h;
    }

    function blejNgaPazari(index) {
        if(pazarData[index].done) return;
        const item = pazarData[index];
        shtoNeShporte(item.txt, item.cmimi, true);
        pazarData[index].done = true;
        localStorage.setItem("pazar_list", JSON.stringify(pazarData));
        shfaqPazarin();
    }

    function pastroPazarin() {
        pazarData = pazarData.filter(i => !i.done);
        localStorage.setItem("pazar_list", JSON.stringify(pazarData));
        shfaqPazarin();
    }

    // SINHRONIZIMI I KURSIMEVE ME GOOGLE SHEETS
    async function syncKursimToSheet() {
        const emri = document.getElementById("obj-emri").value;
        const mbledhur = localStorage.getItem("kursime_mbledhura") || 0;
        const synimi = localStorage.getItem("obj_vlera") || 0;
        
        localStorage.setItem("obj_emri", emri);
        
        // Dërgojmë të dhënat në Sheet që të mos humbin
        await fetch(URL, { 
            method: "POST", 
            body: JSON.stringify({ 
                action: "sync_kursim", 
                user: uAktual, 
                emri: emri, 
                mbledhur: mbledhur, 
                synimi: synimi 
            }) 
        });
    }

    function initKursimet() {
        document.getElementById("obj-emri").value = localStorage.getItem("obj_emri") || "Kursimi im";
        perditesoKasaforten();
    }

    function perditesoKasaforten() {
        let mbledhur = parseFloat(localStorage.getItem("kursime_mbledhura")) || 0;
        let target = parseFloat(localStorage.getItem("obj_vlera")) || 0;
        let p = target > 0 ? Math.min((mbledhur / target) * 100, 100) : 0;
        document.getElementById("obj-bar").style.width = p + "%";
        document.getElementById("obj-perq").innerText = Math.floor(p) + "%";
        document.getElementById("obj-vlerat").innerText = `${mbledhur.toLocaleString()} / ${target.toLocaleString()} L`;
    }

    function shtoKursim() {
        let v = prompt("Sa lekë shtohen?");
        if(v && !isNaN(v)) {
            let mbledhur = parseFloat(localStorage.getItem("kursime_mbledhura")) || 0;
            localStorage.setItem("kursime_mbledhura", mbledhur + parseFloat(v));
            perditesoKasaforten();
            syncKursimToSheet();
        }
    }

    function ndryshoQellimin() {
        let t = prompt("Synimi i ri:");
        if(t && !isNaN(t)) {
            localStorage.setItem("obj_vlera", t);
            perditesoKasaforten();
            syncKursimToSheet();
        }
    }

    // GRAFIKU (Me Shkronja të Bardha)
    async function merrRaportin() {
        const m = document.getElementById("sel-muaji").value, v = document.getElementById("sel-viti").value; 
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: m, viti: v }) });
        const d = await r.json();
        listaRaportit = d.lista || [];
        document.getElementById("r-mbetja").innerText = d.mbetja.toLocaleString() + " L";
        
        let limitTot = allData.kats.reduce((a, b) => a + parseFloat(b.limiti || 0), 0);
        document.getElementById("txt-limit").innerText = `${d.dalje.toLocaleString()} / ${limitTot.toLocaleString()} L`;
        document.getElementById("bar-limit").style.width = Math.min((d.dalje / limitTot) * 100, 100) + "%";

        let chartData = [['K', 'L']];
        for(let k in d.grafiku) chartData.push([k, d.grafiku[k]]);
        
        if(chartData.length > 1) {
            new google.visualization.PieChart(document.getElementById('piechart')).draw(google.visualization.arrayToDataTable(chartData), {
                backgroundColor: 'transparent', 
                colors: ['#3b82f6', '#10b981', '#ef4444', '#f59e0b'],
                legend: { textStyle: { color: '#ffffff', fontSize: 10, bold: true }, position: 'right' },
                chartArea: { width:'100%', height:'90%' }, 
                pieHole: 0.5,
                pieSliceTextStyle: { color: '#ffffff' }
            });
        }
        
        let h = "";
        listaRaportit.forEach(i => {
            h += `<div class="box p-4 flex justify-between items-center ${i.t=='hyrje'?'border-l-8 border-green-500':'border-l-8 border-red-500'} shadow-sm mb-2">
                <div><b class="text-[10px] uppercase">${i.k}</b><br><small class="text-slate-500 text-[8px]">${i.u} • ${i.d}</small></div>
                <b class="text-sm font-black">${i.s.toLocaleString()} L</b>
            </div>`;
        });
        document.getElementById("lista-histori").innerHTML = h;
    }

    // LOGIN & ACTIONS
    document.getElementById("btn-login").onclick = async () => {
        const btn = document.getElementById("btn-login"); btn.innerText = "Hyrja...";
        const u = document.getElementById("user-select").value, p = document.getElementById("pass").value;
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "login", user: u, pass: p }) });
        const d = await r.json();
        if(d.status == "ok") { 
            uAktual = u; document.getElementById("login-ui").classList.add("hidden"); 
            document.getElementById("app-ui").classList.remove("hidden"); 
            shfaqKategoriteKryesore(); merrRaportin(); 
        } else { alert("PIN i gabuar!"); btn.innerText = "Hyni"; }
    };

    function shfaqKategoriteKryesore() {
        let h = "";
        allData.kats.forEach(k => {
            let func = k.kaNen == "Po" ? `shfaqNenkategorite('${k.emri}')` : `shtoNeShporte('${k.emri}', 0, true)`;
            h += `<div class="pad shadow-sm" onclick="${func}"><span class="text-[10px] font-black uppercase">${k.emri}</span></div>`;
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shfaqNenkategorite(prindi) {
        let h = `<button onclick="shfaqKategoriteKryesore()" class="col-span-3 mb-2 py-2 text-[10px] font-black text-blue-600 uppercase italic">⬅ Mbrapsht</button>`;
        allData.nenkats.filter(n => n.prindi == prindi).forEach(n => {
            h += `<div class="pad border-dashed" onclick="shtoNeShporte('${n.emri}', ${n.cmimi}, false)">
                <span class="text-[10px] font-bold">${n.emri}</span><br><b class="text-blue-500 text-[9px]">${n.cmimi > 0 ? n.cmimi + ' L' : 'SHTO'}</b>
            </div>`;
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shtoNeShporte(emri, cmimi, isDirect) {
        vibro(); if(isDirect) katAktuale = emri;
        if (parseFloat(cmimi) === 0) {
            produktiManualIAktual = emri; 
            document.getElementById("manual-titulli").innerText = emri;
            document.getElementById("manual-input").value = ""; 
            document.getElementById("modal-manual").classList.remove("hidden");
            setTimeout(() => {
                const inp = document.getElementById("manual-input");
                inp.focus(); inp.select();
            }, 400);
        } else {
            if (!shportaObj[emri]) shportaObj[emri] = { sasia: 1, cmimi: parseFloat(cmimi) }; 
            else shportaObj[emri].sasia += 1;
            llogaritTotalin();
        }
    }

    function llogaritTotalin() {
        let t = 0, l = [];
        for (let e in shportaObj) { t += (shportaObj[e].sasia * shportaObj[e].cmimi); l.push(shportaObj[e].sasia > 1 ? `${e} x${shportaObj[e].sasia}` : e); }
        document.getElementById("shuma").value = t; document.getElementById("shporta-list").innerText = l.join(", ");
    }

    async function ruajShpenzim() {
        const s = document.getElementById("shuma").value; if(!s) return alert("Bosh!");
        const btn = document.getElementById("btn-ruaj"); btn.innerText = "PRIT..."; btn.disabled = true;
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto", user: uAktual, kat: katAktuale, shuma: s, shenime: document.getElementById("shporta-list").innerText }) });
        btn.innerText = "PAGUAJ ✅"; btn.disabled = false; pastroShporten(); merrRaportin();
    }

    function pastroShporten() { shportaObj = {}; document.getElementById("shuma").value = ""; document.getElementById("shporta-list").innerText = "Zgjidh produktet..."; }
    function konfirmoManual() {
        const v = parseFloat(document.getElementById("manual-input").value); if(!v) return;
        if (!shportaObj[produktiManualIAktual]) shportaObj[produktiManualIAktual] = { sasia: 1, cmimi: v };
        else { shportaObj[produktiManualIAktual].sasia += 1; shportaObj[produktiManualIAktual].cmimi = v; }
        document.getElementById("modal-manual").classList.add("hidden"); llogaritTotalin();
    }

    function shfaqFondet() { document.getElementById("modal-fond").classList.toggle("hidden"); }
    async function ruajFond() {
        const b = document.getElementById("f-burimi").value, s = document.getElementById("f-shuma").value;
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto_fond", user: uAktual, burimi: b, shuma: s }) });
        shfaqFondet(); merrRaportin();
    }

    function shkarkoPDF() {
        const { jsPDF } = window.jspdf; const doc = new jsPDF();
        doc.text("Raporti Financiar - " + uAktual, 14, 20);
        doc.autoTable({ head: [['Data', 'Kategoria', 'Shuma']], body: listaRaportit.map(i => [i.d, i.k, i.s + " L"]), startY: 30 });
        doc.save("Raporti.pdf");
    }
</script>
</body>
</html>
