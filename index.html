<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/180/star--v1.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <title>KidQuest Pro G2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Nunito', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* FIX: Vizualizimi i butonave të zgjedhjes */
        .child-chk:checked + label {
            background-color: #4f46e5 !important;
            color: white !important;
            border-color: #3730a3 !important;
            transform: scale(1.05);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .game-card { border-bottom-width: 6px; border-right-width: 4px; transition: all 0.1s; }
        .game-card:active { border-bottom-width: 2px; border-right-width: 2px; transform: translateY(4px) translateX(2px); }
        .progress-fill { transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1); }
    </style>
</head>
<body class="bg-slate-50">

    <div id="login-screen" class="flex flex-col items-center justify-center h-screen px-4 bg-indigo-600">
        <div class="text-center mb-8 text-white">
            <h1 class="text-5xl font-black italic">KidQuest</h1>
            <p class="font-bold opacity-70 text-sm tracking-widest uppercase">Misionet e Familjes</p>
        </div>
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border-b-8 border-indigo-200 text-center">
            <p id="loading-text" class="text-indigo-500 font-bold mb-4 animate-pulse">Duke u lidhur...</p>
            <div id="login-form" class="hidden space-y-4">
                <input id="user-input" type="text" placeholder="Emri yt" class="w-full p-4 bg-slate-100 rounded-2xl font-bold focus:outline-none">
                <input id="pass-input" type="password" placeholder="PIN" class="w-full p-4 bg-slate-100 rounded-2xl font-bold focus:outline-none">
                <button onclick="login()" class="w-full bg-indigo-500 text-white p-5 rounded-2xl font-black text-xl shadow-[0_5px_0_#4338ca] active:translate-y-1">HYR</button>
            </div>
        </div>
    </div>

    <div id="app-screen" class="hidden max-w-lg mx-auto bg-white min-h-screen relative pb-24 shadow-2xl">
        <header class="bg-indigo-600 text-white p-6 flex justify-between items-center rounded-b-[2rem]">
            <h2 id="welcome-text" class="text-xl font-black">Heroi</h2>
            <div class="flex gap-2">
                <button id="btn-settings" onclick="toggleSettings()" class="hidden bg-indigo-500 p-3 rounded-xl">⚙️</button>
                <button onclick="logout()" class="text-xs font-bold opacity-70">Dil</button>
            </div>
        </header>

        <div id="admin-panel" class="hidden p-5">
            <h3 class="text-sm font-black text-orange-500 mb-4 uppercase italic">⏳ Aprovimet: <span id="pending-count">0</span></h3>
            <div id="admin-pending-tasks" class="space-y-3 mb-8"></div>

            <div class="bg-indigo-50 p-6 rounded-[2.5rem] border-4 border-indigo-100 mb-8">
                <h3 class="font-black text-indigo-700 mb-4 text-center">🚀 DËRGO MISION</h3>
                <select id="quick-task-select" class="w-full p-4 mb-4 border-2 border-indigo-200 rounded-2xl font-bold" onchange="fillTaskForm()"></select>
                <div class="flex gap-2 mb-3">
                    <input id="task-emoji" type="text" readonly onclick="openCustomEmojiPicker('task-emoji')" placeholder="👇" class="w-1/4 p-4 border-2 border-indigo-200 rounded-2xl bg-white text-center text-2xl">
                    <input id="task-name" type="text" placeholder="Emri..." class="w-3/4 p-4 border-2 border-indigo-200 rounded-2xl font-bold">
                </div>
                <input id="task-points" type="number" placeholder="Pikët (+ ose -)" class="w-full p-4 mb-5 border-2 border-indigo-200 rounded-2xl font-bold">
                
                <p class="text-xs font-bold text-indigo-400 mb-2 ml-1 italic">Kush do ta bëjë?</p>
                <div id="assign-checkboxes" class="flex flex-wrap gap-2 mb-6"></div>
                
                <button onclick="sendTaskToFirebase()" id="btn-send-task" class="w-full bg-indigo-500 text-white p-5 rounded-2xl font-black text-xl shadow-[0_5px_0_#4338ca] active:translate-y-1">DËRGO MISIONIN</button>
            </div>

            <div class="h-44 mb-4"><canvas id="adminChart"></canvas></div>
            <div class="bg-slate-900 p-4 rounded-3xl h-52"><canvas id="weeklyChart"></canvas></div>
        </div>

        <div id="settings-panel" class="hidden p-5">
            <h2 class="text-2xl font-black mb-6 text-indigo-700 italic">⚙️ Cilësimet e Bordit</h2>
            
            <div class="bg-indigo-600 p-5 rounded-3xl text-white mb-6">
                <h3 class="font-black mb-3 italic">🎯 Synimi & Shpërblimi</h3>
                <input id="setting-goal-points" type="number" placeholder="Pikët e Synimit" class="w-full p-3 rounded-xl text-black mb-2 font-bold">
                <input id="setting-goal-reward" type="text" placeholder="Shpërblimi (p.sh. Parku)" class="w-full p-3 rounded-xl text-black font-bold">
            </div>

            <div class="bg-green-50 p-5 rounded-3xl border-2 border-green-100 mb-6">
                <h3 class="text-green-700 font-black mb-3 italic">📲 Telegram Bot</h3>
                <input id="setting-tg-token" type="text" placeholder="Bot Token" class="w-full p-3 border rounded-xl text-xs mb-2">
                <input id="setting-tg-id" type="text" placeholder="Chat ID" class="w-full p-3 border rounded-xl text-xs">
            </div>

            <div id="edit-children-list" class="bg-white p-5 rounded-3xl border-2 mb-6 space-y-3 shadow-sm"></div>
            <div id="edit-parents-list" class="bg-white p-5 rounded-3xl border-2 mb-6 space-y-3 shadow-sm"></div>

            <button onclick="saveSettings()" class="w-full bg-indigo-600 text-white font-black p-5 rounded-2xl shadow-xl mb-4">RUAJ NDRYSHIMET</button>
            <button onclick="saveTaskTemplate()" class="w-full bg-slate-100 p-3 rounded-xl text-xs font-bold mb-4">Shto Mision Shabllon</button>
            <button onclick="resetApp()" class="w-full text-red-400 text-xs font-bold">Reset Data</button>
        </div>

        <div id="child-panel" class="hidden p-5">
            <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-b-8 border-slate-100 mb-8 mt-2">
                <div class="flex justify-between items-end mb-2">
                    <span id="goal-text" class="text-xs font-black text-indigo-600 italic">Dhurata...</span>
                    <span class="text-[10px] font-bold text-slate-400"><span id="my-points">0</span> / <span id="goal-points-display">0</span> ⭐</span>
                </div>
                <div class="w-full bg-slate-100 h-6 rounded-full overflow-hidden p-1">
                    <div id="progress-bar" class="progress-fill h-full bg-gradient-to-r from-indigo-500 to-pink-500 rounded-full" style="width: 0%"></div>
                </div>
            </div>
            <div id="task-list" class="space-y-4"></div>
            <div class="mt-10 bg-slate-900 p-5 rounded-[2.5rem] h-40"><canvas id="childChart"></canvas></div>
        </div>
    </div>

    <div id="emoji-modal" class="hidden fixed inset-0 bg-slate-900/80 flex items-center justify-center z-50 px-4 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-6 w-full max-w-xs text-center">
            <div class="grid grid-cols-5 gap-3 text-3xl mb-6" id="emoji-grid"></div>
            <button onclick="closeEmojiModal()" class="w-full bg-slate-100 font-black py-3 rounded-2xl">Mbyll</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query, orderBy, doc, updateDoc, where, setDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaN5zEU0_pByPUM_EySHnLvEkbduuFX34",
            authDomain: "ian-jon-ansi.firebaseapp.com",
            projectId: "ian-jon-ansi",
            storageBucket: "ian-jon-ansi.firebasestorage.app",
            messagingSenderId: "847967076537",
            appId: "1:847967076537:web:05f57a87a71decf14e5b68"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = null, adminChart = null, childChart = null, weekChart = null, isFirstLoad = true, pointsData = {}, appConfig = null;
        const myEmojis = ['📚','🛏️','🧹','🍽️','👕','🦷','🚿','🗑️','🏃','🎨','📝','🐶','🐱','🍎','🥦','🏅','🏆','⭐','🎮','🚗','🏀','⚽','🌱','🛠️','🧩','🧸','🎵','🚲','🧼','🙌'];
        let targetEmojiField = null;

        window.openCustomEmojiPicker = f => { targetEmojiField = document.getElementById(f); document.getElementById('emoji-grid').innerHTML = myEmojis.map(e => `<div class="cursor-pointer" onclick="selectEmoji('${e}')">${e}</div>`).join(''); document.getElementById('emoji-modal').classList.remove('hidden'); };
        window.selectEmoji = e => { if(targetEmojiField) targetEmojiField.value = e; window.closeEmojiModal(); };
        window.closeEmojiModal = () => document.getElementById('emoji-modal').classList.add('hidden');

        const configRef = doc(db, "system", "settings");
        onSnapshot(configRef, (docSnap) => {
            if (docSnap.exists()) {
                appConfig = docSnap.data();
                showLogin();
                updateUI();
            } else {
                setDoc(configRef, { 
                    femijet: [{id:"c1", emri:"Ian", pass:"123", tel:""}, {id:"c2", emri:"Jon", pass:"123", tel:""}, {id:"c3", emri:"Ansi", pass:"123", tel:""}], 
                    prinderit: [{id:"p1", emri:"Babi", pass:"123"}], 
                    shabllone: [], goal_piket: 100, goal_shperblimi: "Surprizë", tg_token: "", tg_id: "" 
                });
            }
        });

        function showLogin() { document.getElementById('loading-text').classList.add('hidden'); document.getElementById('login-form').classList.remove('hidden'); }
        
        function updateUI() {
            if(!appConfig) return;
            const cc = document.getElementById('assign-checkboxes');
            cc.innerHTML = `<div class="w-full mb-1"><input type="checkbox" id="check-all" class="hidden" onchange="toggleAll(this)"><label for="check-all" class="cursor-pointer block p-2 border-2 rounded-xl text-center font-bold text-gray-400 text-xs">Të gjithë</label></div>`;
            appConfig.femijet.forEach(f => {
                cc.innerHTML += `
                    <div class="flex-1">
                        <input type="checkbox" id="chk-${f.id}" value="${f.emri}" class="hidden child-chk">
                        <label for="chk-${f.id}" class="cursor-pointer block p-3 border-2 border-indigo-100 bg-white rounded-2xl font-black text-center text-xs transition-all">${f.emri}</label>
                    </div>`;
            });

            document.getElementById('setting-goal-points').value = appConfig.goal_piket || 100;
            document.getElementById('setting-goal-reward').value = appConfig.goal_shperblimi || "";
            document.getElementById('setting-tg-token').value = appConfig.tg_token || "";
            document.getElementById('setting-tg-id').value = appConfig.tg_id || "";

            const qs = document.getElementById('quick-task-select'); qs.innerHTML = `<option value="">-- Shabllonet --</option>`;
            (appConfig.shabllone || []).forEach(sh => { qs.innerHTML += `<option value="${sh.titulli}|${sh.emoji}|${sh.piket}">${sh.emoji} ${sh.titulli}</option>`; });
            
            const el = document.getElementById('edit-children-list'); el.innerHTML = `<h3 class="font-black text-xs text-blue-600 mb-2 italic">👦 FËMIJËT (EMRI / TEL)</h3>`;
            appConfig.femijet.forEach(f => { el.innerHTML += `<div class="flex gap-2"><input type="text" id="edit-name-${f.id}" value="${f.emri}" class="w-1/2 p-2 border rounded-lg text-sm"><input type="text" id="edit-tel-${f.id}" value="${f.tel || ''}" class="w-1/2 p-2 border rounded-lg text-xs" placeholder="355..."></div>`; });

            const pl = document.getElementById('edit-parents-list'); pl.innerHTML = `<h3 class="font-black text-xs text-indigo-600 mb-2 italic">👤 PRINDËRIT (EMRI / PIN)</h3>`;
            appConfig.prinderit.forEach(p => { pl.innerHTML += `<div class="flex gap-2"><input type="text" id="edit-pname-${p.id}" value="${p.emri}" class="w-1/2 p-2 border rounded-lg text-sm"><input type="text" id="edit-ppass-${p.id}" value="${p.pass}" class="w-1/2 p-2 border rounded-lg text-sm"></div>`; });
        }

        window.login = () => {
            const u = document.getElementById('user-input').value.trim(), p = document.getElementById('pass-input').value.trim();
            const pr = appConfig.prinderit.find(x => x.emri.toLowerCase() === u.toLowerCase() && x.pass === p);
            const fe = appConfig.femijet.find(x => x.emri.toLowerCase() === u.toLowerCase() && x.pass === p);
            if (pr) { currentUser = { emri: pr.emri, role: 'admin' }; dash(); }
            else if (fe) { currentUser = { emri: fe.emri, role: 'child' }; dash(); }
            else alert("Gabim Emri ose PIN!");
        };

        function dash() {
            document.getElementById('login-screen').classList.add('hidden'); document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('welcome-text').innerText = "Hero: " + currentUser.emri;
            window.calculateTotalPoints();
            if (currentUser.role === 'admin') { document.getElementById('btn-settings').classList.remove('hidden'); document.getElementById('admin-panel').classList.remove('hidden'); window.listenForApprovals(); }
            else { document.getElementById('child-panel').classList.remove('hidden'); window.listenToMyTasks(currentUser.emri); }
        }

        window.sendTaskToFirebase = async () => {
            const n = document.getElementById('task-name').value, e = document.getElementById('task-emoji').value || "✨", p = parseInt(document.getElementById('task-points').value);
            const r = Array.from(document.querySelectorAll('.child-chk:checked')).map(c => c.value);
            if(!n || isNaN(p) || r.length === 0) return alert("Plotëso misionin!");
            
            const btn = document.getElementById('btn-send-task');
            btn.innerText = "DËRGUAR...";
            
            for (let c of r) { 
                await addDoc(collection(db, "tasks"), { titulli: n, emoji: e, piket: p, kujt_i_caktohet: c, krijuar_nga: currentUser.emri, statusi: "hapur", koha: serverTimestamp() }); 
            }
            
            if(r.length === 1) { 
                const f = appConfig.femijet.find(x => x.emri === r[0]);
                if(f && f.tel) window.location.href = `https://api.whatsapp.com/send?phone=${f.tel.replace(/\D/g,'')}&text=${encodeURIComponent(`🚀 Mision: *${n}* (+${p}⭐)`) }`;
            } else { alert("U dërguan!"); location.reload(); }
        };

        window.listenToMyTasks = (c) => {
            onSnapshot(query(collection(db, "tasks"), orderBy("koha", "desc")), (snap) => {
                const l = document.getElementById('task-list'); l.innerHTML = ""; let pts = 0;
                snap.forEach(d => {
                    const t = d.data(); if(t.kujt_i_caktohet === c && t.statusi !== "refuzuar") {
                        if(t.statusi === "aprovuar") pts += t.piket;
                        let b = "", clr = "bg-white border-indigo-200";
                        if(t.statusi === "hapur") b = `<button onclick="sub('${d.id}', '${t.titulli}')" class="bg-indigo-500 text-white px-4 py-2 rounded-xl font-black text-xs shadow-[0_4px_0_#4338ca]">KREVA</button>`;
                        else if(t.statusi === "ne_pritje") { b = `<span class="text-orange-400 font-bold italic
