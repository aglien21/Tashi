<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa-Family</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --bg: #f8fafc; --box: white; --txt: #1e293b; --border: #f1f5f9; }
        .dark { --bg: #0f172a; --box: #1e293b; --txt: #f8fafc; --border: #334155; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .pad { background: var(--box); padding: 15px 5px; border-radius: 20px; text-align: center; border: 2px solid var(--border); transition: 0.1s; cursor: pointer; }
        .pad:active { transform: scale(0.92); background: #eff6ff; border-color: #3b82f6; }
        .box { background: var(--box); padding: 20px; border-radius: 28px; border: 1px solid var(--border); }
        input, select { background: var(--bg); color: var(--txt); border: 1px solid var(--border); }
        
        /* Animacion për logon */
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }
        .logo-pulse { animation: pulse-soft 3s infinite ease-in-out; }
    </style>
</head>
<body class="p-4 pb-20">

<div class="fixed top-4 right-4 z-50 flex gap-2">
    <button onclick="vibro(); shkarkoPDF()" class="p-3 rounded-full bg-red-500 text-white shadow-lg text-[10px] font-black tracking-widest uppercase">PDF</button>
    <button onclick="vibro(); toggleDark()" class="p-3 rounded-full bg-slate-200 dark:bg-slate-700 shadow-lg">🌙</button>
</div>

<div id="login-ui" class="max-w-xs mx-auto mt-16 box text-center shadow-2xl border border-blue-100/50">
    <div class="flex justify-center mb-6">
        <div class="bg-blue-600/10 dark:bg-blue-600/20 p-8 rounded-full logo-pulse">
            <svg class="w-20 h-20 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6m-9-6v3m3-3v3m3-3v3"></path>
            </svg>
        </div>
    </div>
    
    <h2 class="text-3xl font-black mb-1 uppercase text-slate-800 dark:text-slate-100 tracking-tighter">Financa<span class="text-blue-600">-</span>Family</h2>
    <p class="text-[10px] text-slate-500 mb-10 uppercase font-bold tracking-[0.2em] italic">Management Panel</p>
    
    <select id="user-select" class="w-full p-4 mb-3 rounded-2xl font-bold outline-none text-center text-sm border-2 border-blue-50/50"></select>
    <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-8 rounded-2xl text-center font-bold outline-none text-xl border-2 border-blue-50/50" inputmode="numeric">
    
    <button id="btn-login" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black shadow-lg text-sm uppercase tracking-widest active:scale-95 transition-all">
        Hyni në Panel
    </button>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="flex justify-between items-center mb-4 gap-2">
        <div class="flex gap-1">
            <select id="sel-muaji" onchange="vibro(); merrRaportin()" class="bg-transparent outline-none font-black text-blue-600 text-[11px] uppercase"></select>
            <select id="sel-viti" onchange="vibro(); merrRaportin()" class="bg-transparent outline-none font-black text-slate-400 text-[11px]"></select>
        </div>
        <span class="text-slate-400 uppercase tracking-widest text-[9px] font-bold">Paneli i Kontrollit 🏠</span>
    </div>

    <div class="p-6 bg-slate-900 text-white rounded-[35px] mb-4 shadow-2xl relative text-center">
        <p class="text-slate-400 text-[10px] uppercase font-black mb-1 tracking-widest">Mbetja Totale</p>
        <h1 id="r-mbetja" class="text-4xl font-black text-blue-400 mb-4">0 L</h1>
        <div id="piechart" style="width: 100%; height: 180px;"></div>
        <div class="mt-4 px-2">
            <div class="flex justify-between text-[9px] font-black uppercase mb-1 text-slate-400">
                <span>Limit Mujor</span>
                <span id="txt-limit">0 / 0 L</span>
            </div>
            <div class="w-full bg-white/10 rounded-full h-2 overflow-hidden">
                <div id="bar-limit" class="bg-blue-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>
        <button onclick="vibro(); shfaqFondet()" class="mt-6 bg-blue-600/20 border border-blue-500/30 px-5 py-2 rounded-full text-[10px] font-black uppercase text-blue-300">
            + SHTO PARA
        </button>
    </div>

    <div class="box mb-4 bg-gradient-to-r from-blue-600 to-indigo-700 text-white border-none shadow-xl">
        <div class="flex justify-between items-center mb-2">
            <input id="obj-emri" class="bg-transparent border-none text-xs font-bold text-blue-100 outline-none w-1/2" onchange="ruajEmrinKursimit()" placeholder="Emri i kursimit">
            <span id="obj-perq" class="text-[10px] font-black bg-white/20 px-2 py-1 rounded-md">0%</span>
        </div>
        <div class="w-full bg-black/20 rounded-full h-2 mb-3">
            <div id="obj-bar" class="bg-white h-full rounded-full transition-all duration-1000" style="width: 0%"></div>
        </div>
        <div class="flex justify-between items-center">
            <div class="text-[11px] font-bold"><span id="obj-vlerat">0 / 0 L</span></div>
            <div class="flex gap-2">
                <button onclick="vibro(); shtoKursim()" class="bg-green-500/80 text-[9px] font-black px-3 py-2 rounded-xl shadow-md">+ SHTO</button>
                <button onclick="vibro(); ndryshoQellimin()" class="bg-white/20 text-[9px] font-black px-3 py-2 rounded-xl">🎯</button>
            </div>
        </div>
    </div>

    <div id="kategori-pads" class="grid grid-cols-3 gap-3 mb-6"></div>

    <div class="box mb-6 border-2 border-blue-600/30 shadow-xl bg-blue-50/10 text-center relative">
        <div class="text-[10px] font-black uppercase text-blue-500 mb-1 italic">Arka / Pagesa</div>
        <input id="shuma" type="number" placeholder="0 L" class="text-4xl font-black text-blue-600 bg-transparent border-none w-full text-center outline-none" readonly>
        <div id="shporta-list" class="bg-slate-100 dark:bg-slate-800/50 p-3 rounded-xl mt-2 min-h-[40px] text-[11px] font-medium text-slate-500">
            Zgjidh produktet...
        </div>
        
        <input type="file" accept="image/*" capture="environment" id="skaneri" class="hidden" onchange="procesoSkanimin(event)">
        
        <div class="flex gap-2 mt-4">
            <button onclick="vibro(); document.getElementById('skaneri').click()" class="bg-slate-800 dark:bg-slate-700 text-white px-4 rounded-2xl font-bold text-lg shadow-md active:scale-95">📷</button>
            
            <button id="btn-ruaj" onclick="ruajShpenzim()" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-black text-xs uppercase shadow-md active:bg-green-600">
                PAGUAJ ✅
            </button>
            
            <button onclick="vibro(); pastroShporten()" class="bg-red-50 dark:bg-red-900/20 px-4 rounded-2xl border border-red-100 text-red-500 font-bold">🗑️</button>
        </div>
    </div>
    
    <div id="lista-histori" class="space-y-3 pb-10"></div>
</div>

<div id="modal-manual" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-6 z-[60]">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[30px] p-6 text-center shadow-2xl border-t-4 border-blue-600">
        <h3 id="manual-titulli" class="text-sm font-black mb-4 uppercase text-blue-500 italic">Shuma</h3>
        <input id="manual-input" type="number" placeholder="Lekë" class="w-full p-4 mb-4 rounded-2xl outline-none font-bold text-2xl text-center border-2 border-blue-100" inputmode="numeric">
        <button onclick="konfirmoManual()" class="w-full p-4 bg-blue-600 text-white rounded-xl font-black shadow-lg">SHTO NË SHPORTË</button>
    </div>
</div>

<div id="modal-fond" class="fixed inset-0 bg-black/80 hidden flex items-center justify-center p-6 z-50">
    <div class="bg-white dark:bg-slate-800 w-full max-w-xs rounded-[30px] p-6 shadow-2xl">
        <input id="f-burimi" placeholder="Burimi" class="w-full p-4 mb-2 rounded-2xl outline-none text-center">
        <input id="f-shuma" type="number" placeholder="Shuma L" class="w-full p-4 mb-4 rounded-2xl outline-none font-bold text-lg text-center">
        <div class="flex gap-2">
            <button onclick="ruajFond()" class="flex-1 p-4 bg-green-600 text-white rounded-xl font-black text-[10px]">SHTO</button>
            <button onclick="shfaqFondet()" class="flex-1 p-4 bg-slate-100 dark:bg-slate-700 rounded-xl font-bold text-[10px]">MBYLL</button>
        </div>
    </div>
</div>

<script>
    google.charts.load('current', {'packages':['corechart']});
    const URL = "https://script.google.com/macros/s/AKfycbyq_0VquRxRNciMafdyYwTst0n4Pv7y8ecE4FebqB21bUxSVkQ8DuggA9hE__O_rLJZ/exec"; 
    let uAktual = "", allData = {}, katAktuale = "", isDark = false;
    let shportaObj = {}; 
    let produktiManualIAktual = null;
    
    // Variablat e reja globale
    let listaRaportit = [];
    let kursimetMBLEDHURA = 0;
    let targetKursimi = 0;

    function vibro() { if (navigator.vibrate) navigator.vibrate(45); }

    function toggleDark() {
        isDark = !isDark;
        document.body.classList.toggle('dark');
        merrRaportin();
    }

    window.onload = async () => {
        initKursimet(); // Thërrasim funksionin e kursimeve në fillim
        
        const muajt = ["Janar","Shkurt","Mars","Prill","Maj","Qershor","Korrik","Gusht","Shtator","Tetor","Nëntor","Dhjetor"];
        const selM = document.getElementById("sel-muaji");
        const selV = document.getElementById("sel-viti");
        const sot = new Date();
        muajt.forEach((m, i) => { selM.innerHTML += `<option value="${i+1}" ${sot.getMonth()==i?'selected':''}>${m}</option>`; });
        for(let v = 2025; v <= 2030; v++) { selV.innerHTML += `<option value="${v}" ${sot.getFullYear()==v?'selected':''}>${v}</option>`; }
        
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
        allData = await r.json();
        allData.users.forEach(u => { document.getElementById("user-select").innerHTML += `<option value="${u}">${u}</option>`; });
    };

    // --- LOGJIKA E KURSIMEVE ---
    function initKursimet() {
        kursimetMBLEDHURA = parseFloat(localStorage.getItem("kursime_mbledhura")) || 0;
        targetKursimi = parseFloat(localStorage.getItem("obj_vlera")) || 0;
        document.getElementById("obj-emri").value = localStorage.getItem("obj_emri") || "Kursimi im";
        perditesoKasaforten();
    }
    function ruajEmrinKursimit() { 
        localStorage.setItem("obj_emri", document.getElementById("obj-emri").value); 
    }
    function perditesoKasaforten() {
        if(targetKursimi > 0) {
            const perq = Math.min((kursimetMBLEDHURA / targetKursimi) * 100, 100);
            document.getElementById("obj-bar").style.width = perq + "%";
            document.getElementById("obj-perq").innerText = Math.floor(perq) + "%";
            document.getElementById("obj-vlerat").innerText = `${kursimetMBLEDHURA.toLocaleString()} / ${targetKursimi.toLocaleString()} L`;
        } else {
            document.getElementById("obj-vlerat").innerText = `${kursimetMBLEDHURA.toLocaleString()} / CAKTO 🎯`;
            document.getElementById("obj-perq").innerText = "0%";
            document.getElementById("obj-bar").style.width = "0%";
        }
    }
    function ndryshoQellimin() {
        const t = prompt("Sa është shuma synim për kursimin (Lekë)?", targetKursimi);
        if(t && !isNaN(t)) { 
            targetKursimi = parseFloat(t); 
            localStorage.setItem("obj_vlera", targetKursimi); 
            perditesoKasaforten(); 
        }
    }
    function shtoKursim() {
        const v = prompt("Shto vlerë në kursime (Lekë):", "");
        if(v && !isNaN(v)) { 
            kursimetMBLEDHURA += parseFloat(v); 
            localStorage.setItem("kursime_mbledhura", kursimetMBLEDHURA); 
            perditesoKasaforten(); 
        }
    }

    // --- LOGJIKA E PDF ---
    function shkarkoPDF() {
        if(!listaRaportit || listaRaportit.length === 0) return alert("Nuk ka të dhëna për të shkarkuar për këtë muaj!");
        const { jsPDF } = window.jspdf; 
        const doc = new jsPDF();
        
        doc.setFontSize(16);
        doc.text("Raporti Financiar - Financa Family", 14, 20);
        doc.setFontSize(10);
        
        const m = document.getElementById("sel-muaji").options[document.getElementById("sel-muaji").selectedIndex].text;
        const v = document.getElementById("sel-viti").value;
        doc.text(`Periudha: ${m} ${v}`, 14, 28);
        
        doc.autoTable({ 
            head: [['Data', 'Përdoruesi', 'Kategoria', 'Shuma', 'Lloji']], 
            body: listaRaportit.map(i => [i.d, i.u, i.k, i.s + " L", i.t.toUpperCase()]), 
            startY: 35,
            theme: 'grid',
            headStyles: { fillColor: [59, 130, 246] }
        });
        
        doc.save(`Raporti_Financiar_${m}_${v}.pdf`);
    }

    // --- LOGJIKA E SKANERIT ---
    function procesoSkanimin(e) {
        const file = e.target.files[0];
        if(file) {
            alert("Fotoja u shkrep me sukses! \n\n(Në të ardhmen kjo do të lexojë barkodin kur ta lidhim me një server API)");
            vibro();
        }
    }

    document.getElementById("btn-login").onclick = async () => {
        vibro();
        const btn = document.getElementById("btn-login");
        btn.innerText = "Po lidhem...";
        btn.disabled = true;
        const u = document.getElementById("user-select").value, p = document.getElementById("pass").value;
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "login", user: u, pass: p }) });
        const d = await r.json();
        if(d.status == "ok") { 
            uAktual = u; 
            document.getElementById("login-ui").classList.add("hidden"); 
            document.getElementById("app-ui").classList.remove("hidden"); 
            shfaqKategoriteKryesore(); 
            merrRaportin(); 
        } else {
            alert("PIN i gabuar!");
            btn.innerText = "Hyni në Panel";
            btn.disabled = false;
        }
    };

    function shfaqKategoriteKryesore() {
        katAktuale = ""; 
        let h = "";
        allData.kats.forEach(k => {
            let func = k.kaNen == "Po" ? `shfaqNenkategorite('${k.emri}')` : `shtoNeShporte('${k.emri}', 0, true)`;
            h += `<div class="pad shadow-sm" onclick="vibro(); ${func}"><span class="text-[10px] font-black uppercase">${k.emri}</span></div>`;
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shfaqNenkategorite(prindi) {
        katAktuale = prindi; 
        let h = `<button onclick="vibro(); shfaqKategoriteKryesore()" class="col-span-3 mb-2 py-2 text-[10px] font-black text-blue-600 uppercase italic">⬅ KTHEHU PAS</button>`;
        allData.nenkats.filter(n => n.prindi == prindi).forEach(n => {
            h += `<div class="pad border-dashed" onclick="shtoNeShporte('${n.emri}', ${n.cmimi}, false)">
                <span class="text-[10px] font-bold">${n.emri}</span><br>
                <b class="text-blue-500 text-[9px]">${n.cmimi > 0 ? n.cmimi + ' L' : 'SHTO VETË'}</b>
            </div>`;
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    function shtoNeShporte(emri, cmimi, isDirect) {
        vibro();
        if(isDirect) katAktuale = emri;
        if (cmimi === 0) {
            produktiManualIAktual = emri;
            document.getElementById("manual-titulli").innerText = emri;
            document.getElementById("manual-input").value = "";
            document.getElementById("modal-manual").classList.remove("hidden");
            document.getElementById("manual-input").focus();
        } else {
            if (!shportaObj[emri]) { shportaObj[emri] = { sasia: 1, cmimi: parseFloat(cmimi) }; } 
            else { shportaObj[emri].sasia += 1; }
            llogaritTotalin();
        }
    }

    function konfirmoManual() {
        const vlera = parseFloat(document.getElementById("manual-input").value);
        if (!vlera) return alert("Vendos një çmim!");
        if (!shportaObj[produktiManualIAktual]) { shportaObj[produktiManualIAktual] = { sasia: 1, cmimi: vlera }; } 
        else { shportaObj[produktiManualIAktual].sasia += 1; shportaObj[produktiManualIAktual].cmimi = vlera; }
        document.getElementById("modal-manual").classList.add("hidden");
        llogaritTotalin();
        vibro();
    }

    function llogaritTotalin() {
        let total = 0;
        let treguesi = [];
        for (let emri in shportaObj) {
            let item = shportaObj[emri];
            total += (item.sasia * item.cmimi);
            treguesi.push(item.sasia > 1 ? `${emri} x${item.sasia}` : emri);
        }
        document.getElementById("shuma").value = total;
        document.getElementById("shporta-list").innerText = treguesi.join(", ");
    }

    function pastroShporten() { 
        shportaObj = {}; 
        document.getElementById("shuma").value = ""; 
        document.getElementById("shporta-list").innerText = "Zgjidh produktet..."; 
    }

    async function ruajShpenzim() {
        vibro();
        const s = document.getElementById("shuma").value;
        const sh = document.getElementById("shporta-list").innerText;
        if(!s || !katAktuale) return alert("Zgjidh produkte!");
        const btn = document.getElementById("btn-ruaj");
        btn.innerText = "DUKE PAGUAR...";
        btn.disabled = true;
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto", user: uAktual, kat: katAktuale, shuma: s, shenime: sh }) });
        btn.innerText = "PAGUAJ ✅";
        btn.disabled = false;
        pastroShporten(); 
        merrRaportin();
    }

    function shfaqFondet() { document.getElementById("modal-fond").classList.toggle("hidden"); }

    async function ruajFond() {
        vibro();
        const b = document.getElementById("f-burimi").value, s = document.getElementById("f-shuma").value;
        await fetch(URL, { method: "POST", body: JSON.stringify({ action: "shto_fond", user: uAktual, burimi: b, shuma: s }) });
        shfaqFondet(); merrRaportin();
    }

    async function merrRaportin() {
        const m = document.getElementById("sel-muaji").value;
        const v = document.getElementById("sel-viti").value; 
        document.getElementById("lista-histori").innerHTML = "<p class='text-center text-[10px] text-slate-400'>Duke u lidhur...</p>";
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: m, viti: v }) });
        const d = await r.json();
        
        // Ruajmë listën globale për PDF-në
        listaRaportit = d.lista || [];
        
        document.getElementById("r-mbetja").innerText = d.mbetja.toLocaleString() + " L";
        let limitTot = allData.kats.reduce((a, b) => a + parseFloat(b.limiti || 0), 0);
        let perq = limitTot > 0 ? (d.dalje / limitTot) * 100 : 0;
        document.getElementById("txt-limit").innerText = `${d.dalje.toLocaleString()} / ${limitTot.toLocaleString()} L`;
        document.getElementById("bar-limit").style.width = Math.min(perq, 100) + "%";
        
        let chartData = [['K', 'L']];
        for(let k in d.grafiku) chartData.push([k, d.grafiku[k]]);
        if(chartData.length > 1) {
            let data = google.visualization.arrayToDataTable(chartData);
            new google.visualization.PieChart(document.getElementById('piechart')).draw(data, {
                backgroundColor: 'transparent',
                colors: ['#3b82f6', '#10b981', '#ef4444', '#f59e0b', '#8b5cf6', '#ec4899'],
                legend: { textStyle: { color: isDark ? '#f8fafc' : '#cbd5e1', fontSize: 11, fontWeight: 'bold' }, position: 'right' },
                chartArea: { width:'100%', height:'90%' },
                pieHole: 0.5
            });
        } else {
            document.getElementById('piechart').innerHTML = "<div class='flex items-center justify-center h-full text-[10px] text-slate-500'>Bosh</div>";
        }
        
        let h = "";
        listaRaportit.forEach(i => {
            h += `<div class="box p-4 flex justify-between items-center ${i.t=='hyrje'?'border-l-4 border-green-500':'border-l-4 border-red-500'} shadow-sm mb-2">
                <div class="text-left"><b class="text-[10px] uppercase">${i.k}</b><br><small class="text-slate-500 text-[8px] italic">${i.u} • ${i.d}</small></div>
                <b class="text-sm ${i.t=='hyrje'?'text-green-500':'text-red-500'} font-black">${i.s.toLocaleString()} L</b>
            </div>`;
        });
        document.getElementById("lista-histori").innerHTML = h || "<p class='text-center text-[10px] text-slate-500'>Asgjë.</p>";
    }
</script>
</body>
</html>
