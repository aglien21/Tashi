<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TASHI-BATTERY - Sistemi i Rishitësve</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f7f6; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }
        
        /* Header */
        header { background: #1e2a38; color: white; padding: 15px 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; border-radius: 0 0 15px 15px; }
        .logo { height: 45px; }
        .center-header { text-align: center; }
        .client-name-display { text-align: right; font-size: 1.1em; font-weight: bold; color: #f39c12; }

        /* Login Box */
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 350px; margin: 80px auto; text-align: center; }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-login { width: 100%; background: #2980b9; color: white; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }

        /* Grid i Baterive */
        .battery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 20px; padding-bottom: 120px; }
        .card { background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); padding: 15px; text-align: center; position: relative; }
        .card img { width: 100%; height: 150px; object-fit: contain; }
        .badge { position: absolute; top: 10px; left: 10px; background: #f39c12; color: white; padding: 4px 8px; font-size: 10px; border-radius: 4px; font-weight: bold; }
        .name { font-weight: bold; margin: 10px 0; font-size: 13px; height: 35px; overflow: hidden; color: #333; }
        .price { color: #27ae60; font-size: 17px; font-weight: bold; margin-bottom: 10px; }
        
        .qty-box { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 5px; }
        .qty-input { width: 70px; padding: 8px; border: 1px solid #bbb; border-radius: 6px; text-align: center; font-size: 16px; }
        
        /* Footer Cart */
        .cart-summary { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 15px 25px; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-top: 1px solid #ddd; }
        .total-large { font-size: 18px; font-weight: bold; color: #1e2a38; }
        .btn-send { background: #25D366; color: white; padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; -webkit-appearance: none; }
    </style>
</head>
<body>

    <div id="login-section" class="login-box">
        <h2 style="color:#1e2a38">TASHI-BATTERY</h2>
        <p style="font-size:14px; color:#666;">Sistemi i Porosive</p>
        <input type="text" id="user" placeholder="Username" 
               autocorrect="off" autocapitalize="none" spellcheck="false">
        <input type="password" id="pass" placeholder="Password" 
               autocorrect="off" autocapitalize="none" spellcheck="false">
        <button class="btn-login" onclick="login()">HYR NË KATALOG</button>
        <p id="error" style="color:red; font-size:13px; margin-top:10px;"></p>
    </div>

    <div id="main-section" class="hidden">
        <header>
            <div><b style="font-size:12px;">INTACT</b></div>
            <div class="center-header">
                <div style="font-size:11px; opacity:0.8;">Bilanci: <b id="display-bilanci">0</b> L</div>
            </div>
            <div class="client-name-display" id="display-user"></div>
        </header>

        <div class="container">
            <div class="battery-grid" id="batteryContainer"></div>
        </div>

        <div class="cart-summary">
            <div class="total-large">Totali: <span id="grandTotal">0</span> L</div>
            <button class="btn-send" onclick="dergoPorosine()">DËRGO ✅</button>
        </div>
    </div>

<script>
    // Linku i ri i Deployment nga Google Apps Script (Sigurohu të jetë versioni i fundit)
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyHQsgGQA80UPI2VuSNOH9V0N5LdOD0kAHqe-urKyExOAHk0dGDFm1hkhS9jtcJm-kWrA/exec";
    const TEL_NR = "355692336829";

    const users = {
        "admin": "shefi2026",
        "nardi": "nardi2",
        "ardi": "ardi1",
        "aglien": "agli3",
        "arjan": "arjan4"
        "andi": "andi5",
    };

    const batteries = [
        {name:"Intact Premium 50Ah (540A) [PP50MF]", price:6300},
        {name:"Intact Start 62Ah (540A) [56219]", price:6500},
        {name:"Intact Start 74Ah (680A) [57412]", price:7500, badge:"🔥Best Seller"},
        {name:"Intact Premium 78Ah (760A) [PP78MF]", price:9000},
        {name:"Intact Start 100Ah (850A) [60044]", price:10200, badge:"🔥Best Seller"},
        {name:"Intact Premium 100Ah (900A) [PP100MF]", price:11900},
        {name:"Intact Start 100Ah (850A) [60032]", price:10200},
        {name:"Intact Start-Stop 70Ah (760A) [EFB70SS]", price:10500},
        {name:"Intact Start-Stop 70Ah (760A) [AGM70SS]", price:13000},
        {name:"Intact Start 115Ah (1000A) [60210]", price:14875},
        {name:"Intact Start-Stop 80Ah (800A) [AGM80SS]", price:15400},
        {name:"Intact Start-Stop 95Ah (850A) [AGM95SS]", price:16900, badge:"🔥Best Seller"},
        {name:"Intact Start-Stop 105Ah (950A) [AGM105SS]", price:20400},
        {name:"Intact Start 180Ah (1000A) [68032SHD]", price:21000},
        {name:"Intact Start 225Ah (1150A) [72512SHD]", price:26000}
    ];

    const images = {
        "PP50MF":"https://www.intact-batterien.de/packshots/intact_premium_power_b_pp50mf_00_450.jpg",
        "56219":"https://www.intact-batterien.de/packshots/intact_start_power_b_56219gug_00_450.jpg",
        "57412":"https://www.intact-batterien.de/packshots/intact_start_power_b_57412gug_00_450.jpg",
        "PP78MF":"https://www.intact-batterien.de/packshots/intact_premium_power_b_pp78mf_00_450.jpg",
        "60044":"https://www.intact-batterien.de/packshots/intact_start_power_b_60044gug_00_450.jpg",
        "PP100MF":"https://www.intact-batterien.de/packshots/intact_premium_power_b_pp100mf_00_450.jpg",
        "60032":"https://www.intact-batterien.de/packshots/intact_start_power_asia_b_60032gug_00_450.jpg",
        "EFB70SS":"https://www.intact-batterien.de/packshots/intact_startstop_power_efb_b_efb70ss_00_450.jpg",
        "AGM70SS":"https://www.intact-batterien.de/packshots/intact_startstop_power_agm_b_agm70ss_00_450.jpg",
        "60210":"https://www.intact-batterien.de/packshots/intact_start_power_truck_b_60210gug_00_450.jpg",
        "AGM80SS":"https://www.intact-batterien.de/packshots/intact_startstop_power_agm_b_agm80ss_00_450.jpg",
        "AGM95SS":"https://www.intact-batterien.de/packshots/intact_startstop_power_agm_b_agm95ss_00_450.jpg",
        "AGM105SS":"https://www.intact-batterien.de/packshots/intact_startstop_power_agm_b_agm105ss_00_450.jpg",
        "68032SHD":"https://www.intact-batterien.de/packshots/intact_start_power_truck_b_68032shdgug_00_450.jpg",
        "72512SHD":"https://www.intact-batterien.de/packshots/intact_start_power_truck_b_72512shdgug_00_450.jpg"
    };

    let currentUser = "";

    function login() {
        let u = document.getElementById('user').value.toLowerCase().trim();
        let p = document.getElementById('pass').value.trim();

        if (users[u] && users[u] === p) {
            currentUser = u;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            document.getElementById('display-user').innerText = u.toUpperCase();
            renderCatalog();
            refreshBilanci();
        } else {
            document.getElementById('error').innerText = "Username ose Password gabim!";
        }
    }

    function renderCatalog() {
        const container = document.getElementById("batteryContainer");
        container.innerHTML = "";
        batteries.forEach((b, i) => {
            const code = b.name.match(/\[(.*?)\]/)[1];
            container.innerHTML += `
                <div class="card">
                    ${b.badge ? `<div class="badge">${b.badge}</div>` : ""}
                    <img src="${images[code] || ''}" alt="Bateri">
                    <div class="name">${b.name}</div>
                    <div class="price">${b.price.toLocaleString()} L</div>
                    <div class="qty-box">
                        <input type="number" value="0" min="0" class="qty-input" oninput="updateGrandTotal()">
                    </div>
                </div>`;
        });
    }

    function updateGrandTotal() {
        let total = 0;
        document.querySelectorAll('.qty-input').forEach((input, i) => {
            let sasia = parseInt(input.value) || 0;
            total += sasia * batteries[i].price;
        });
        document.getElementById('grandTotal').innerText = total.toLocaleString();
    }

    function refreshBilanci() {
        let b = localStorage.getItem('bilanci_' + currentUser) || 0;
        document.getElementById('display-bilanci').innerText = parseFloat(b).toLocaleString();
    }

    function dergoPorosine() {
        let totaliSot = 0;
        let infoText = "";
        document.querySelectorAll('.qty-input').forEach((input, i) => {
            let sasia = parseInt(input.value) || 0;
            if (sasia > 0) {
                totaliSot += sasia * batteries[i].price;
                infoText += `▪️ ${batteries[i].name}: ${sasia} copë\n`;
            }
        });

        if (totaliSot <= 0) { alert("Shto sasi!"); return; }

        // METODA E RE 'GET' - E domosdoshme për iPhone
        const params = new URLSearchParams({
            "user": currentUser,
            "detajet": infoText.replace(/\n/g, ", "),
            "vlera": totaliSot
        });

        // Kjo kërkesë GET nuk bllokohet nga Safari
        const img = new Image();
        img.src = GOOGLE_URL + "?" + params.toString();

        let bilanciRi = parseFloat(localStorage.getItem('bilanci_' + currentUser) || 0) + totaliSot;
        localStorage.setItem('bilanci_' + currentUser, bilanciRi);

        setTimeout(() => {
            let msg = `*POROSI E RE - INTACT*\n👤 Nga: ${currentUser.toUpperCase()}\n\n${infoText}\n💰 Totali: ${totaliSot.toLocaleString()} LEK\n📈 Bilanci: ${bilanciRi.toLocaleString()} LEK`;
            window.location.href = `https://wa.me/${TEL_NR}?text=${encodeURIComponent(msg)}`;
        }, 500);
    }
</script>
</body>
</html>
