<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buxheti Familjar PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .kat-btn { transition: all 0.2s; cursor: pointer; border: 2px solid #f3f4f6; }
        .kat-selected { border-color: #10b981 !important; background-color: #ecfdf5 !important; transform: scale(1.05); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        @keyframes fade-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fade-in 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-6 animate-in">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-extrabold text-gray-800">💰 Buxheti Im</h2>
            <span class="bg-green-100 text-green-700 text-xs font-bold px-3 py-1 rounded-full">LIVE SYNC</span>
        </div>
        
        <div class="mb-5">
            <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Shuma (Lekë)</label>
            <input type="number" id="shuma" inputmode="decimal" placeholder="0" 
                class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl text-3xl font-semibold focus:border-green-500 focus:bg-white outline-none transition-all">
        </div>

        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Kategoria</label>
        <div id="grid-kategori" class="grid grid-cols-3 gap-3 mb-6">
            </div>

        <div class="mb-6">
            <input type="text" id="shenime" placeholder="Shënime ose detaje..." 
                class="w-full p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none focus:border-green-500 focus:bg-white transition-all">
        </div>

        <button onclick="ruajGjithcka()" id="btn-ruaj" 
            class="w-full bg-green-600 hover:bg-green-700 text-white font-black py-5 rounded-2xl text-xl shadow-lg active:scale-95 transition-all">
            RUAJ SHPENZIMIN
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

               // --- 1. CONFIG E FIREBASE (E SAIPARASHTRUAR) ---
        const firebaseConfig = {
          apiKey: "AIzaSyCmtg3-Zg_cBRFYheD9ja3uwSY_SJR2xQY",
          authDomain: "buxheti-familjar.firebaseapp.com",
          projectId: "buxheti-familjar",
          storageBucket: "buxheti-familjar.firebasestorage.app",
          messagingSenderId: "56587868570",
          appId: "1:56587868570:web:5f98611e10a4813b3a4223",
          measurementId: "G-JJVL052492"
        };

        // --- 2. VENDOS KETU URL-NE E GOOGLE SCRIPT (/exec) ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwHxsrhVP3Z2MwYbT4SkZggg5jl9Zqj3L6M7v8kRdmwlnvn2tSbTyAaThUtKXmbJcan5A/exec";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const kategorite = [
            { emri: "Market", ikona: "🛒" },
            { emri: "Ujë", ikona: "💧" },
            { emri: "Energji", ikona: "⚡" },
            { emri: "Tregu", ikona: "🧺" },
            { emri: "Rroba", ikona: "🛍️" },
            { emri: "Makinë", ikona: "🚗" },
            { emri: "Kafe", ikona: "☕" },
            { emri: "Shëndet", ikona: "💊" },
            { emri: "Tjetër", ikona: "📝" }
        ];

        let kategoriaZgjedhur = "";

        // Ndertimi i Gridit
        const grid = document.getElementById("grid-kategori");
        kategorite.forEach(k => {
            const div = document.createElement("div");
            div.className = "kat-btn bg-gray-50 p-4 rounded-2xl text-center";
            div.innerHTML = `<div class="text-3xl">${k.ikona}</div><div class="text-[10px] font-black uppercase mt-1 text-gray-600">${k.emri}</div>`;
            div.onclick = () => {
                document.querySelectorAll('.kat-btn').forEach(b => b.classList.remove('kat-selected'));
                div.classList.add('kat-selected');
                kategoriaZgjedhur = k.emri;
                // Dridhje e lehte e telefonit nese mbeshtetet
                if(window.navigator.vibrate) window.navigator.vibrate(10);
            };
            grid.appendChild(div);
        });

        window.ruajGjithcka = async () => {
            const shuma = document.getElementById("shuma").value;
            const shenime = document.getElementById("shenime").value;
            const btn = document.getElementById("btn-ruaj");

            if (!shuma || !kategoriaZgjedhur) {
                alert("Zgjidh kategorinë dhe shuma!");
                return;
            }

            // UI REACTION (Imediate)
            btn.innerText = "✅ U RUAJT!";
            btn.disabled = true;
            btn.classList.add("opacity-50", "scale-95");

            try {
                // A) RUAN NE FIREBASE (Super Shpejt)
                addDoc(collection(db, "shpenzimet"), {
                    shuma: Number(shuma),
                    kategoria: kategoriaZgjedhur,
                    shenime: shenime,
                    data: serverTimestamp(),
                    perdoruesi: "Ian"
                });

                // B) DERGON NE GOOGLE SHEETS & TELEGRAM (Ne prapaskene)
                fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({
                        action: "shto",
                        user: "Ian",
                        kat: kategoriaZgjedhur,
                        shuma: shuma,
                        shenime: shenime
                    })
                });

                // Reset fushave pas 1 sekonde
                setTimeout(() => {
                    document.getElementById("shuma").value = "";
                    document.getElementById("shenime").value = "";
                    btn.innerText = "RUAJ SHPENZIMIN";
                    btn.disabled = false;
                    btn.classList.remove("opacity-50", "scale-95");
                    document.querySelectorAll('.kat-btn').forEach(b => b.classList.remove('kat-selected'));
                    kategoriaZgjedhur = "";
                }, 1000);

            } catch (e) {
                alert("Gabim! Provo përsëri.");
                btn.innerText = "PROVO PËRSËRI";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
