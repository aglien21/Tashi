<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance Ultimate - Ian</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .box { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .pad { background: white; border: 2px solid #e2e8f0; padding: 12px; border-radius: 15px; text-align: center; cursor: pointer; font-weight: 800; font-size: 11px; }
        .pad.active { border-color: #2563eb; background: #2563eb; color: white; }
    </style>
</head>
<body class="p-4">

<div id="login-ui" class="max-w-xs mx-auto mt-20 box text-center">
    <h1 class="text-2xl font-black mb-6 italic">Finance <span class="text-blue-600">APP</span></h1>
    <div id="user-loading" class="text-xs text-slate-400 mb-2 italic">Duke ngarkuar përdoruesit...</div>
    <select id="user-select" class="w-full p-4 mb-3 rounded-2xl border-2 font-bold bg-slate-50 outline-none"></select>
    <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-6 rounded-2xl border-2 text-center font-bold outline-none" inputmode="numeric">
    <button onclick="login()" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-black">HYR</button>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden pt-2">
    <div class="box text-center">
        <input id="shuma" type="number" placeholder="0 L" class="w-full text-center text-5xl font-black text-blue-600 outline-none mb-6" inputmode="numeric">
        <div id="kategorite-grid" class="grid grid-cols-2 gap-2 mb-6"></div>
        <button id="btn-save" onclick="regjistroGjithcka()" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black shadow-lg uppercase tracking-widest active:scale-95 transition-all">REGJISTRO ✅</button>
    </div>

    <div class="box">
        <canvas id="myChart" style="max-height: 200px;"></canvas>
    </div>
</div>

<script>
    const SHEET_ID = "1DXgZ5F05s5H1Lz4mESwMujiTBX-twlGzwoSBO_6Ehns";
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyhxTCRPLrUHDdgHCU4sziQR0VHjBzEOyibiIRAVnQ4RssH4GoLDVs9bomrTCt6ozzU/exec";
    
    let dbPerdoruesit = {}, katZgjedhur = "", uAktual = "";

    // 1. NGARKIMI I TE DHENAVE DINAMIKE
    async function loadData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`);
            const csv = await res.text();
            // Ketu mund te shtohet logjika per te ndare faqet, por per thjeshtesi:
            // Sigurohu qe faqja e pare ne Sheets te jete "Perdoruesit"
            const rows = csv.split('\n').slice(1);
            let userHTML = "";
            rows.forEach(r => {
                const cols = r.split('","').map(c => c.replace(/"/g, ''));
                dbPerdoruesit[cols[0]] = cols[1]; // Emri: PIN
                userHTML += `<option value="${cols[0]}">${cols[0]}</option>`;
            });
            document.getElementById('user-select').innerHTML = userHTML;
            document.getElementById('user-loading').innerText = "Gati!";
            
            // Kategorite (Shtohen manualisht ketu ose me fetch tjeter)
            const kats = ["Ushqim", "Transport", "Qejf", "Market"];
            let katHTML = "";
            kats.forEach(k => {
                katHTML += `<div class="pad" onclick="setKat(this, '${k}')">${k}</div>`;
            });
            document.getElementById('kategorite-grid').innerHTML = katHTML;
        } catch (e) { alert("Gabim ne lidhje me Sheets!"); }
    }

    function login() {
        const u = document.getElementById("user-select").value;
        const p = document.getElementById("pass").value;
        if(dbPerdoruesit[u] === p) {
            uAktual = u;
            document.getElementById("login-ui").style.display = "none";
            document.getElementById("app-ui").classList.remove("hidden");
            refreshChart();
        } else alert("PIN i gabuar!");
    }

    function setKat(el, kat) {
        document.querySelectorAll('.pad').forEach(p => p.classList.remove('active'));
        el.classList.add('active'); 
        katZgjedhur = kat;
    }

    // BUTONI MAGJIK: SHEETS + TELEGRAM PA SUBMIT
    async function regjistroGjithcka() {
        const sh = document.getElementById("shuma").value;
        if(!sh || !katZgjedhur) return alert("Ploteso te dhenat!");
        
        const btn = document.getElementById('btn-save');
        btn.innerText = "DUKE U RUAJTUR...";
        btn.disabled = true;

        const data = { emri: uAktual, kategoria: katZgjedhur, shuma: sh };

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(data)
            });
            alert("U regjistrua me sukses! ✅");
            location.reload(); // Rifreskohet qe te shfaqet grafiku i ri
        } catch (e) {
            alert("Ndodhi nje gabim!");
            btn.innerText = "REGJISTRO ✅";
            btn.disabled = false;
        }
    }

    function refreshChart() {
        // Logjika e grafikut si me pare
    }

    loadData();
</script>
</body>
</html>
