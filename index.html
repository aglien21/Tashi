<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financa-Family Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        :root { --bg: #f8fafc; --box: white; --txt: #0f172a; --border: #e2e8f0; }
        .dark { --bg: #0f172a; --box: #1e293b; --txt: #ffffff; --border: #334155; }
        body { background: var(--bg); color: var(--txt); font-family: 'Inter', sans-serif; transition: 0.3s; }
        
        .pad { background: var(--box); padding: 15px 5px; border-radius: 20px; text-align: center; border: 2px solid var(--border); cursor: pointer; }
        .pad:active { transform: scale(0.90); background: #dbeafe; }
        
        .box { background: var(--box); padding: 20px; border-radius: 28px; border: 1px solid var(--border); }
        
        .white-text { color: #ffffff !important; }
        .pazar-item { color: #ffffff !important; background: #2563eb !important; border: 2px solid #60a5fa !important; font-weight: 900; }
        .pazar-item.done { text-decoration: line-through; opacity: 0.4; background: #475569 !important; }
        
        button:active { transform: scale(0.95); }

        /* SHTUAR: Animacioni i pulsimit për 80% e limitit */
        @keyframes pulse-red { 0%, 100% { color: #ef4444; transform: scale(1); } 50% { color: #fca5a5; transform: scale(1.05); } }
        .limit-warning { animation: pulse-red 1s infinite; font-weight: 900 !important; }
        
        /* Kursor Autio-focus Style */
        #manual-input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="p-4 pb-20">

<div id="login-ui" class="max-w-xs mx-auto mt-16 box text-center shadow-2xl">
    <h2 class="text-3xl font-black mb-6 uppercase italic">Financa<span class="text-blue-600">-</span>Family</h2>
    <select id="user-select" class="w-full p-4 mb-3 rounded-2xl outline-none text-center bg-slate-100"></select>
    <input id="pass" type="password" placeholder="PIN" class="w-full p-4 mb-8 rounded-2xl text-center text-xl bg-slate-100" inputmode="numeric">
    <button id="btn-login" class="w-full p-5 bg-blue-600 text-white rounded-2xl font-black uppercase">Hyni</button>
</div>

<div id="app-ui" class="max-w-md mx-auto hidden">
    <div class="p-6 bg-slate-900 rounded-[35px] mb-4 shadow-2xl text-center">
        <h1 id="r-mbetja" class="text-4xl font-black text-blue-400 mb-2 transition-all">0 L</h1>
        <div id="piechart" style="width: 100%; height: 160px;"></div>
        <div class="mt-4 px-2">
            <div class="flex justify-between text-[10px] font-black uppercase mb-1 white-text">
                <span>Shpenzuar / Limit</span>
                <span id="txt-limit">0 / 0 L</span>
            </div>
            <div class="w-full bg-white/10 rounded-full h-2 overflow-hidden">
                <div id="bar-limit" class="bg-blue-500 h-full w-0 transition-all duration-1000"></div>
            </div>
        </div>
    </div>

    <div class="box mb-4 bg-gradient-to-r from-blue-700 to-indigo-800 text-white border-none shadow-xl">
        <div class="flex justify-between items-center mb-2">
            <input id="obj-emri" class="bg-transparent border-none text-xs font-bold text-white outline-none w-1/2" onchange="syncKursimToSheet()" placeholder="Emri i kursimit">
            <span id="obj-perq" class="text-[10px] font-black bg-white/20 px-2 py-1 rounded-md white-text">0%</span>
        </div>
        <div class="w-full bg-black/20 rounded-full h-1.5 mb-3">
            <div id="obj-bar" class="bg-white h-full rounded-full transition-all duration-700" style="width: 0%"></div>
        </div>
        <div class="flex justify-between items-center">
            <span id="obj-vlerat" class="text-[11px] font-black white-text">0 / 0 L</span>
            <div class="flex gap-2">
                <button onclick="shtoKursim()" class="bg-green-500 text-[9px] font-black px-3 py-2 rounded-xl">+ SHTO</button>
                <button onclick="ndryshoQellimin()" class="bg-white/20 text-[9px] font-black px-3 py-2 rounded-xl">🎯</button>
            </div>
        </div>
    </div>

    <div class="box mb-4 border-2 border-blue-400 bg-blue-50/5">
        <h3 class="text-[10px] font-black uppercase text-blue-600 mb-3 italic">🛒 Lista e Pazarit</h3>
        <div class="flex gap-2 mb-3">
            <input id="pazar-manual-input" type="text" placeholder="Shto artikull..." class="flex-1 p-3 rounded-xl text-xs outline-none bg-white border-blue-200">
            <button onclick="shtoNePazar()" class="bg-blue-600 text-white px-6 rounded-xl font-black">SHTO</button>
        </div>
        <div id="pazar-lista" class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto"></div>
        <button onclick="pastroPazarin()" class="w-full mt-3 text-[9px] font-bold text-red-500 uppercase">Pastro të blerat</button>
    </div>

    <div id="kategori-pads" class="grid grid-cols-3 gap-3 mb-6"></div>

    <div class="box mb-4 bg-slate-100 border-dashed border-2 border-slate-300">
        <div class="flex items-center justify-between">
            <span class="text-[10px] font-black text-slate-500 uppercase">Skano Faturë</span>
            <input type="file" id="ocr-upload" accept="image/*" class="hidden" onchange="processOCR(this)">
            <label for="ocr-upload" class="bg-blue-600 text-white px-4 py-2 rounded-full text-[9px] font-black cursor-pointer shadow-md">KAMERA 📷</label>
        </div>
        <div id="ocr-status" class="text-[9px] font-bold text-blue-600 mt-1 hidden italic">Duke lexuar faturën... Ju lutem prisni!</div>
    </div>

    <div class="box mb-6 border-2 border-blue-600 shadow-xl text-center">
        <input id="shuma" type="number" placeholder="0 L" class="text-4xl font-black text-blue-600 bg-transparent border-none w-full text-center outline-none" readonly>
        <div id="shporta-list" class="bg-slate-100 p-3 rounded-xl mt-2 min-h-[40px] text-[11px] font-black text-slate-600">Zgjidh produktet...</div>
        <button id="btn-ruaj" onclick="ruajShpenzim()" class="w-full mt-4 p-4 bg-blue-600 text-white rounded-2xl font-black uppercase">PAGUAJ ✅</button>
    </div>
</div>

<div id="modal-manual" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-6 z-[100]">
    <div class="bg-white w-full max-w-xs rounded-[35px] p-6 text-center shadow-2xl">
        <h3 id="manual-titulli" class="text-sm font-black mb-4 uppercase text-blue-600">Vendos Çmimin</h3>
        <input id="manual-input" type="number" class="w-full p-5 mb-4 rounded-2xl font-black text-4xl text-center border-2 border-blue-200 outline-none text-blue-600" inputmode="decimal">
        <div class="flex gap-2">
            <button onclick="document.getElementById('modal-manual').classList.add('hidden')" class="w-1/3 p-4 bg-slate-200 text-slate-600 rounded-2xl font-black">X</button>
            <button onclick="mbyllModalDheShto()" class="w-2/3 p-4 bg-blue-600 text-white rounded-2xl font-black">SHTO</button>
        </div>
    </div>
</div>

<script>
    google.charts.load('current', {'packages':['corechart']});
    const URL = "https://script.google.com/macros/s/AKfycbxkA2VERi_ZqKh2b4YVEMTOH88bKIBUgVzWjBgA_Vvp8pF3L8WiJZ0WqCsUV3QUFlE9/exec"; 
    let uAktual = "", allData = {}, shportaObj = {};
    let pazarData = JSON.parse(localStorage.getItem("pazar_list")) || [];
    let kategoriaAktuale = ""; // Ruan emrin e kategorise qe u klikua

    window.onload = async () => {
        initKursimet(); 
        shfaqPazarin();
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "get_data" }) });
        allData = await r.json();
        allData.users.forEach(u => { document.getElementById("user-select").innerHTML += `<option value="${u}">${u}</option>`; });
    };

    // KURSITMET
    function initKursimet() {
        document.getElementById("obj-emri").value = localStorage.getItem("obj_emri") || "Kursimi im";
        perditesoKasaforten();
    }

    function perditesoKasaforten() {
        let mbledhur = parseFloat(localStorage.getItem("kursime_mbledhura")) || 0;
        let target = parseFloat(localStorage.getItem("obj_vlera")) || 0;
        let p = target > 0 ? Math.min((mbledhur / target) * 100, 100) : 0;
        document.getElementById("obj-bar").style.width = p + "%";
        document.getElementById("obj-perq").innerText = Math.floor(p) + "%";
        document.getElementById("obj-vlerat").innerText = `${mbledhur.toLocaleString()} / ${target.toLocaleString()} L`;
    }

    async function syncKursimToSheet() {
        const emri = document.getElementById("obj-emri").value;
        const mbledhur = localStorage.getItem("kursime_mbledhura") || 0;
        const synimi = localStorage.getItem("obj_vlera") || 0;
        localStorage.setItem("obj_emri", emri);
        
        await fetch(URL, { 
            method: "POST", 
            body: JSON.stringify({ action: "sync_kursim", user: uAktual, emri: emri, mbledhur: mbledhur, synimi: synimi }) 
        });
    }

    function shtoKursim() {
        let v = prompt("Sa lekë shtohen?");
        if(v && !isNaN(v)) {
            let mbledhur = parseFloat(localStorage.getItem("kursime_mbledhura")) || 0;
            localStorage.setItem("kursime_mbledhura", mbledhur + parseFloat(v));
            perditesoKasaforten(); syncKursimToSheet(); 
        }
    }

    function ndryshoQellimin() {
        let t = prompt("Synimi i ri (lekë):");
        if(t && !isNaN(t)) {
            localStorage.setItem("obj_vlera", t);
            perditesoKasaforten(); syncKursimToSheet(); 
        }
    }

    // LOGIN & CORE
    document.getElementById("btn-login").onclick = async () => {
        const u = document.getElementById("user-select").value, p = document.getElementById("pass").value;
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "login", user: u, pass: p }) });
        const d = await r.json();
        if(d.status == "ok") { 
            uAktual = u; document.getElementById("login-ui").classList.add("hidden"); 
            document.getElementById("app-ui").classList.remove("hidden"); 
            shfaqKategoriteKryesore(); merrRaportin(); 
        }
    };

    // SHTUAR: MODIFIKUAR PER TE HAPUR MODALIN E CMIMIT
    function shfaqKategoriteKryesore() {
        let h = "";
        allData.kats.forEach(k => {
            // Tani klikimi hap modalin dhe fokuson kursorin
            h += `<div class="pad shadow-sm" onclick="shfaqModalManual('${k.emri}')"><span class="text-[10px] font-black uppercase">${k.emri}</span></div>`;
        });
        document.getElementById("kategori-pads").innerHTML = h;
    }

    // SHTUAR: LOGJIKA E MODALIT DHE AUTO-FOCUS
    function shfaqModalManual(titulli) {
        kategoriaAktuale = titulli;
        document.getElementById("manual-titulli").innerText = titulli;
        document.getElementById("modal-manual").classList.remove("hidden");
        document.getElementById("manual-input").value = ""; // Pastro inputin e vjeter
        
        // Vonesë 300ms që të hapet dritarja dhe të shkojë kursori vetë aty
        setTimeout(() => {
            const inp = document.getElementById("manual-input");
            inp.focus();
            inp.click();
        }, 300);
    }

    function mbyllModalDheShto() {
        let vlera = document.getElementById("manual-input").value;
        if(vlera && !isNaN(vlera)) {
            shtoNeShporte(kategoriaAktuale, vlera);
            document.getElementById("modal-manual").classList.add("hidden");
        }
    }

    // SHTUAR: SINKRONIZIMI DHE LIMITI 80%
    async function merrRaportin() {
        const sot = new Date();
        const r = await fetch(URL, { method: "POST", body: JSON.stringify({ action: "raporti", muaji: sot.getMonth()+1, viti: sot.getFullYear(), user: uAktual }) });
        const d = await r.json();
        
        // Rregullimi i pulsimit për 80% te limitit (Ketu e kam lënë limitin 50,000, ndryshoje po deshe)
        const mbetjaEl = document.getElementById("r-mbetja");
        mbetjaEl.innerText = d.mbetja.toLocaleString() + " L";
        
        let limitiMuajit = 50000; 
        let perqindjaHarxhuar = (d.dalje / limitiMuajit) * 100;
        
        if (perqindjaHarxhuar >= 80) mbetjaEl.classList.add("limit-warning");
        else mbetjaEl.classList.remove("limit-warning");
        
        document.getElementById("bar-limit").style.width = Math.min(perqindjaHarxhuar, 100) + "%";
        document.getElementById("txt-limit").innerText = `${(d.dalje || 0).toLocaleString()} / ${limitiMuajit.toLocaleString()} L`;

        // Marrja e Kursimeve nga Serveri sapo hapet
        if (d.kurs) {
            localStorage.setItem("kursime_mbledhura", d.kurs.mbledhur);
            localStorage.setItem("obj_vlera", d.kurs.synimi);
            localStorage.setItem("obj_emri", d.kurs.emri);
            document.getElementById("obj-emri").value = d.kurs.emri;
            perditesoKasaforten();
        }

        let chartData = [['K', 'L']];
        for(let k in d.grafiku) chartData.push([k, d.grafiku[k]]);
        if(chartData.length > 1) {
            new google.visualization.PieChart(document.getElementById('piechart')).draw(google.visualization.arrayToDataTable(chartData), {
                backgroundColor: 'transparent', 
                colors: ['#3b82f6', '#10b981', '#ef4444'],
                legend: { textStyle: { color: '#ffffff', fontSize: 10, bold: true }, position: 'right' },
                chartArea: { width:'100%', height:'90%' }, pieHole: 0.5
            });
        }
    }

    function shtoNeShporte(emri, cmimi) {
        if (!shportaObj[emri]) shportaObj[emri] = { sasia: 1, cmimi: parseFloat(cmimi) }; 
        else shportaObj[emri].sasia += 1;
        
        let t = 0; 
        let listaHtml = "";
        for (let e in shportaObj) { 
            t += (shportaObj[e].sasia * shportaObj[e].cmimi); 
            listaHtml += `${e} x${shportaObj[e].sasia} (${shportaObj[e].cmimi} L)<br>`;
        }
        document.getElementById("shuma").value = t;
        document.getElementById("shporta-list").innerHTML = listaHtml;
    }

    // SHTUAR: SKANIMI OCR
    async function processOCR(input) {
        if (!input.files[0]) return;
        const status = document.getElementById("ocr-status");
        status.classList.remove("hidden");
        
        try {
            const result = await Tesseract.recognize(input.files[0], 'eng');
            const numbers = result.data.text.match(/\d+[\.,]\d+/g) || result.data.text.match(/\d+/g);
            
            if (numbers) {
                const maxVal = Math.max(...numbers.map(n => parseFloat(n.replace(',', '.'))));
                document.getElementById("shuma").value = Math.floor(maxVal);
                document.getElementById("shporta-list").innerHTML = "Shtuar nga fatura";
            } else {
                alert("Nuk u gjet asnjë çmim në faturë!");
            }
        } catch (error) {
            console.error("Gabim gjatë leximit:", error);
        }
        
        status.classList.add("hidden");
    }

    // PJESA JOTE E PAZARIT E PAPREKUR (Për të mos të dhënë error në fillim)
    function shfaqPazarin() { /* Ky funksion lihet siç e kishe në skriptet e tua */ }
    function shtoNePazar() { /* Lihet siç e kishe */ }
    function pastroPazarin() { /* Lihet siç e kishe */ }
    function ruajShpenzim() { /* Lihet siç e kishe (funksioni që flet me serverin për faturat) */ }
</script>
</body>
</html>
